<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#040818;font-family:'Helvetica Neue',Arial,sans-serif}
#main{display:flex;width:100vw;height:100vh;align-items:center}
#left-col{width:52vw;height:100vh;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:visible;padding-left:5vw}
#globe-wrap{width:min(40vw,78vh);height:min(40vw,78vh);position:relative;flex-shrink:0}
#globe-canvas{display:block;cursor:grab;position:absolute;inset:0;width:100%!important;height:100%!important}
#globe-canvas:active{cursor:grabbing}
.icon-node{position:absolute;width:3vw;height:3vw;min-width:36px;min-height:36px;max-width:52px;max-height:52px;border-radius:50%;background:rgba(15,28,80,0.82);border:1.5px solid rgba(80,150,255,0.55);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.28s ease;z-index:10;backdrop-filter:blur(6px);box-shadow:0 0 1vw rgba(60,120,255,0.18)}
.icon-node:hover{border-color:rgba(120,180,255,0.9);box-shadow:0 0 2vw rgba(80,140,255,0.45);background:rgba(20,40,120,0.9)}
.icon-node.active{border-color:#66aaff;box-shadow:0 0 3vw rgba(80,160,255,0.65);background:rgba(20,50,140,0.95)}
.icon-node svg{width:55%;height:55%;stroke:#88aaee;stroke-width:1.6;fill:none;transition:stroke 0.28s}
.icon-node:hover svg,.icon-node.active svg{stroke:#aaccff}
.node-label{position:absolute;font-size:clamp(7px,0.6vw,10px);letter-spacing:0.2em;color:transparent;text-transform:uppercase;white-space:nowrap;pointer-events:none;text-shadow:0 0 0.5vw rgba(60,120,200,0.5);transition:color 0.3s ease}
.node-label.visible{color:rgba(100,150,220,0.85)}
#connectors-svg{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:visible}
#right-panel{flex:1;height:100vh;position:relative;overflow:hidden;z-index:5}
#branding{position:absolute;top:20%;left:8%;right:5%;display:flex;flex-direction:column;align-items:flex-start;gap:0.5vh;z-index:20}
#logo-txt{font-size:clamp(11px,1vw,16px);letter-spacing:0.7em;color:#6688ee;text-transform:uppercase;opacity:.75}
#site-title{font-size:clamp(22px,3.8vw,52px);font-weight:300;letter-spacing:0.35em;text-transform:uppercase;white-space:nowrap;background:linear-gradient(90deg,#5588ff,#bb77ff,#55aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#countdown{display:flex;gap:2.5vw;margin-top:0.8vh}
.cd-block{display:flex;flex-direction:column;align-items:center;gap:0.2vh}
.cd-num{font-size:clamp(16px,2vw,30px);font-weight:200;color:#99bbee;letter-spacing:0.15em}
.cd-label{font-size:clamp(6px,0.55vw,9px);letter-spacing:0.3em;color:#445599;text-transform:uppercase}
#feature-display{position:absolute;top:50%;left:5%;right:2%;transform:translateY(-50%);display:flex;flex-direction:column;justify-content:center;z-index:20;pointer-events:none}
#feature-name{font-size:clamp(16px,3vw,48px);font-weight:200;letter-spacing:clamp(3px,1vw,14px);text-transform:uppercase;opacity:0;transition:opacity 0.5s ease;color:#ddeeff;white-space:nowrap;text-shadow:0 0 3vw rgba(100,160,255,0.35)}
#feature-desc{font-size:clamp(9px,0.85vw,13px);letter-spacing:0.2em;color:rgba(100,150,220,0.65);opacity:0;transition:opacity 0.55s ease 0.08s;text-transform:uppercase;margin-top:0.6vh}
#feature-name.vis{opacity:1}
#feature-desc.vis{opacity:0.65}
#email-row{position:absolute;top:78%;left:5%;display:flex;gap:0;width:min(38vw,360px);z-index:20}
#email-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(80,120,240,0.26);border-right:none;color:#fff;padding:1.2vh 1.2vw;font-size:clamp(10px,0.85vw,13px);outline:none;letter-spacing:0.08em}
#email-input::placeholder{color:#334477}
#email-btn{background:linear-gradient(135deg,#2244bb,#5522aa);border:none;color:#fff;padding:1.2vh 1.5vw;font-size:clamp(9px,0.75vw,11px);letter-spacing:0.18em;cursor:pointer;text-transform:uppercase;white-space:nowrap}
#email-btn:hover{opacity:.85}
/* Wave canvas: must have width/height 100% so it fills the parent properly */
#wave-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
</style>
</head>
<body>
<div id="main">
  <div id="left-col">
    <div id="globe-wrap">
      <canvas id="globe-canvas"></canvas>
      <svg id="connectors-svg"></svg>
    </div>
  </div>
  <div id="right-panel">
    <div id="branding">
      <div id="logo-txt">Cortexle</div>
      <div id="site-title">Coming Soon</div>
      <div id="countdown">
        <div class="cd-block"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Days</span></div>
        <div class="cd-block"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Hours</span></div>
        <div class="cd-block"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Mins</span></div>
        <div class="cd-block"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Secs</span></div>
      </div>
    </div>
    <div id="feature-display">
      <div id="feature-name"></div>
      <div id="feature-desc"></div>
    </div>
    <div id="email-row">
      <input id="email-input" type="email" placeholder="Enter your email for early access"/>
      <button id="email-btn">Notify Me</button>
    </div>
    <canvas id="wave-canvas"></canvas>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
(function(){
  const target=new Date('2025-09-01T00:00:00Z');
  function tick(){let diff=Math.max(0,target-Date.now());const d=Math.floor(diff/86400000);diff-=d*86400000;const h=Math.floor(diff/3600000);diff-=h*3600000;const m=Math.floor(diff/60000);diff-=m*60000;const s=Math.floor(diff/1000);document.getElementById('cd-d').textContent=String(d).padStart(2,'0');document.getElementById('cd-h').textContent=String(h).padStart(2,'0');document.getElementById('cd-m').textContent=String(m).padStart(2,'0');document.getElementById('cd-s').textContent=String(s).padStart(2,'0');}
  tick();setInterval(tick,1000);
})();

/* WAVE — uses getBoundingClientRect for accurate sizing */
(function(){
  const canvas=document.getElementById('wave-canvas');
  const ctx=canvas.getContext('2d');
  function resize(){
    const rect=canvas.getBoundingClientRect();
    canvas.width=rect.width||window.innerWidth*0.48;
    canvas.height=rect.height||window.innerHeight;
  }
  /* Delay resize so layout is settled */
  setTimeout(resize,50);
  window.addEventListener('resize',resize);
  const waves=[
    {freq:0.012,amp:0.09,speed:0.018,phase:0,   color:'rgba(120,60,220,0.65)',lw:1.8},
    {freq:0.010,amp:0.13,speed:0.013,phase:2.1,  color:'rgba(100,40,200,0.45)',lw:1.2},
    {freq:0.015,amp:0.06,speed:0.022,phase:4.3,  color:'rgba(160,80,255,0.40)',lw:1.0},
    {freq:0.009,amp:0.15,speed:0.009,phase:1.5,  color:'rgba(80,30,180,0.32)', lw:0.9},
    {freq:0.018,amp:0.05,speed:0.028,phase:3.7,  color:'rgba(140,70,240,0.30)',lw:0.8},
    {freq:0.007,amp:0.17,speed:0.007,phase:0.9,  color:'rgba(70,20,160,0.25)', lw:0.6},
  ];
  let t=0;
  function draw(){
    const W=canvas.width,H=canvas.height;
    if(!W||!H){requestAnimationFrame(draw);return;}
    ctx.clearRect(0,0,W,H);
    const cy=H*0.5;
    waves.forEach(w=>{
      const amp=H*w.amp;
      ctx.beginPath();ctx.lineWidth=w.lw;ctx.strokeStyle=w.color;
      for(let x=0;x<=W;x+=2){
        const spread=1-Math.exp(-x*0.005);
        const y=cy+Math.sin(x*w.freq+t*w.speed+w.phase)*amp*spread;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    });
    t++;requestAnimationFrame(draw);
  }
  draw();
})();

/* GLOBE + ICONS */
(function(){
  const wrap=document.getElementById('globe-wrap');
  const canvas=document.getElementById('globe-canvas');
  const SZ=wrap.offsetWidth;
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(SZ,SZ);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42,1,0.1,100);
  camera.position.set(0,0,3.2);
  const R=1.0;
  const sphereMat=new THREE.ShaderMaterial({
    uniforms:{time:{value:0}},
    vertexShader:`varying vec3 vNormal,vPos;void main(){vNormal=normalize(normalMatrix*normal);vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vNormal,vPos;uniform float time;void main(){vec3 viewDir=normalize(cameraPosition-vPos);float rim=1.0-dot(normalize(vNormal),viewDir);float rimGlow=pow(rim,3.5)*0.9;vec3 rimCol=mix(vec3(0.12,0.35,0.9),vec3(0.5,0.15,0.9),rim);vec3 baseCol=vec3(0.02,0.05,0.15);float lat=asin(vPos.y/length(vPos))/3.14159;float lon=atan(vPos.z,vPos.x)/3.14159;float grid=step(0.97,abs(sin(lat*18.0)))+step(0.97,abs(sin(lon*18.0)));grid=clamp(grid,0.0,1.0);vec3 col=baseCol+rimCol*rimGlow+vec3(0.04,0.08,0.18)*grid*0.5;float alpha=0.55+rimGlow*0.8;gl_FragColor=vec4(col,alpha);}`,
    transparent:true,side:THREE.FrontSide,depthWrite:false,
  });
  const globe=new THREE.Mesh(new THREE.SphereGeometry(R,48,48),sphereMat);scene.add(globe);
  const haloMat=new THREE.ShaderMaterial({uniforms:{},vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`varying vec3 vN;void main(){float r=1.0-abs(dot(vN,vec3(0,0,1)));float a=pow(r,2.5)*0.35;gl_FragColor=vec4(0.3,0.6,1.0,a);}`,transparent:true,side:THREE.BackSide,depthWrite:false});
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.08,32,32),haloMat));
  const sv=[];for(let i=0;i<1800;i++){const r=2.5+Math.random()*2,t2=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);sv.push(r*Math.sin(p)*Math.cos(t2),r*Math.cos(p),r*Math.sin(p)*Math.sin(t2));}
  const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x8899cc,size:0.025,transparent:true,opacity:0.55})));
  const lg=new THREE.Group();scene.add(lg);
  const lm=new THREE.LineBasicMaterial({color:0x2244aa,transparent:true,opacity:0.35});
  const ym=new THREE.LineBasicMaterial({color:0xaa8822,transparent:true,opacity:0.5});
  const dm=new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:0.8});
  const ydm=new THREE.MeshBasicMaterial({color:0xffcc44,transparent:true,opacity:0.7});
  const dg=new THREE.SphereGeometry(0.018,8,8);
  function rOS(){const u=Math.random(),v=Math.random(),t2=2*Math.PI*u,p=Math.acos(2*v-1);return new THREE.Vector3(R*Math.sin(p)*Math.cos(t2),R*Math.cos(p),R*Math.sin(p)*Math.sin(t2));}
  const nodes=Array.from({length:80},rOS);nodes.forEach(n=>{const d=new THREE.Mesh(dg,dm);d.position.copy(n);lg.add(d);});
  const yn=Array.from({length:30},rOS);yn.forEach(n=>{const d=new THREE.Mesh(dg,ydm);d.position.copy(n);lg.add(d);});
  for(let i=0;i<120;i++){const a=nodes[~~(Math.random()*80)],b=nodes[~~(Math.random()*80)];lg.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([a.clone(),b.clone()]),lm));}
  for(let i=0;i<50;i++){const a=yn[~~(Math.random()*30)],b=yn[~~(Math.random()*30)];lg.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([a.clone(),b.clone()]),ym));}
  let isDrag=false,prevM={x:0,y:0},vx=0,vy=0;
  canvas.addEventListener('mousedown',e=>{isDrag=true;prevM={x:e.clientX,y:e.clientY};vx=0;vy=0;});
  window.addEventListener('mouseup',()=>{isDrag=false;});
  window.addEventListener('mousemove',e=>{if(!isDrag)return;const dx=e.clientX-prevM.x,dy=e.clientY-prevM.y;vx=dx*0.008;vy=dy*0.008;globe.rotation.y+=vx;globe.rotation.x+=vy;lg.rotation.y+=vx;lg.rotation.x+=vy;prevM={x:e.clientX,y:e.clientY};});
  function animate(){requestAnimationFrame(animate);sphereMat.uniforms.time.value+=0.01;if(!isDrag){vx*=0.96;vy*=0.96;globe.rotation.y+=0.003+vx;globe.rotation.x+=vy;lg.rotation.y+=0.003+vx;lg.rotation.x+=vy;}renderer.render(scene,camera);}
  animate();
  window.addEventListener('resize',()=>{const SZ2=wrap.offsetWidth;camera.aspect=1;camera.updateProjectionMatrix();renderer.setSize(SZ2,SZ2);});
  const features=[
    {name:'AI Q&A',desc:'Instant answers from your videos',icon:'brain',angleDeg:118},
    {name:'Video Processing',desc:'Frame-by-frame intelligence',icon:'video',angleDeg:155},
    {name:'Transcription',desc:'Speech to searchable text',icon:'mic',angleDeg:195},
    {name:'Semantic Search',desc:'Find anything by meaning',icon:'search',angleDeg:235},
    {name:'Smart Notes',desc:'Auto-generated insights',icon:'notes',angleDeg:270},
    {name:'Chrome Extension',desc:'Works anywhere in your browser',icon:'chrome',angleDeg:308},
  ];
  const ICONS={brain:'<circle cx="12" cy="12" r="4"/><path d="M12 8c-2.5-3-7-2-7 2s2 4 4 4m3-6c2.5-3 7-2 7 2s-2 4-4 4M8 16c-2 2-2 5 1 5s3-2 4-4m-1 4c2 2 2 5-1 5s-3-2-4-4"/>',video:'<rect x="2" y="6" width="13" height="12" rx="2"/><path d="M15 10l5-3v10l-5-3V10z"/>',mic:'<rect x="9" y="3" width="6" height="10" rx="3"/><path d="M5 12a7 7 0 0014 0M12 19v3M9 22h6"/>',search:'<circle cx="11" cy="11" r="7"/><path d="M20 20l-4.35-4.35"/>',notes:'<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/>',chrome:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5"/><line x1="12" y1="8.5" x2="12" y2="3"/><line x1="15.2" y1="10.2" x2="20.2" y2="7.6"/><line x1="15.2" y1="13.8" x2="20.2" y2="16.4"/>'};
  const svgEl=document.getElementById('connectors-svg');
  const fn=document.getElementById('feature-name');
  const fd=document.getElementById('feature-desc');
  let activeIdx=-1;const nodeEls=[];const labelEls=[];
  features.forEach((f,i)=>{
    const cx=SZ/2,cy2=SZ/2,r=SZ*0.46,re=SZ*0.24,a=(f.angleDeg-90)*Math.PI/180;
    const px=cx+r*Math.cos(a),py=cy2+r*Math.sin(a),ex=cx+re*Math.cos(a),ey=cy2+re*Math.sin(a);
    const node=document.createElement('div');
    node.className='icon-node';
    node.style.left=(px/SZ*100)+'%';node.style.top=(py/SZ*100)+'%';node.style.transform='translate(-50%,-50%)';
    node.innerHTML='<svg viewBox="0 0 24 24">'+ICONS[f.icon]+'</svg>';
    const lbl=document.createElement('div');
    lbl.className='node-label';
    const isLeft=px<SZ*0.52;
    lbl.style.left=isLeft?(px/SZ*100-5)+'%':(px/SZ*100+5)+'%';
    lbl.style.top=(py/SZ*100)+'%';
    lbl.style.transform=isLeft?'translate(-100%,-50%)':'translateY(-50%)';
    lbl.textContent=f.name;
    wrap.appendChild(lbl);labelEls.push(lbl);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ex);line.setAttribute('y1',ey);line.setAttribute('x2',px);line.setAttribute('y2',py);
    line.setAttribute('stroke','rgba(80,140,255,0.3)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','4 3');
    svgEl.appendChild(line);
    node.addEventListener('click',()=>{
      if(activeIdx===i){node.classList.remove('active');lbl.classList.remove('visible');fn.classList.remove('vis');fd.classList.remove('vis');activeIdx=-1;return;}
      nodeEls.forEach((n,j)=>{n.classList.remove('active');labelEls[j].classList.remove('visible');});
      fn.classList.remove('vis');fd.classList.remove('vis');
      activeIdx=i;node.classList.add('active');lbl.classList.add('visible');
      setTimeout(()=>{fn.textContent=f.name;fd.textContent=f.desc;fn.classList.add('vis');fd.classList.add('vis');},280);
    });
    wrap.appendChild(node);nodeEls.push(node);
  });
})();
</script>
</body>
</html>
