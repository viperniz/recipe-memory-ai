<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cortexle – Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#04060f;font-family:'Inter',sans-serif}
#bg-canvas,#sphere-canvas,#wave-canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;pointer-events:none}
#bg-canvas{z-index:0}#sphere-canvas{z-index:1}#wave-canvas{z-index:2}
#main{position:fixed;inset:0;display:flex;flex-direction:row;align-items:center;z-index:3;pointer-events:none}
#left-col{width:52vw;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;pointer-events:none}
#logo-txt{font-family:'Rajdhani',sans-serif;font-size:clamp(32px,4.5vw,72px);font-weight:600;letter-spacing:0.55em;background:linear-gradient(135deg,#7eb8ff 0%,#a78bfa 50%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:clamp(10px,2vh,28px);text-transform:uppercase;white-space:nowrap;pointer-events:none;position:relative;z-index:4}
#globe-wrap{position:relative;width:min(38vw,68vh);height:min(38vw,68vh);flex-shrink:0;pointer-events:none}
#connectors-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.icon-node{position:absolute;width:clamp(32px,3.2vw,52px);height:clamp(32px,3.2vw,52px);border-radius:50%;background:rgba(4,8,28,0.88);border:1.5px solid rgba(80,180,255,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;transition:border-color .3s,box-shadow .3s,transform .25s;transform:translate(-50%,-50%)}
.icon-node:hover{border-color:rgba(167,139,250,0.9);box-shadow:0 0 18px rgba(80,180,255,0.8);transform:translate(-50%,-50%) scale(1.15)}
.icon-node.active{border-color:#60d0ff;box-shadow:0 0 28px rgba(60,180,255,0.95)}
.icon-node svg{width:48%;height:48%;stroke:rgba(120,210,255,0.9);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-node.active svg{stroke:#a0e8ff}
#right-panel{flex:1;height:100%;position:relative;pointer-events:none}
#coming-soon-block{position:absolute;top:12%;left:0;right:0;padding-left:clamp(16px,3vw,48px)}
#site-label{font-family:'Rajdhani',sans-serif;font-size:clamp(10px,1vw,14px);letter-spacing:0.4em;color:rgba(148,163,184,0.7);text-transform:uppercase;margin-bottom:0.4em}
#site-title{font-family:'Rajdhani',sans-serif;font-size:clamp(22px,3.2vw,52px);font-weight:600;letter-spacing:0.15em;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase;white-space:nowrap;line-height:1.1}
#countdown{display:flex;gap:clamp(12px,2vw,32px);margin-top:clamp(8px,1.2vh,18px)}
.cd-unit{display:flex;flex-direction:column;align-items:center}
.cd-num{font-family:'Rajdhani',sans-serif;font-size:clamp(20px,2.8vw,44px);font-weight:600;color:#e2e8f0;line-height:1}
.cd-lbl{font-size:clamp(8px,0.7vw,11px);letter-spacing:0.2em;color:rgba(148,163,184,0.6);text-transform:uppercase;margin-top:3px}
#feature-display{position:absolute;top:52%;left:0;right:0;padding-left:clamp(16px,3vw,48px);z-index:4;pointer-events:none}
#feature-card{display:inline-block;padding:clamp(10px,1.4vh,18px) clamp(16px,2.2vw,32px);background:rgba(4,6,22,0.70);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(100,160,255,0.22);border-radius:10px;min-width:200px;opacity:0;transition:opacity .5s ease;pointer-events:none}
#feature-card.visible{opacity:1}
#feature-name{font-family:'Rajdhani',sans-serif;font-size:clamp(15px,2.2vw,38px);font-weight:600;letter-spacing:0.25em;color:#f1f5f9;text-transform:uppercase;white-space:nowrap;text-shadow:0 0 20px rgba(120,200,255,0.8),0 2px 4px rgba(0,0,0,0.9)}
#feature-desc{font-size:clamp(9px,0.9vw,13px);letter-spacing:0.18em;color:rgba(200,220,255,0.85);text-transform:uppercase;margin-top:0.4em;text-shadow:0 1px 3px rgba(0,0,0,0.9)}
#email-row{position:absolute;bottom:10%;left:0;right:0;padding-left:clamp(16px,3vw,48px);display:flex;align-items:center;gap:clamp(8px,1vw,14px);pointer-events:all}
#email-input{background:rgba(255,255,255,0.05);border:1px solid rgba(80,180,255,0.35);border-radius:6px;padding:clamp(8px,0.9vh,12px) clamp(12px,1.2vw,20px);color:#e2e8f0;font-size:clamp(10px,0.9vw,14px);width:clamp(160px,18vw,260px);outline:none;transition:border-color .3s}
#email-input:focus{border-color:#60d0ff}#email-input::placeholder{color:rgba(148,163,184,0.4)}
#notify-btn{background:linear-gradient(135deg,#4060e0,#7040c0);border:none;border-radius:6px;padding:clamp(8px,0.9vh,12px) clamp(14px,1.4vw,22px);color:#fff;font-size:clamp(10px,0.85vw,13px);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity .3s,transform .2s;box-shadow:0 0 20px rgba(80,120,255,0.4)}
#notify-btn:hover{opacity:.85;transform:translateY(-1px)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>
<canvas id="wave-canvas"></canvas>
<div id="main">
  <div id="left-col">
    <div id="logo-txt">CORTEXLE</div>
    <div id="globe-wrap"><svg id="connectors-svg"></svg></div>
  </div>
  <div id="right-panel">
    <div id="coming-soon-block">
      <div id="site-label">CORTEXLE</div>
      <div id="site-title">COMING SOON</div>
      <div id="countdown">
        <div class="cd-unit"><span class="cd-num" id="cd-d">00</span><span class="cd-lbl">Days</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-lbl">Hours</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-lbl">Mins</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-lbl">Secs</span></div>
      </div>
    </div>
    <div id="feature-display">
      <div id="feature-card"><div id="feature-name"></div><div id="feature-desc"></div></div>
    </div>
    <div id="email-row">
      <input id="email-input" type="email" placeholder="Enter your email for early access"/>
      <button id="notify-btn">Notify Me</button>
    </div>
  </div>
</div>
<script>
var DPR = Math.min(window.devicePixelRatio||1, 2);

/* ============================================================
   STARFIELD
============================================================ */
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  var stars=[];
  for(var i=0;i<1800;i++) stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*0.9+0.15,a:Math.random()*0.6+0.1,fp:Math.random()*6.283,fs:Math.random()*1.5+0.3});
  function draw(){
    var now=Date.now()*.001;
    ctx.fillStyle='#04060f';ctx.fillRect(0,0,innerWidth,innerHeight);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      ctx.globalAlpha=s.a*(0.5+0.5*Math.sin(now*s.fs+s.fp));
      ctx.fillStyle='#aac8ff';ctx.beginPath();ctx.arc(s.x%innerWidth,s.y%innerHeight,s.r,0,6.283);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  draw();setInterval(draw,80);
  window.addEventListener('resize',function(){c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);});
})();

/* ============================================================
   initOrb() — Pytia-style holographic sphere on #sphere-canvas
   Layers: core glow | Fibonacci point cloud | network lines |
           energy ribbons (TubeGeometry) | perimeter sparks
============================================================ */
function initOrb(){
  var canvas = document.getElementById('sphere-canvas');
  var dpr = Math.min(window.devicePixelRatio||1, 2);
  var renderer = new THREE.WebGLRenderer({canvas:canvas, alpha:true, antialias:true, premultipliedAlpha:false});
  renderer.setPixelRatio(dpr);
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 0);
  renderer.sortObjects = false;

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 200);
  camera.position.set(0, 0, 5.5);

  /* Helper: get orb center + radius in world space from DOM */
  function getOrbParams(){
    var wrap = document.getElementById('globe-wrap');
    var r = wrap.getBoundingClientRect();
    var cx = r.left + r.width*0.5;
    var cy = r.top  + r.height*0.5;
    /* Project pixel center to world coords at Z=0 */
    var ndcX = (cx/innerWidth)*2-1;
    var ndcY = -(cy/innerHeight)*2+1;
    var v = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera);
    var dir = v.sub(camera.position).normalize();
    var dist = -camera.position.z/dir.z;
    var worldPos = camera.position.clone().addScaledVector(dir, dist);
    /* World-space radius: r.width / innerWidth * frustumW */
    var fH = 2*Math.tan(THREE.MathUtils.degToRad(camera.fov/2))*camera.position.z;
    var fW = fH*camera.aspect;
    var wRadius = (r.width/innerWidth)*fW*0.47;
    return {pos: worldPos, R: wRadius};
  }

  var ORB = getOrbParams();
  var R = ORB.R;
  var OX = ORB.pos.x, OY = ORB.pos.y;

  /* ── LAYER 1: Core glow billboard ── */
  var glowCanvas = document.createElement('canvas');
  glowCanvas.width = glowCanvas.height = 256;
  var gc = glowCanvas.getContext('2d');
  var grd = gc.createRadialGradient(128,128,0,128,128,128);
  grd.addColorStop(0,  'rgba(80,200,255,0.55)');
  grd.addColorStop(0.2,'rgba(40,130,255,0.30)');
  grd.addColorStop(0.5,'rgba(20, 60,220,0.12)');
  grd.addColorStop(1,  'rgba(0,0,0,0)');
  gc.fillStyle=grd; gc.fillRect(0,0,256,256);
  var glowTex = new THREE.CanvasTexture(glowCanvas);
  var glowMat = new THREE.SpriteMaterial({map:glowTex, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.85});
  var glowSprite = new THREE.Sprite(glowMat);
  glowSprite.scale.set(R*4.5, R*4.5, 1);
  glowSprite.position.set(OX, OY, 0);
  scene.add(glowSprite);

  /* Tighter inner glow */
  var ig2 = document.createElement('canvas'); ig2.width=ig2.height=128;
  var ic=ig2.getContext('2d');
  var ig=ic.createRadialGradient(64,64,0,64,64,64);
  ig.addColorStop(0,'rgba(160,230,255,0.75)');ig.addColorStop(0.3,'rgba(60,180,255,0.40)');ig.addColorStop(0.7,'rgba(20,80,220,0.12)');ig.addColorStop(1,'rgba(0,0,0,0)');
  ic.fillStyle=ig;ic.fillRect(0,0,128,128);
  var igTex=new THREE.CanvasTexture(ig2);
  var igMat=new THREE.SpriteMaterial({map:igTex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.6});
  var igSprite=new THREE.Sprite(igMat);
  igSprite.scale.set(R*2.2,R*2.2,1);
  igSprite.position.set(OX,OY,0.01);
  scene.add(igSprite);

  /* ── LAYER 2: Fibonacci point cloud ── */
  var N_PTS = 5000;
  var ptPositions = new Float32Array(N_PTS*3);
  var ptPhases    = new Float32Array(N_PTS);   // for flicker
  var ptSpeeds    = new Float32Array(N_PTS);
  var ptSizes     = new Float32Array(N_PTS);
  var golden = Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<N_PTS;i++){
    var y = 1 - (i/(N_PTS-1))*2;
    var rad = Math.sqrt(Math.max(0,1-y*y));
    var theta = golden*i;
    var x = Math.cos(theta)*rad, z = Math.sin(theta)*rad;
    /* slight radius jitter for volumetric look */
    var jit = 0.92+Math.random()*0.10;
    ptPositions[i*3]   = OX + x*R*jit;
    ptPositions[i*3+1] = OY + y*R*jit;
    ptPositions[i*3+2] = z*R*jit;
    ptPhases[i] = Math.random()*6.283;
    ptSpeeds[i] = 0.4+Math.random()*1.8;
    ptSizes[i]  = 1.5+Math.random()*2.5;
  }
  /* Sprite texture for each point */
  var ptCanvas=document.createElement('canvas');ptCanvas.width=ptCanvas.height=32;
  var ptCtx=ptCanvas.getContext('2d');
  var ptGrd=ptCtx.createRadialGradient(16,16,0,16,16,16);
  ptGrd.addColorStop(0,'rgba(180,240,255,1)');ptGrd.addColorStop(0.3,'rgba(80,200,255,0.7)');ptGrd.addColorStop(0.7,'rgba(30,100,255,0.2)');ptGrd.addColorStop(1,'rgba(0,0,0,0)');
  ptCtx.fillStyle=ptGrd;ptCtx.fillRect(0,0,32,32);
  var ptTex=new THREE.CanvasTexture(ptCanvas);

  var ptGeo=new THREE.BufferGeometry();
  var ptPosAttr=new THREE.BufferAttribute(ptPositions.slice(),3);ptPosAttr.setUsage(THREE.DynamicDrawUsage);
  ptGeo.setAttribute('position',ptPosAttr);
  ptGeo.setAttribute('size',new THREE.BufferAttribute(ptSizes,1));
  var ptMat=new THREE.PointsMaterial({map:ptTex,size:0.045,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.85,vertexColors:false});
  var ptMesh=new THREE.Points(ptGeo,ptMat);
  scene.add(ptMesh);

  /* Store original positions for rotation */
  var ptOrig=ptPositions.slice();

  /* ── LAYER 3: Geodesic network lines ── */
  /* Sample a subset of surface points and connect nearby ones */
  var NET_PTS=200;
  var netVerts=[];
  for(var i=0;i<NET_PTS;i++){
    var idx=Math.floor(i*(N_PTS/NET_PTS));
    netVerts.push(new THREE.Vector3(ptOrig[idx*3]-OX, ptOrig[idx*3+1]-OY, ptOrig[idx*3+2]));
  }
  var lineGroup=new THREE.Group();
  lineGroup.position.set(OX,OY,0);
  for(var i=0;i<netVerts.length;i++){
    for(var j=i+1;j<netVerts.length;j++){
      var d=netVerts[i].distanceTo(netVerts[j]);
      if(d<R*0.38 && Math.random()<0.28){
        /* Great-circle arc via mid-point on sphere surface */
        var mid=netVerts[i].clone().add(netVerts[j]).multiplyScalar(0.5).normalize().multiplyScalar(R);
        var pts=[netVerts[i].clone(),mid,netVerts[j].clone()];
        var curve=new THREE.QuadraticBezierCurve3(pts[0],pts[1],pts[2]);
        var arcPts=curve.getPoints(8);
        var arcGeo=new THREE.BufferGeometry().setFromPoints(arcPts);
        var bright=Math.random()<0.12;  /* occasional brighter line */
        var lineMat=new THREE.LineBasicMaterial({color:bright?0x80e8ff:0x30a8e0,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:bright?0.55:0.18});
        lineGroup.add(new THREE.Line(arcGeo,lineMat));
      }
    }
  }
  scene.add(lineGroup);

  /* ── LAYER 4: Energy ribbons ── */
  /* 5 tilted elliptical splines wrapping sphere */
  var ribbons=[];
  var RIBBON_DEFS=[
    {tiltX:0.4, tiltZ:0.2, phase:0,   speed:0.18, op:0.35, col:0x50d8ff},
    {tiltX:-0.6,tiltZ:0.5, phase:1.2, speed:0.13, op:0.28, col:0x40b0ff},
    {tiltX:0.8, tiltZ:-0.3,phase:2.5, speed:0.22, op:0.22, col:0x70e0ff},
    {tiltX:-0.3,tiltZ:-0.7,phase:3.8, speed:0.16, op:0.30, col:0x60c8ff},
    {tiltX:0.2, tiltZ:0.9, phase:5.1, speed:0.20, op:0.20, col:0x80d0ff},
  ];
  RIBBON_DEFS.forEach(function(def){
    var N=64;
    var pts=[];
    for(var i=0;i<=N;i++){
      var angle=(i/N)*Math.PI*2;
      var px=Math.cos(angle)*R;
      var py=Math.sin(angle)*R*0.35; /* flattened ellipse */
      var pz=0;
      /* Apply tilt rotations */
      var rx=px, ry=py*Math.cos(def.tiltX)-pz*Math.sin(def.tiltX), rz=py*Math.sin(def.tiltX)+pz*Math.cos(def.tiltX);
      var fx=rx*Math.cos(def.tiltZ)-rz*Math.sin(def.tiltZ), fz=rx*Math.sin(def.tiltZ)+rz*Math.cos(def.tiltZ);
      pts.push(new THREE.Vector3(OX+fx, OY+ry, fz));
    }
    var geo=new THREE.BufferGeometry().setFromPoints(pts);
    var posAttr=geo.attributes.position;posAttr.setUsage(THREE.DynamicDrawUsage);
    var mat=new THREE.LineBasicMaterial({color:def.col,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:def.op,linewidth:1});
    var line=new THREE.Line(geo,mat);
    scene.add(line);
    ribbons.push({geo:geo,def:def,N:N,pts:pts.map(function(p){return p.clone();})});
  });

  /* ── LAYER 5: Perimeter sparks ── */
  var N_SPARKS=120;
  var sparkPos=new Float32Array(N_SPARKS*3);
  var sparkVel=[];
  var sparkLife=new Float32Array(N_SPARKS);
  var sparkMaxLife=new Float32Array(N_SPARKS);
  function resetSpark(i){
    var theta2=Math.random()*Math.PI*2,phi2=Math.acos(2*Math.random()-1);
    var x=Math.sin(phi2)*Math.cos(theta2),y=Math.cos(phi2),z=Math.sin(phi2)*Math.sin(theta2);
    sparkPos[i*3]=OX+x*R;sparkPos[i*3+1]=OY+y*R;sparkPos[i*3+2]=z*R;
    sparkVel[i]=new THREE.Vector3(x,y,z).multiplyScalar(0.003+Math.random()*0.005);
    sparkLife[i]=0;sparkMaxLife[i]=40+Math.random()*80;
  }
  for(var i=0;i<N_SPARKS;i++){resetSpark(i);sparkLife[i]=Math.random()*60;}
  var spkCanvas=document.createElement('canvas');spkCanvas.width=spkCanvas.height=16;
  var spkCtx=spkCanvas.getContext('2d');
  var spkGrd=spkCtx.createRadialGradient(8,8,0,8,8,8);
  spkGrd.addColorStop(0,'rgba(220,250,255,1)');spkGrd.addColorStop(0.4,'rgba(80,220,255,0.6)');spkGrd.addColorStop(1,'rgba(0,0,0,0)');
  spkCtx.fillStyle=spkGrd;spkCtx.fillRect(0,0,16,16);
  var spkTex=new THREE.CanvasTexture(spkCanvas);
  var spkGeo=new THREE.BufferGeometry();
  var spkPosAttr=new THREE.BufferAttribute(sparkPos.slice(),3);spkPosAttr.setUsage(THREE.DynamicDrawUsage);
  spkGeo.setAttribute('position',spkPosAttr);
  var spkMat=new THREE.PointsMaterial({map:spkTex,size:0.055,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.9,vertexColors:false});
  var spkMesh=new THREE.Points(spkGeo,spkMat);
  scene.add(spkMesh);

  /* ── ANIMATION ── */
  var rotY=0, t=0;
  function animate(){
    requestAnimationFrame(animate);
    t+=0.016;rotY+=0.003;

    var cosR=Math.cos(rotY),sinR=Math.sin(rotY);

    /* Rotate point cloud */
    var pPos=ptGeo.attributes.position.array;
    for(var i=0;i<N_PTS;i++){
      var ox2=ptOrig[i*3]-OX,oy2=ptOrig[i*3+1]-OY,oz2=ptOrig[i*3+2];
      var rx2=ox2*cosR+oz2*sinR,rz2=-ox2*sinR+oz2*cosR;
      /* Flicker */
      var flk=0.65+0.35*Math.sin(t*ptSpeeds[i]+ptPhases[i]);
      pPos[i*3]=OX+rx2;pPos[i*3+1]=OY+oy2*flk+(1-flk)*OY;pPos[i*3+2]=rz2;
    }
    ptGeo.attributes.position.needsUpdate=true;

    /* Rotate network lines */
    lineGroup.rotation.y=rotY;

    /* Animate energy ribbons — noise distortion + rotation */
    ribbons.forEach(function(rb,ri){
      var N2=rb.N,def=rb.def,ptsOrig=rb.pts;
      var posArr=rb.geo.attributes.position.array;
      for(var i=0;i<=N2;i++){
        var angle=(i/N2)*Math.PI*2+t*def.speed+def.phase;
        var noiseAmp=R*0.08;
        var nx=Math.sin(angle*3.1+t*0.7+ri)*noiseAmp;
        var ny=Math.sin(angle*2.3+t*0.5+ri*1.3)*noiseAmp*0.5;
        var origPt=ptsOrig[i];
        /* Rotate around Y */
        var dx2=origPt.x-OX,dz2=origPt.z;
        var rx3=dx2*cosR+dz2*sinR,rz3=-dx2*sinR+dz2*cosR;
        posArr[i*3]=OX+rx3+nx;
        posArr[i*3+1]=origPt.y+ny;
        posArr[i*3+2]=rz3+nx*0.3;
      }
      rb.geo.attributes.position.needsUpdate=true;
    });

    /* Update sparks */
    var spkArr=spkGeo.attributes.position.array;
    for(var i=0;i<N_SPARKS;i++){
      sparkLife[i]++;
      if(sparkLife[i]>sparkMaxLife[i]){resetSpark(i);continue;}
      spkArr[i*3]  +=sparkVel[i].x;
      spkArr[i*3+1]+=sparkVel[i].y;
      spkArr[i*3+2]+=sparkVel[i].z;
    }
    spkGeo.attributes.position.needsUpdate=true;

(function(){

  var wd=[];

    for(var wi=0;wi<NW;wi++){
      var o=wo[wi],d=o.d,pos=o.pos,tw=XE-XS;

        var px=si/NS,wx=XS+px*tw;

        var td=Math.exp(-px*22);
        var turb=(Math.sin(12*px*6.283+t*2.8+d.p1)*0.55+Math.sin(20*px*6.283+t*3.9+d.p2)*0.35)*0.28*td;
        var xw=px*6.283;
        var wy=d.vf*1.8*Math.pow(Math.max(0,1-px),0.60)+A*(d.a1*Math.sin(d.w1*xw+t*d.s1+d.p1)+d.a2*Math.sin(d.w2*xw+t*d.s2+d.p2)+d.a3*Math.sin(d.w3*xw+t*d.s3+d.p3))+turb;

})();
