<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06061a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;position:absolute;inset:0;pointer-events:none}
#main{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-start}

/* Globe container - left side */
#globe-wrap{position:relative;width:min(55vw,520px);height:100vh;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#globe-canvas{display:block;cursor:grab;position:absolute;inset:0}
#globe-canvas:active{cursor:grabbing}

/* Icon nodes floating around globe */
.icon-node{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(20,40,100,0.75);border:1.5px solid rgba(80,160,255,0.6);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s ease;z-index:10;backdrop-filter:blur(4px);box-shadow:0 0 12px rgba(60,120,255,0.3)}
.icon-node:hover{background:rgba(40,80,160,0.9);border-color:rgba(120,200,255,0.9);box-shadow:0 0 24px rgba(80,160,255,0.6);transform:scale(1.12)}
.icon-node.active{background:rgba(60,100,200,0.95);border-color:rgba(180,220,255,1);box-shadow:0 0 30px rgba(100,180,255,0.8),0 0 60px rgba(80,140,255,0.3);transform:scale(1.18)}
.icon-node svg{width:20px;height:20px;fill:none;stroke:rgba(160,210,255,0.9);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-node.active svg{stroke:#fff}

/* Right panel */
#right-panel{flex:1;height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 0 0 20px;position:relative;overflow:hidden}

/* Feature title display */
#feature-display{position:relative;z-index:5}
#feature-name{font-size:clamp(22px,3.5vw,52px);font-weight:200;letter-spacing:clamp(4px,1.5vw,14px);text-transform:uppercase;opacity:0;transition:opacity 0.5s ease;color:#e0ecff;white-space:nowrap;margin-bottom:8px}
#feature-desc{font-size:clamp(11px,1.2vw,15px);letter-spacing:3px;color:rgba(120,160,220,0.7);opacity:0;transition:opacity 0.5s ease 0.1s;text-transform:uppercase}
#feature-name.visible{opacity:1}
#feature-desc.visible{opacity:0.7}

/* Branding top */
#branding{position:absolute;top:24px;left:0;right:0;text-align:center;z-index:20;pointer-events:none}
#logo-txt{font-size:11px;letter-spacing:8px;color:#6688ee;text-transform:uppercase;opacity:.7}
#site-title{font-size:clamp(18px,2.5vw,32px);font-weight:300;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(90deg,#5588ff,#bb77ff,#55aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Countdown */
#countdown{display:flex;gap:18px;position:absolute;top:100px;left:0;right:0;justify-content:center;z-index:20;pointer-events:none}
.cd-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.cd-num{font-size:20px;font-weight:200;color:#99bbee;letter-spacing:2px}
.cd-label{font-size:8px;letter-spacing:3px;color:#445599;text-transform:uppercase}

/* Bottom UI */
#bottom-ui{position:absolute;bottom:28px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:20}
#email-row{display:flex;gap:0;width:min(360px,70vw)}
#email-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(80,120,240,0.28);border-right:none;color:#fff;padding:9px 14px;font-size:12px;outline:none;letter-spacing:1px}
#email-input::placeholder{color:#334477}
#email-btn{background:linear-gradient(135deg,#2244bb,#5522aa);border:none;color:#fff;padding:9px 16px;font-size:10px;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
#tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:500px;padding:0 16px}
.tag{background:rgba(50,70,160,0.12);border:1px solid rgba(60,90,200,0.2);color:#6688cc;padding:3px 9px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
<body>
<div id="branding">
  <div id="logo-txt">Cortexle</div>
  <div id="site-title">Coming Soon</div>
</div>
<div id="countdown">
  <div class="cd-block"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Days</span></div>
  <div class="cd-block"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Hours</span></div>
  <div class="cd-block"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Mins</span></div>
  <div class="cd-block"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Secs</span></div>
</div>
<div id="main">
  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
  </div>
  <div id="right-panel">
    <div id="feature-display">
      <div id="feature-name">AI-POWERED<br>VIDEO INTELLIGENCE</div>
      <div id="feature-desc">Click a feature to explore</div>
    </div>
  </div>
</div>
<canvas id="wave-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:1"></canvas>
<div id="bottom-ui">
  <div id="email-row">
    <input id="email-input" type="email" placeholder="Enter your email for early access"/>
    <button id="email-btn">Notify Me</button>
  </div>
  <div id="tags">
    <span class="tag">AI Q&amp;A</span>
    <span class="tag">Video Processing</span>
    <span class="tag">Transcription</span>
    <span class="tag">Semantic Search</span>
    <span class="tag">Smart Notes</span>
    <span class="tag">Chrome Extension</span>
  </div>
</div>

<script>
// ── Countdown ────────────────────────────────────────────────────
const launch=new Date('2025-09-01T00:00:00Z');
function updateCD(){const now=new Date(),diff=Math.max(0,launch-now);const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1e3);document.getElementById('cd-d').textContent=String(d).padStart(2,'0');document.getElementById('cd-h').textContent=String(h).padStart(2,'0');document.getElementById('cd-m').textContent=String(m).padStart(2,'0');document.getElementById('cd-s').textContent=String(s).padStart(2,'0');}
updateCD();setInterval(updateCD,1000);
document.getElementById('email-btn').addEventListener('click',()=>{const v=document.getElementById('email-input').value;if(v&&v.includes('@')){document.getElementById('email-btn').textContent='Done ✓';}});

// ── Features with SVG icons ────────────────────────────────────
const features=[
  {name:'AI Q&A',desc:'Instant answers from your videos',icon:'brain',col:'#ff8833'},
  {name:'Video Processing',desc:'Frame-by-frame intelligence',icon:'video',col:'#ff8833'},
  {name:'Transcription',desc:'Speech to searchable text',icon:'mic',col:'#55aaff'},
  {name:'Semantic Search',desc:'Find anything by meaning',icon:'search',col:'#55aaff'},
  {name:'Smart Notes',desc:'Auto-generated insights',icon:'notes',col:'#aa77ff'},
  {name:'Chrome Extension',desc:'Works anywhere in your browser',icon:'chrome',col:'#aa77ff'},
];

const svgIcons={
  brain:'<circle cx="12" cy="12" r="3"/><path d="M6.6 8.4A6 6 0 0 1 18 12a6 6 0 0 1-11.4 3.6"/><path d="M12 6v2M12 16v2M6 12H4M20 12h-2"/>',
  video:'<rect x="2" y="6" width="14" height="12" rx="2"/><polyline points="16 10 22 7 22 17 16 14"/>',
  mic:'<path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>',
  search:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  notes:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
  chrome:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/>',
};

// ── Icon node positions (angles around globe center) ───────────
// These positions radiate outward from the globe like in the reference
const nodeAngles=[210,250,180,130,160,290]; // degrees around glob center
const nodeRadii=[1.55,1.45,1.5,1.45,1.55,1.5]; // relative radius multipliers

// ── Globe canvas setup ─────────────────────────────────────────
import('https://unpkg.com/three@0.160.0/build/three.module.js').then(THREE=>{

const gCanvas=document.getElementById('globe-canvas');
const gWrap=document.getElementById('globe-wrap');
const renderer=new THREE.WebGLRenderer({canvas:gCanvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,0);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,1,0.1,100);
camera.position.set(0,0,5.0);

function resizeGlobe(){
  const W=gWrap.offsetWidth,H=gWrap.offsetHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
}
resizeGlobe();
window.addEventListener('resize',()=>{resizeGlobe();positionIconNodes();});

function randSph(r){const u=Math.random()*2-1,th=Math.random()*Math.PI*2,k=Math.sqrt(1-u*u);return new THREE.Vector3(k*Math.cos(th)*r,u*r,k*Math.sin(th)*r);}

const brain=new THREE.Group();scene.add(brain);

// Dark fill
brain.add(new THREE.Mesh(new THREE.SphereGeometry(1.45,64,48),new THREE.MeshBasicMaterial({color:0x04040f})));

// Rim glow shaders
const rimVS='varying vec3 vN;varying vec3 vP;void main(){vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}';
const rimFS='varying vec3 vN;varying vec3 vP;void main(){vec3 V=normalize(-vP);float f=clamp(dot(vN,V),0.,1.);float rim=pow(1.-f,3.0);vec3 col=mix(vec3(0.4,0.7,1.0),vec3(0.7,0.5,1.0),pow(1.-f,2.0))*5.0;gl_FragColor=vec4(col*rim,rim);}';
brain.add(new THREE.Mesh(new THREE.SphereGeometry(1.465,64,48),new THREE.ShaderMaterial({vertexShader:rimVS,fragmentShader:rimFS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.FrontSide})));

function dotTex(r,g,b){const c=document.createElement('canvas');c.width=64;c.height=64;const cx=c.getContext('2d'),gd=cx.createRadialGradient(32,32,0,32,32,32);gd.addColorStop(0,'rgba(255,255,255,1)');gd.addColorStop(0.1,'rgba('+r+','+g+','+b+',0.9)');gd.addColorStop(0.35,'rgba('+r+','+g+','+b+',0.35)');gd.addColorStop(0.65,'rgba('+r+','+g+','+b+',0.06)');gd.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=gd;cx.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const texO=dotTex(255,140,40),texB=dotTex(60,140,255);
const oPos=[],bPos=[];
for(let i=0;i<100;i++) oPos.push(randSph(1.46));
for(let i=0;i<120;i++) bPos.push(randSph(1.465));
function spritePts(pts,tex,sz){const geo=new THREE.BufferGeometry();const arr=new Float32Array(pts.length*3);pts.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});geo.setAttribute('position',new THREE.BufferAttribute(arr,3));return new THREE.Points(geo,new THREE.PointsMaterial({size:sz,map:tex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true}));}
brain.add(spritePts(oPos,texO,0.17));
brain.add(spritePts(bPos,texB,0.11));

// Web
const wPts=[];for(let i=0;i<1000;i++) wPts.push(randSph(1.455));
const wSegs=[];for(let i=0;i<wPts.length;i++){const nb=[];for(let j=0;j<wPts.length;j++) if(i!==j&&wPts[i].distanceTo(wPts[j])<0.34) nb.push(j);nb.sort(()=>Math.random()-.5).slice(0,2).forEach(j=>{wSegs.push(wPts[i].clone(),wPts[j].clone());});}
brain.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(wSegs),new THREE.LineBasicMaterial({color:0x2240dd,transparent:true,opacity:.13,depthWrite:false,blending:THREE.AdditiveBlending})));

// Connections
function lines(pts,col,maxD,maxC,op){const segs=[];for(let i=0;i<pts.length;i++){let c=0;for(let j=i+1;j<pts.length&&c<maxC;j++){if(pts[i].distanceTo(pts[j])<maxD){segs.push(pts[i].clone(),pts[j].clone());c++;}}}if(!segs.length)return;brain.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(segs),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op,depthWrite:false,blending:THREE.AdditiveBlending})));}
lines(oPos,0xddcc00,0.44,3,0.55);
lines(bPos,0x2244ee,0.40,3,0.28);

// Drag rotation
let drag=false,lx=0,ly=0,rY=0.4,rX=-.05;
gCanvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;e.preventDefault();});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{if(!drag)return;rY+=(e.clientX-lx)*.007;rX+=(e.clientY-ly)*.004;rX=Math.max(-1.2,Math.min(1.2,rX));lx=e.clientX;ly=e.clientY;});
gCanvas.addEventListener('touchstart',e=>{const t=e.touches[0];drag=true;lx=t.clientX;ly=t.clientY;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];rY+=(t.clientX-lx)*.007;rX+=(t.clientY-ly)*.004;rX=Math.max(-1.2,Math.min(1.2,rX));lx=t.clientX;ly=t.clientY;},{passive:false});

// ── Icon nodes (HTML elements positioned over globe) ────────────
const iconEls=[];
const iconDefs=[
  {feat:features[0],angleDeg:195,radiusFactor:1.7},
  {feat:features[1],angleDeg:245,radiusFactor:1.62},
  {feat:features[2],angleDeg:160,radiusFactor:1.65},
  {feat:features[3],angleDeg:120,radiusFactor:1.72},
  {feat:features[4],angleDeg:140,radiusFactor:1.58},
  {feat:features[5],angleDeg:290,radiusFactor:1.6},
];

let activeIdx=-1;
const nameEl=document.getElementById('feature-name');
const descEl=document.getElementById('feature-desc');

// Start with default text shown
nameEl.style.opacity='0.25';
nameEl.style.fontSize='clamp(14px,2vw,26px)';
nameEl.style.letterSpacing='4px';

function selectFeature(idx){
  if(activeIdx===idx){
    // deselect
    iconEls[idx].classList.remove('active');
    activeIdx=-1;
    nameEl.classList.remove('visible');
    descEl.classList.remove('visible');
    setTimeout(()=>{nameEl.textContent='AI-POWERED VIDEO INTELLIGENCE';descEl.textContent='Click a feature to explore';nameEl.style.opacity='0.2';},500);
    return;
  }
  if(activeIdx>=0) iconEls[activeIdx].classList.remove('active');
  activeIdx=idx;
  iconEls[idx].classList.add('active');
  
  // Fade out
  nameEl.classList.remove('visible');
  descEl.classList.remove('visible');
  nameEl.style.opacity='0';
  descEl.style.opacity='0';
  
  setTimeout(()=>{
    nameEl.textContent=features[idx].name.toUpperCase();
    descEl.textContent=features[idx].desc;
    nameEl.style.fontSize='';
    nameEl.style.opacity='';
    nameEl.style.letterSpacing='';
    // Fade in
    setTimeout(()=>{
      nameEl.classList.add('visible');
      descEl.classList.add('visible');
    },20);
  },300);
}

iconDefs.forEach((def,idx)=>{
  const el=document.createElement('div');
  el.className='icon-node';
  el.innerHTML='<svg viewBox="0 0 24 24">'+svgIcons[def.feat.icon]+'</svg>';
  el.style.borderColor=def.feat.col.replace('#','rgba(').replace(/^rgba(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2}))/,
    (_,r,g,b)=>'rgba('+parseInt(r,16)+','+parseInt(g,16)+','+parseInt(b,16)+',0.7)');
  el.addEventListener('click',()=>selectFeature(idx));
  gWrap.appendChild(el);
  iconEls.push(el);
});

function positionIconNodes(){
  const W=gWrap.offsetWidth,H=gWrap.offsetHeight;
  const cx=W/2,cy=H/2;
  // Globe visual radius in pixels (approximate)
  const globeR=Math.min(W,H)*0.38;
  iconDefs.forEach((def,idx)=>{
    const rad=def.angleDeg*Math.PI/180;
    const r=globeR*def.radiusFactor;
    const x=cx+Math.cos(rad)*r-22;
    const y=cy+Math.sin(rad)*r-22;
    iconEls[idx].style.left=x+'px';
    iconEls[idx].style.top=y+'px';
  });
  drawConnectorLines();
}

// ── SVG connector lines from globe center to icon nodes ─────────
let connSVG=null;
function drawConnectorLines(){
  if(connSVG) connSVG.remove();
  const W=gWrap.offsetWidth,H=gWrap.offsetHeight;
  const cx=W/2,cy=H/2;
  const globeR=Math.min(W,H)*0.38;
  
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:5';
  
  iconDefs.forEach((def,idx)=>{
    const rad=def.angleDeg*Math.PI/180;
    const iconR=globeR*def.radiusFactor;
    // Start at globe edge
    const x1=cx+Math.cos(rad)*globeR;
    const y1=cy+Math.sin(rad)*globeR;
    // End at icon center
    const x2=cx+Math.cos(rad)*iconR;
    const y2=cy+Math.sin(rad)*iconR;
    
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke','rgba(80,160,255,0.35)');
    line.setAttribute('stroke-width','1.2');
    line.setAttribute('stroke-dasharray','4 3');
    svg.appendChild(line);
    
    // Small dot at globe edge
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x1);circle.setAttribute('cy',y1);
    circle.setAttribute('r','3');circle.setAttribute('fill','rgba(80,180,255,0.7)');
    svg.appendChild(circle);
  });
  
  gWrap.appendChild(svg);
  connSVG=svg;
}

positionIconNodes();

// ── Animate globe ────────────────────────────────────────────────
let tt=0;
function animGlobe(){
  requestAnimationFrame(animGlobe);tt+=.016;
  if(!drag){rY+=.0008;}
  brain.rotation.y=rY;brain.rotation.x=rX;
  renderer.render(scene,camera);
}
animGlobe();

}); // end Three.js import

// ── Wave canvas (right side) ──────────────────────────────────
const wc=document.getElementById('wave-canvas');
const wCtx=wc.getContext('2d');
function resizeWave(){wc.width=window.innerWidth;wc.height=window.innerHeight;}
resizeWave();window.addEventListener('resize',resizeWave);

let wt=0;
function animWave(){
  requestAnimationFrame(animWave);
  wt+=0.018;
  wc.width=wc.width; // clear
  
  const W=wc.width,H=wc.height;
  const globeW=document.getElementById('globe-wrap').offsetWidth;
  const startX=globeW*0.85;
  const centerY=H/2;
  
  // Draw multiple wave ribbons
  const waves=[
    {amp:55,freq:1.8,phase:0,    color:'rgba(120,60,220,0.22)',width:2},
    {amp:40,freq:2.2,phase:0.8,  color:'rgba(160,80,255,0.18)',width:1.5},
    {amp:70,freq:1.4,phase:1.6,  color:'rgba(80,40,180,0.20)',width:2.5},
    {amp:30,freq:3.0,phase:2.4,  color:'rgba(180,100,255,0.15)',width:1},
    {amp:50,freq:2.5,phase:3.2,  color:'rgba(100,50,200,0.18)',width:1.8},
    {amp:25,freq:4.0,phase:0.5,  color:'rgba(200,120,255,0.12)',width:1},
    {amp:60,freq:1.6,phase:2.0,  color:'rgba(140,70,240,0.16)',width:2},
    {amp:35,freq:2.8,phase:1.2,  color:'rgba(90,45,190,0.14)',width:1.4},
  ];
  
  waves.forEach(w=>{
    wCtx.beginPath();
    wCtx.strokeStyle=w.color;
    wCtx.lineWidth=w.width;
    
    const points=120;
    for(let i=0;i<=points;i++){
      const t=i/points;
      const x=startX+t*(W-startX-20);
      const spread=t*(1-t)*4; // bell curve spread
      const y=centerY+Math.sin(t*Math.PI*w.freq+wt+w.phase)*w.amp*spread;
      const z2=Math.cos(t*Math.PI*w.freq*0.7+wt*1.2+w.phase)*w.amp*0.4*spread;
      if(i===0) wCtx.moveTo(x,y+z2);
      else wCtx.lineTo(x,y+z2);
    }
    wCtx.stroke();
  });
  
  // Bright spine
  wCtx.beginPath();
  wCtx.strokeStyle='rgba(160,90,255,0.45)';
  wCtx.lineWidth=1.5;
  for(let i=0;i<=100;i++){
    const t=i/100;
    const x=startX+t*(W-startX-20);
    const y=centerY+Math.sin(t*Math.PI*2+wt)*25*(t*(1-t)*4);
    if(i===0) wCtx.moveTo(x,y);
    else wCtx.lineTo(x,y);
  }
  wCtx.stroke();
}
animWave();
</script>
</body></html>
