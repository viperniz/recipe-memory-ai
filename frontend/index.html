<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cortexle – Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#04060f;color:#fff;}

/* ---- Canvases ---- */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#sphere-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* ---- Layout ---- */
#ui{position:fixed;inset:0;z-index:10;display:flex;align-items:center;}

/* Logo top-left */
#logo{position:fixed;top:32px;left:40px;z-index:20;display:flex;align-items:center;gap:12px;}
#logo svg{width:44px;height:44px;}
#logo-text{font-size:15px;letter-spacing:3px;color:rgba(255,255,255,0.85);font-weight:400;text-transform:uppercase;}

/* Social icons right edge */
#socials{position:fixed;right:28px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:22px;}
#socials a{color:rgba(200,210,255,0.55);text-decoration:none;transition:color .25s;display:flex;align-items:center;justify-content:center;}
#socials a:hover{color:#fff;}
#socials svg{width:20px;height:20px;fill:currentColor;}

/* Globe area — left half */
#globe-wrap{position:absolute;left:0;top:0;width:52%;height:100%;pointer-events:none;}

/* Right content */
#content{margin-left:50%;padding:0 6% 0 4%;display:flex;flex-direction:column;justify-content:center;gap:0;}

/* Coming Soon heading */
#coming-soon{font-size:clamp(36px,5vw,72px);font-weight:700;letter-spacing:8px;text-transform:uppercase;color:#fff;line-height:1;margin-bottom:36px;text-shadow:0 0 40px rgba(100,180,255,0.35);}

/* Countdown */
#countdown{display:flex;align-items:flex-start;gap:0;margin-bottom:36px;}
.cd-block{display:flex;flex-direction:column;align-items:center;padding:0 22px;}
.cd-block:not(:last-child){border-right:1px solid rgba(255,255,255,0.2);}
.cd-num{font-size:clamp(36px,4.5vw,64px);font-weight:700;color:#fff;line-height:1;letter-spacing:2px;font-variant-numeric:tabular-nums;}
.cd-label{font-size:10px;letter-spacing:3px;color:rgba(200,220,255,0.55);margin-top:8px;text-transform:uppercase;}
.cd-block:first-child{padding-left:0;}

/* Email form */
#email-row p{font-size:14px;color:rgba(200,220,255,0.70);margin-bottom:14px;letter-spacing:.3px;}
#email-row{display:flex;flex-direction:column;}
#form-row{display:flex;gap:0;align-items:stretch;}
#email-input{flex:1;background:rgba(8,18,55,0.65);border:1px solid rgba(80,130,255,0.35);border-right:none;border-radius:4px 0 0 4px;padding:13px 18px;color:#fff;font-size:14px;outline:none;transition:border-color .2s;}
#email-input::placeholder{color:rgba(180,200,255,0.45);}
#email-input:focus{border-color:rgba(100,160,255,0.7);}
#notify-btn{background:linear-gradient(135deg,#5b32e8,#7b52ff);border:none;border-radius:0 4px 4px 0;padding:13px 26px;color:#fff;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;white-space:nowrap;text-transform:uppercase;transition:opacity .2s;}
#notify-btn:hover{opacity:.88;}

/* Feature card */
#feature-card{background:rgba(10,20,70,0.82);border:1px solid rgba(80,130,255,0.25);border-radius:10px;padding:18px 22px;margin-top:22px;max-width:340px;opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s;pointer-events:none;}
#feature-card.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
#feature-name{font-size:15px;font-weight:600;color:#c8e0ff;margin-bottom:6px;}
#feature-desc{font-size:13px;color:rgba(180,210,255,0.65);line-height:1.5;}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>

<!-- Logo -->
<div id="logo">
  <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="20" stroke="rgba(120,180,255,0.7)" stroke-width="1.5"/>
          <circle cx="22" cy="22" r="14" stroke="rgba(120,180,255,0.5)" stroke-width="1.2"/>
              <circle cx="22" cy="22" r="8"  stroke="rgba(120,180,255,0.35)" stroke-width="1"/>
                  <circle cx="22" cy="22" r="3"  fill="rgba(160,210,255,0.8)"/>
                    </svg>
                      <span id="logo-text">Cortexle</span>
                      </div>
                      
                      <!-- Social icons -->
                      <div id="socials">
                        <a href="#" aria-label="Facebook">
                            <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                              </a>
                                <a href="#" aria-label="Twitter">
                                    <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53A4.48 4.48 0 0 0 22.43.36a9 9 0 0 1-2.88 1.1A4.52 4.52 0 0 0 16.11 0c-2.5 0-4.52 2.02-4.52 4.52 0 .35.04.7.11 1.03C7.69 5.37 4.07 3.58 1.64.9A4.52 4.52 0 0 0 1 3.17c0 1.57.8 2.95 2.01 3.76a4.49 4.49 0 0 1-2.05-.57v.06c0 2.19 1.56 4.01 3.63 4.43a4.56 4.56 0 0 1-2.04.08 4.52 4.52 0 0 0 4.22 3.14A9.06 9.06 0 0 1 1 16.54 12.77 12.77 0 0 0 7.29 18.5c8.23 0 12.73-6.82 12.73-12.73 0-.19 0-.38-.01-.57A9.1 9.1 0 0 0 22.46 3z"/></svg>
                                      </a>
                                      </div>
                                      
                                      <!-- Globe placeholder (Three.js renders into sphere-canvas) -->
                                      <div id="globe-wrap"></div>
                                      
                                      <!-- Right side content -->
                                      <div id="ui">
                                        <div id="content">
                                            <div id="coming-soon">Coming Soon</div>
                                                <div id="countdown">
                                                      <div class="cd-block"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Days</span></div>
                                                            <div class="cd-block"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Hours</span></div>
                                                                  <div class="cd-block"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Mins</span></div>
                                                                        <div class="cd-block"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Secs</span></div>
                                                                            </div>
                                                                                <div id="email-row">
                                                                                      <p>Enter your email to get notified about our launch</p>
                                                                                            <div id="form-row">
                                                                                                    <input id="email-input" type="email" placeholder="Enter your email address">
                                                                                                            <button id="notify-btn">Notify Me</button>
                                                                                                                  </div>
                                                                                                                      </div>
                                                                                                                          <div id="feature-card">
                                                                                                                                <div id="feature-name"></div>
                                                                                                                                      <div id="feature-desc"></div>
                                                                                                                                          </div>

                                                                                                                                            <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
                                                                                                                                            <script>
                                                                                                                                            var DPR=Math.min(window.devicePixelRatio||1,2);
                                                                                                                                            
                                                                                                                                            /* ---- STARFIELD ---- */
                                                                                                                                            (function(){
                                                                                                                                              var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
                                                                                                                                                function resize(){c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);}
                                                                                                                                                  resize();
                                                                                                                                                    var stars=[];
                                                                                                                                                      for(var i=0;i<2200;i++)stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*0.85+0.1,a:Math.random()*0.55+0.08,fp:Math.random()*6.283,fs:Math.random()*1.4+0.3});
                                                                                                                                                        function draw(){
                                                                                                                                                            var now=Date.now()*.001;
                                                                                                                                                                ctx.fillStyle='#04060f';ctx.fillRect(0,0,innerWidth,innerHeight);
                                                                                                                                                                    for(var i=0;i<stars.length;i++){
                                                                                                                                                                          var s=stars[i];
                                                                                                                                                                                ctx.globalAlpha=s.a*(0.5+0.5*Math.sin(now*s.fs+s.fp));
                                                                                                                                                                                      ctx.fillStyle='#aac8ff';ctx.beginPath();ctx.arc(s.x%innerWidth,s.y%innerHeight,s.r,0,6.283);ctx.fill();
                                                                                                                                                                                          }
                                                                                                                                                                                              ctx.globalAlpha=1;
                                                                                                                                                                                                }
                                                                                                                                                                                                  draw();setInterval(draw,80);
                                                                                                                                                                                                    window.addEventListener('resize',function(){resize();draw();});
                                                                                                                                                                                                    })();
                                                                                                                                                                                                    
                                                                                                                                                                                                    /* ---- 3-D ORB (Three.js) — positioned on LEFT half ---- */
                                                                                                                                                                                                    function initOrb(){
                                                                                                                                                                                                      var canvas=document.getElementById('sphere-canvas');
                                                                                                                                                                                                        var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true,premultipliedAlpha:false});
                                                                                                                                                                                                          renderer.setPixelRatio(DPR);renderer.setSize(innerWidth,innerHeight);
                                                                                                                                                                                                            renderer.setClearColor(0x000000,0);renderer.sortObjects=false;
                                                                                                                                                                                                              var scene=new THREE.Scene();
                                                                                                                                                                                                                var camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);
                                                                                                                                                                                                                  camera.position.set(0,0,6);
                                                                                                                                                                                                                    camera.updateProjectionMatrix();camera.updateMatrixWorld();
                                                                                                                                                                                                                    
                                                                                                                                                                                                                      function getOrbCenter(){
                                                                                                                                                                                                                          var fH=2*Math.tan(THREE.MathUtils.degToRad(camera.fov/2))*camera.position.z;
                                                                                                                                                                                                                              var fW=fH*camera.aspect;
                                                                                                                                                                                                                                  var cx=(innerWidth*0.26/innerWidth)*2-1;
                                                                                                                                                                                                                                      var v=new THREE.Vector3(cx,0,0.5).unproject(camera);
                                                                                                                                                                                                                                          var dir=v.sub(camera.position).normalize();
                                                                                                                                                                                                                                              var dist=-camera.position.z/dir.z;
                                                                                                                                                                                                                                                  var wp=camera.position.clone().addScaledVector(dir,dist);
                                                                                                                                                                                                                                                      var R=(Math.min(innerWidth*0.24,innerHeight*0.38)/innerWidth)*fW*0.47;
                                                                                                                                                                                                                                                          return {x:wp.x,y:0,R:R};
                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                              var P=getOrbCenter(),OX=P.x,OY=P.y,R=P.R;
                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                var orbGroup=new THREE.Group();
                                                                                                                                                                                                                                                                  orbGroup.position.set(OX,OY,0);
                                                                                                                                                                                                                                                                    scene.add(orbGroup);
                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                      function mkSprite(sz,c0,c1,op){
                                                                                                                                                                                                                                                                          var gc=document.createElement('canvas');gc.width=gc.height=256;
                                                                                                                                                                                                                                                                              var c2=gc.getContext('2d');
                                                                                                                                                                                                                                                                                  var g=c2.createRadialGradient(128,128,0,128,128,128);
                                                                                                                                                                                                                                                                                      g.addColorStop(0,c0);g.addColorStop(0.3,c1);
                                                                                                                                                                                                                                                                                          g.addColorStop(0.65,'rgba(5,15,80,0.04)');g.addColorStop(1,'rgba(0,0,0,0)');
                                                                                                                                                                                                                                                                                              c2.fillStyle=g;c2.fillRect(0,0,256,256);
                                                                                                                                                                                                                                                                                                  var m=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(gc),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:op});
                                                                                                                                                                                                                                                                                                      var s=new THREE.Sprite(m);s.scale.set(sz,sz,1);return s;
                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                          var outerH=mkSprite(R*7,'rgba(10,50,180,0.20)','rgba(6,28,140,0.07)',0.85);
                                                                                                                                                                                                                                                                                                            var midV  =mkSprite(R*4,'rgba(35,130,240,0.45)','rgba(15,75,210,0.14)',0.78);
                                                                                                                                                                                                                                                                                                              var coreV =mkSprite(R*2.3,'rgba(90,190,255,0.70)','rgba(45,150,255,0.28)',0.73);
                                                                                                                                                                                                                                                                                                                var hotC  =mkSprite(R*1.0,'rgba(210,248,255,0.90)','rgba(120,225,255,0.55)',0.86);
                                                                                                                                                                                                                                                                                                                  orbGroup.add(outerH,midV,coreV,hotC);
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                    /* Rim glow (right side of orb) */
                                                                                                                                                                                                                                                                                                                      var rGc=document.createElement('canvas');rGc.width=rGc.height=256;
                                                                                                                                                                                                                                                                                                                        var rc=rGc.getContext('2d');
                                                                                                                                                                                                                                                                                                                          var rg=rc.createRadialGradient(192,128,0,128,128,128);
                                                                                                                                                                                                                                                                                                                            rg.addColorStop(0,'rgba(140,235,255,0.62)');rg.addColorStop(0.28,'rgba(45,165,255,0.22)');rg.addColorStop(0.65,'rgba(12,60,180,0.04)');rg.addColorStop(1,'rgba(0,0,0,0)');
                                                                                                                                                                                                                                                                                                                              rc.fillStyle=rg;rc.fillRect(0,0,256,256);
                                                                                                                                                                                                                                                                                                                                var rimM=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(rGc),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.48});
                                                                                                                                                                                                                                                                                                                                  var rimS=new THREE.Sprite(rimM);rimS.scale.set(R*3.2,R*3.2,1);
                                                                                                                                                                                                                                                                                                                                    rimS.position.set(OX+R*0.30,OY,0.02);scene.add(rimS);
                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                      /* Point cloud */
                                                                                                                                                                                                                                                                                                                                        var N=9000,ptO=new Float32Array(N*3),ptPos=new Float32Array(N*3);
                                                                                                                                                                                                                                                                                                                                          var ptPh=new Float32Array(N),ptSp=new Float32Array(N);
                                                                                                                                                                                                                                                                                                                                            var phi=Math.PI*(3-Math.sqrt(5));
                                                                                                                                                                                                                                                                                                                                              for(var i=0;i<N;i++){
                                                                                                                                                                                                                                                                                                                                                  var y=1-(i/(N-1))*2,rr=Math.sqrt(Math.max(0,1-y*y)),th=phi*i;
                                                                                                                                                                                                                                                                                                                                                      var jt=0.84+Math.random()*0.23;
                                                                                                                                                                                                                                                                                                                                                          ptO[i*3]=Math.cos(th)*rr*R*jt;ptO[i*3+1]=y*R*jt;ptO[i*3+2]=Math.sin(th)*rr*R*jt;
                                                                                                                                                                                                                                                                                                                                                              ptPh[i]=Math.random()*6.283;ptSp[i]=0.5+Math.random()*1.5;
                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                  ptPos.set(ptO);
                                                                                                                                                                                                                                                                                                                                                                    var ptGeo=new THREE.BufferGeometry();
                                                                                                                                                                                                                                                                                                                                                                      var ptA=new THREE.BufferAttribute(ptPos,3);ptA.setUsage(THREE.DynamicDrawUsage);
                                                                                                                                                                                                                                                                                                                                                                        ptGeo.setAttribute('position',ptA);
                                                                                                                                                                                                                                                                                                                                                                          var ptC=document.createElement('canvas');ptC.width=ptC.height=32;
                                                                                                                                                                                                                                                                                                                                                                            var px2=ptC.getContext('2d');
                                                                                                                                                                                                                                                                                                                                                                              var pg=px2.createRadialGradient(16,16,0,16,16,16);
                                                                                                                                                                                                                                                                                                                                                                                pg.addColorStop(0,'rgba(230,252,255,1)');pg.addColorStop(0.28,'rgba(90,210,255,0.85)');pg.addColorStop(0.65,'rgba(30,140,255,0.22)');pg.addColorStop(1,'rgba(0,0,0,0)');
                                                                                                                                                                                                                                                                                                                                                                                  px2.fillStyle=pg;px2.fillRect(0,0,32,32);
                                                                                                                                                                                                                                                                                                                                                                                    var ptMat=new THREE.PointsMaterial({map:new THREE.CanvasTexture(ptC),size:0.082,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.90});
                                                                                                                                                                                                                                                                                                                                                                                      orbGroup.add(new THREE.Points(ptGeo,ptMat));
                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                        /* Geodesic arcs */
                                                                                                                                                                                                                                                                                                                                                                                          var NV=130,verts=[];
                                                                                                                                                                                                                                                                                                                                                                                            for(var i=0;i<NV;i++){var idx=Math.floor(i*(N/NV));verts.push(new THREE.Vector3(ptO[idx*3],ptO[idx*3+1],ptO[idx*3+2]));}
                                                                                                                                                                                                                                                                                                                                                                                              for(var i=0;i<verts.length;i++)for(var j=i+1;j<verts.length;j++){
                                                                                                                                                                                                                                                                                                                                                                                                  if(verts[i].distanceTo(verts[j])<R*0.42&&Math.random()<0.16){
                                                                                                                                                                                                                                                                                                                                                                                                        var m2=verts[i].clone().add(verts[j]).multiplyScalar(0.5).normalize().multiplyScalar(R*1.03);
                                                                                                                                                                                                                                                                                                                                                                                                              var pts2=new THREE.QuadraticBezierCurve3(verts[i],m2,verts[j]).getPoints(12);
                                                                                                                                                                                                                                                                                                                                                                                                                    var g2=new THREE.BufferGeometry().setFromPoints(pts2);
                                                                                                                                                                                                                                                                                                                                                                                                                          var br=Math.random()<0.13;
                                                                                                                                                                                                                                                                                                                                                                                                                                orbGroup.add(new THREE.Line(g2,new THREE.LineBasicMaterial({color:br?0x88f0ff:0x1e6ab8,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:br?0.60:0.13})));
                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                        /* Wisps */
                                                                                                                                                                                                                                                                                                                                                                                                                                          var wisps=[];
                                                                                                                                                                                                                                                                                                                                                                                                                                            [{tX:0.48,tZ:0.20,ph:0,sp:0.21,op:0.38,c:0x50d8ff},{tX:-0.68,tZ:0.58,ph:1.3,sp:0.15,op:0.32,c:0x40b8ff},{tX:0.82,tZ:-0.35,ph:2.6,sp:0.26,op:0.26,c:0x70e8ff},{tX:-0.30,tZ:-0.74,ph:3.9,sp:0.18,op:0.34,c:0x60d0ff},{tX:0.22,tZ:0.90,ph:5.1,sp:0.23,op:0.24,c:0x80daff},{tX:-0.92,tZ:0.12,ph:0.7,sp:0.20,op:0.22,c:0x48c8ff},{tX:0.58,tZ:-0.62,ph:4.4,sp:0.17,op:0.30,c:0x58d4ff}].forEach(function(d){
                                                                                                                                                                                                                                                                                                                                                                                                                                                var NW=80,op2=[];
                                                                                                                                                                                                                                                                                                                                                                                                                                                    for(var i=0;i<=NW;i++){var a=(i/NW)*Math.PI*2,px3=Math.cos(a)*R,py3=Math.sin(a)*R*0.28,ry3=py3*Math.cos(d.tX),rz3=py3*Math.sin(d.tX),fx3=px3*Math.cos(d.tZ)-rz3*Math.sin(d.tZ),fz3=px3*Math.sin(d.tZ)+rz3*Math.cos(d.tZ);op2.push(new THREE.Vector3(fx3,ry3,fz3));}
                                                                                                                                                                                                                                                                                                                                                                                                                                                        var gw=new THREE.BufferGeometry().setFromPoints(op2);gw.attributes.position.setUsage(THREE.DynamicDrawUsage);
                                                                                                                                                                                                                                                                                                                                                                                                                                                            wisps.push({geo:gw,d:d,N:NW,o:op2.map(function(p){return p.clone();})});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                orbGroup.add(new THREE.Line(gw,new THREE.LineBasicMaterial({color:d.c,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:d.op})));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* Sparks */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      var NS2=180,sP=new Float32Array(NS2*3),sV=[],sL=new Float32Array(NS2),sMx=new Float32Array(NS2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function rSp(i){var t2=Math.random()*Math.PI*2,p2=Math.acos(2*Math.random()-1),sx=Math.sin(p2)*Math.cos(t2),sy=Math.cos(p2),sz=Math.sin(p2)*Math.sin(t2);sP[i*3]=sx*R;sP[i*3+1]=sy*R;sP[i*3+2]=sz*R;sV[i]=new THREE.Vector3(sx,sy,sz).multiplyScalar(0.004+Math.random()*0.007);sL[i]=0;sMx[i]=30+Math.random()*70;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          for(var i=0;i<NS2;i++){rSp(i);sL[i]=Math.random()*50;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            var sC2=document.createElement('canvas');sC2.width=sC2.height=16;var sX2=sC2.getContext('2d');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              var sG2=sX2.createRadialGradient(8,8,0,8,8,8);sG2.addColorStop(0,'rgba(245,255,255,1)');sG2.addColorStop(0.4,'rgba(80,228,255,0.65)');sG2.addColorStop(1,'rgba(0,0,0,0)');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                sX2.fillStyle=sG2;sX2.fillRect(0,0,16,16);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  var sGeo=new THREE.BufferGeometry();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    var sAttr=new THREE.BufferAttribute(sP.slice(),3);sAttr.setUsage(THREE.DynamicDrawUsage);sGeo.setAttribute('position',sAttr);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      var sMat=new THREE.PointsMaterial({map:new THREE.CanvasTexture(sC2),size:0.058,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.86});

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function hexPath(cx,cy,r){

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* ---- COUNTDOWN ---- */

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function tick(){

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        tick();setInterval(tick,1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        })();
