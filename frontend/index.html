<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center}
#header{text-align:center;padding:20px 20px 0;z-index:10;position:relative;flex-shrink:0}
.logo{font-size:2.4rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:0.85rem;color:#4a6080;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
#canvas-wrap{flex:1;width:100%;position:relative;min-height:0}
#three-canvas{width:100%!important;height:100%!important;display:block;cursor:grab}
#three-canvas:active{cursor:grabbing}
#label{position:absolute;left:50%;top:18%;transform:translateX(-50%);background:rgba(0,5,20,0.92);border:1px solid rgba(74,240,252,0.7);border-radius:10px;padding:10px 22px;font-size:0.95rem;font-weight:700;color:#4af0fc;letter-spacing:2px;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity 0.4s;box-shadow:0 0 24px rgba(74,240,252,0.3);white-space:nowrap}
#label.show{opacity:1}
#drag-tip{position:absolute;bottom:4px;width:100%;text-align:center;color:rgba(255,255,255,0.2);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;pointer-events:none}
#bottom{text-align:center;padding:10px 20px 16px;width:100%;max-width:560px;flex-shrink:0;z-index:10;position:relative}
.cd{display:flex;justify-content:center;gap:16px;margin-bottom:12px;align-items:center}
.cdu{text-align:center}
.cdn{font-size:1.9rem;font-weight:700;color:#60a5fa;display:block;line-height:1}
.cdl{font-size:0.55rem;color:#334155;text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.sep{color:#1a2f4a;font-size:1.6rem;padding-bottom:12px}
.email-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.email-row input{padding:10px 14px;border-radius:8px;border:1px solid rgba(74,240,252,0.2);background:rgba(255,255,255,0.04);color:#fff;font-size:0.85rem;width:220px;outline:none}
.email-row input:focus{border-color:rgba(74,240,252,0.6)}
.email-row button{padding:10px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,#4f46e5,#0ea5e9);color:#fff;font-weight:700;font-size:0.85rem;cursor:pointer;transition:opacity 0.2s}
.email-row button:hover{opacity:0.85}
.tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.tag{padding:3px 10px;border-radius:20px;border:1px solid rgba(74,240,252,0.18);color:#334155;font-size:0.68rem}
</style>
</head>
<body>
<div id="header">
  <div class="logo">CORTEXLE</div>
  <div class="tagline">AI-Powered Video Intelligence - Coming Soon</div>
</div>
<div id="canvas-wrap">
  <canvas id="three-canvas"></canvas>
  <div id="label"></div>
  <div id="drag-tip">Drag to rotate | Click points to explore</div>
</div>
<div id="bottom">
  <div class="cd">
    <div class="cdu"><span class="cdn" id="cd-d">91</span><div class="cdl">Days</div></div>
    <div class="sep">:</div>
    <div class="cdu"><span class="cdn" id="cd-h">00</span><div class="cdl">Hours</div></div>
    <div class="sep">:</div>
    <div class="cdu"><span class="cdn" id="cd-m">00</span><div class="cdl">Mins</div></div>
    <div class="sep">:</div>
    <div class="cdu"><span class="cdn" id="cd-s">00</span><div class="cdl">Secs</div></div>
  </div>
  <div class="email-row">
    <input type="email" id="emailInput" placeholder="Enter your email">
    <button onclick="notify()">Notify Me</button>
  </div>
  <div class="tags">
    <span class="tag">AI Video</span><span class="tag">Transcription</span><span class="tag">Semantic Search</span><span class="tag">Chrome Extension</span><span class="tag">Smart Notes</span>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
var wrap=document.getElementById('canvas-wrap');
var canvas=document.getElementById('three-canvas');
var W=wrap.clientWidth,H=wrap.clientHeight;
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,1);
renderer.setSize(W,H);
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);
camera.position.z=4.2;
function onResize(){
  W=wrap.clientWidth;H=wrap.clientHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H;camera.updateProjectionMatrix();
}
window.addEventListener('resize',onResize);

// Lights
var amb=new THREE.AmbientLight(0x0a1a3a,3);scene.add(amb);
var d1=new THREE.DirectionalLight(0x3366cc,4);d1.position.set(3,4,5);scene.add(d1);
var d2=new THREE.DirectionalLight(0x6633aa,2);d2.position.set(-3,1,-2);scene.add(d2);
var p1=new THREE.PointLight(0x2244aa,5,12);p1.position.set(-2,2,3);scene.add(p1);
var p2=new THREE.PointLight(0x4400aa,3,10);p2.position.set(2,-2,-2);scene.add(p2);

// Brain geometry - distorted sphere
var brainGeo=new THREE.SphereGeometry(1,96,72);
var pos=brainGeo.attributes.position;
for(var i=0;i<pos.count;i++){
  var x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
  // Scale to brain proportions
  x*=1.4; y*=1.05; z*=0.78;
  // Flatten inferior surface
  if(y<-0.2){var f=(-y-0.2)/0.8;y+=f*0.35;}
  // Temporal lobe bulge (lower left, front)
  if(x<-0.05&&x>-1.1&&y<0&&y>-0.8){
    var tl=Math.exp(-Math.pow(x+0.65,2)/0.06-Math.pow(y+0.5,2)/0.08);
    x-=tl*0.22; y-=tl*0.14; z+=tl*0.05;
  }
  // Frontal pole (left, slightly forward)
  if(x<-0.4&&y>-0.2&&y<0.5){
    var fp=Math.exp(-Math.pow(x+0.95,2)/0.08-Math.pow(y-0.1,2)/0.4);
    x-=fp*0.06; z+=fp*0.08;
  }
  // Occipital pole (right, slight protrusion)
  if(x>0.8&&y>-0.3&&y<0.5){
    var op=Math.exp(-Math.pow(x-1.1,2)/0.05-Math.pow(y,2)/0.25);
    x+=op*0.1;
  }
  // Parietal top
  if(y>0.6&&x>-0.5&&x<0.7){
    var pp=Math.exp(-Math.pow(y-0.85,2)/0.08-Math.pow(x-0.1,2)/0.35);
    y+=pp*0.1;
  }
  // Surface convolutions
  var conv=Math.sin(x*9+y*6)*Math.cos(z*7+x*4)*0.022
          +Math.sin(y*11+z*8)*Math.cos(x*7)*0.016
          +Math.cos(x*14+z*9)*0.011;
  x+=conv*0.9; y+=conv*0.6; z+=conv*0.5;
  pos.setXYZ(i,x,y,z);
}
brainGeo.computeVertexNormals();

// Brain mesh - translucent deep blue
var brainMat=new THREE.MeshPhongMaterial({
  color:0x080e28,emissive:0x0a1840,emissiveIntensity:0.5,
  specular:0x3366dd,shininess:80,transparent:true,opacity:0.92
});
var brainMesh=new THREE.Mesh(brainGeo,brainMat);

// Glow shell (outer, back side for rim glow)
var glowGeo=new THREE.SphereGeometry(1.04,32,24);
var gp=glowGeo.attributes.position;
for(var i=0;i<gp.count;i++){
  var gx=gp.getX(i),gy=gp.getY(i),gz=gp.getZ(i);
  gx*=1.4;gy*=1.05;gz*=0.78;
  if(gy<-0.2){var gf=(-gy-0.2)/0.8;gy+=gf*0.35;}
  gp.setXYZ(i,gx,gy,gz);
}
glowGeo.computeVertexNormals();
var glowMat=new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:0.07,side:THREE.BackSide});
var glowMesh=new THREE.Mesh(glowGeo,glowMat);

// Rim outline (slightly larger, wireframe-ish edges)
var rimGeo=new THREE.SphereGeometry(1.01,32,24);
var rp=rimGeo.attributes.position;
for(var i=0;i<rp.count;i++){
  var rx=rp.getX(i),ry=rp.getY(i),rz=rp.getZ(i);
  rx*=1.4;ry*=1.05;rz*=0.78;
  if(ry<-0.2){var rf=(-ry-0.2)/0.8;ry+=rf*0.35;}
  rp.setXYZ(i,rx,ry,rz);
}
rimGeo.computeVertexNormals();
var rimMat=new THREE.MeshBasicMaterial({color:0x88bbff,transparent:true,opacity:0.25,wireframe:true});
var rimMesh=new THREE.Mesh(rimGeo,rimMat);

// Brain group (all brain objects rotate together)
var brainGroup=new THREE.Group();
brainGroup.add(brainMesh);
brainGroup.add(glowMesh);
brainGroup.add(rimMesh);
scene.add(brainGroup);

// Neural nodes on surface
var nodeData=[];
var nGrp=new THREE.Group();
brainGroup.add(nGrp);

var brainV=brainGeo.attributes.position;
var usedIdx={};
var nodeCount=0;
while(nodeCount<130){
  var vi=Math.floor(Math.random()*brainV.count);
  if(usedIdx[vi])continue;
  usedIdx[vi]=true;
  var nx=brainV.getX(vi),ny=brainV.getY(vi),nz=brainV.getZ(vi);
  var isO=Math.random()<0.22;
  var nr=isO?(Math.random()*0.028+0.018):(Math.random()*0.02+0.01);
  var nm=new THREE.Mesh(
    new THREE.SphereGeometry(nr,8,5),
    new THREE.MeshBasicMaterial({color:isO?0xff8833:0xaaddff,transparent:true,opacity:0.88})
  );
  nm.position.set(nx,ny,nz);
  nGrp.add(nm);
  nodeData.push({mesh:nm,orange:isO,phase:Math.random()*Math.PI*2});
  nodeCount++;
}

// Neural lines
var linesGrp=new THREE.Group();
brainGroup.add(linesGrp);
var lmO=new THREE.LineBasicMaterial({color:0xffaa22,transparent:true,opacity:0.5});
var lmB=new THREE.LineBasicMaterial({color:0x4477cc,transparent:true,opacity:0.3});
for(var i=0;i<nodeData.length;i++){
  for(var j=i+1;j<nodeData.length;j++){
    var a=nodeData[i].mesh.position,b=nodeData[j].mesh.position;
    var dd=a.distanceTo(b);
    if(dd<0.6&&Math.random()<0.38){
      var lg=new THREE.BufferGeometry().setFromPoints([a.clone(),b.clone()]);
      var lm=(nodeData[i].orange&&nodeData[j].orange)?lmO:lmB;
      linesGrp.add(new THREE.Line(lg,lm));
    }
  }
}

// Feature hotspots - 3D positions on brain surface
var features=[
  {id:'aiq',  name:'AI Q&A',           px:-0.9,py: 0.3,pz: 0.5, tY:-0.5,tX: 0.1},
  {id:'vid',  name:'Video Processing', px: 0.0,py: 0.95,pz:0.3,  tY: 0.0,tX:-0.55},
  {id:'tran', name:'Transcription',    px:-0.85,py:-0.25,pz:0.55,tY:-0.5,tX: 0.28},
  {id:'sem',  name:'Semantic Search',  px: 0.98,py: 0.15,pz:0.1, tY: 0.65,tX:-0.1},
  {id:'note', name:'Smart Notes',      px: 0.6,py:-0.55,pz:0.2,  tY: 0.45,tX: 0.42},
  {id:'ext',  name:'Chrome Extension', px: 0.0,py:-0.78,pz:-0.1, tY: 0.0, tX: 0.55}
];

var hsGrp=new THREE.Group();
brainGroup.add(hsGrp);
var hsMeshes=[];
features.forEach(function(f,i){
  var hg=new THREE.SphereGeometry(0.048,12,8);
  var hm2=new THREE.MeshBasicMaterial({color:0x4af0fc,transparent:true,opacity:0.95});
  var hs=new THREE.Mesh(hg,hm2);
  hs.position.set(f.px,f.py,f.pz);
  hs.userData={feature:f,idx:i};
  
  // Pulsing ring (Billboard)
  var rg=new THREE.RingGeometry(0.06,0.09,24);
  var rm=new THREE.MeshBasicMaterial({color:0x4af0fc,transparent:true,opacity:0.45,side:THREE.DoubleSide});
  var ring=new THREE.Mesh(rg,rm);
  hs.add(ring);
  
  hsGrp.add(hs);
  hsMeshes.push(hs);
});

// Rotation state
var rotX=0.18,rotY_=-0.35;
var tRotX=0.18,tRotY=-0.35;
var isDrag=false,lX=0,lY=0;
var autoSpin=true;
var label=document.getElementById('label');
var activeFeat=null;
var ckX=0,ckY=0;

canvas.addEventListener('mousedown',function(e){
  isDrag=true;lX=e.clientX;lY=e.clientY;
  ckX=e.clientX;ckY=e.clientY;
  autoSpin=false;
},{passive:true});
document.addEventListener('mousemove',function(e){
  if(!isDrag)return;
  tRotY+=(e.clientX-lX)*0.009;
  tRotX+=(e.clientY-lY)*0.006;
  tRotX=Math.max(-1.1,Math.min(1.1,tRotX));
  lX=e.clientX;lY=e.clientY;
});
document.addEventListener('mouseup',function(){isDrag=false;});
canvas.addEventListener('touchstart',function(e){
  isDrag=true;lX=e.touches[0].clientX;lY=e.touches[0].clientY;
  ckX=lX;ckY=lY;autoSpin=false;e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',function(e){
  if(!isDrag)return;
  tRotY+=(e.touches[0].clientX-lX)*0.009;
  tRotX+=(e.touches[0].clientY-lY)*0.006;
  lX=e.touches[0].clientX;lY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',function(){isDrag=false;});

var ray=new THREE.Raycaster();
var mv=new THREE.Vector2();
canvas.addEventListener('click',function(e){
  if(Math.abs(e.clientX-ckX)>8||Math.abs(e.clientY-ckY)>8)return;
  var rect=canvas.getBoundingClientRect();
  mv.x=((e.clientX-rect.left)/rect.width)*2-1;
  mv.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mv,camera);
  var hits=ray.intersectObjects(hsMeshes,false);
  if(hits.length){
    var hs=hits[0].object;
    var f=hs.userData.feature;
    if(activeFeat&&activeFeat.id===f.id){
      activeFeat=null;label.classList.remove('show');autoSpin=true;
    } else {
      activeFeat=f;
      label.textContent=f.name;
      label.classList.add('show');
      tRotY=f.tY;tRotX=f.tX;
    }
  } else {
    activeFeat=null;label.classList.remove('show');
  }
});

var clock2=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var t=clock2.getElapsedTime();
  if(autoSpin&&!isDrag)tRotY+=0.003;
  rotX+=(tRotX-rotX)*0.07;
  rotY_+=(tRotY-rotY_)*0.07;
  brainGroup.rotation.x=rotX;
  brainGroup.rotation.y=rotY_;
  
  // Animate nodes
  nodeData.forEach(function(nd,i){
    var p=0.65+Math.sin(t*2.8+nd.phase)*0.35;
    nd.mesh.scale.setScalar(p);
    if(nd.orange){
      nd.mesh.material.color.setRGB(1,0.45+Math.sin(t*3+nd.phase)*0.15,0.05);
      nd.mesh.material.opacity=0.7+p*0.3;
    } else {
      nd.mesh.material.opacity=0.45+p*0.45;
    }
  });
  
  // Hotspot animate + billboard rings
  hsMeshes.forEach(function(hs,i){
    var f=features[i];
    var isAct=activeFeat&&activeFeat.id===f.id;
    var p=0.75+Math.sin(t*3.5+i*1.1)*0.25;
    hs.scale.setScalar(p);
    hs.material.color.setHex(isAct?0xff6633:0x4af0fc);
    if(hs.children[0]){
      // Make ring face camera
      var wq=new THREE.Quaternion();
      brainGroup.getWorldQuaternion(wq);
      hs.children[0].quaternion.copy(wq).invert().multiply(camera.quaternion);
    }
  });
  
  renderer.render(scene,camera);
}
animate();

var tgt=new Date();tgt.setDate(tgt.getDate()+91);
function tick(){
  var d=Math.max(0,tgt-new Date());
  document.getElementById('cd-d').textContent=String(Math.floor(d/86400000)).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');
}
tick();setInterval(tick,1000);
window.notify=function(){var e=document.getElementById('emailInput').value;if(e&&e.includes('@')){alert('Thanks! We will notify you at '+e);document.getElementById('emailInput').value='';}};
})();
</script>
</body>
</html>
