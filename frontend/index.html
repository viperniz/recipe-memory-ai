<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;background:#000}
body{color:#fff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
#hdr{text-align:center;padding:22px 20px 0;flex-shrink:0}
.logo{font-size:2.4rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tl{font-size:0.82rem;color:#3a5070;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
#bw{flex:1;display:flex;align-items:center;justify-content:center;position:relative;width:100%}
#bc{display:block;cursor:grab;max-width:100%}
#bc:active{cursor:grabbing}
#lbl{position:absolute;top:6%;left:50%;transform:translateX(-50%);background:rgba(0,4,18,0.93);border:1px solid rgba(74,240,252,0.75);border-radius:10px;padding:10px 24px;font-size:0.95rem;font-weight:700;color:#4af0fc;letter-spacing:2px;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity 0.35s;box-shadow:0 0 28px rgba(74,240,252,0.35);white-space:nowrap;z-index:10}
#lbl.show{opacity:1}
#dtip{color:rgba(255,255,255,0.16);font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:4px 0;flex-shrink:0}
#bot{text-align:center;padding:10px 20px 20px;width:100%;max-width:540px;flex-shrink:0}
.cd{display:flex;justify-content:center;gap:14px;margin-bottom:12px;align-items:center}
.cdu{text-align:center}.cdn{font-size:1.9rem;font-weight:700;color:#60a5fa;display:block;line-height:1}
.cdl{font-size:0.52rem;color:#2a3a4a;text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.sp{color:#162030;font-size:1.6rem;padding-bottom:12px}
.er{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.er input{padding:10px 14px;border-radius:8px;border:1px solid rgba(74,240,252,0.2);background:rgba(255,255,255,0.04);color:#fff;font-size:0.83rem;width:215px;outline:none}
.er input:focus{border-color:rgba(74,240,252,0.6)}
.er button{padding:10px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,#4f46e5,#0ea5e9);color:#fff;font-weight:700;font-size:0.83rem;cursor:pointer}
.tgs{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.tg{padding:3px 9px;border-radius:20px;border:1px solid rgba(74,240,252,0.15);color:#253040;font-size:0.63rem}
</style>
</head>
<body>
<div id="hdr"><div class="logo">CORTEXLE</div><div class="tl">AI-Powered Video Intelligence — Coming Soon</div></div>
<div id="bw"><canvas id="bc"></canvas><div id="lbl"></div></div>
<div id="dtip">⟵ Drag to rotate &nbsp;|&nbsp; Click glowing points to explore ⟶</div>
<div id="bot">
  <div class="cd">
    <div class="cdu"><span class="cdn" id="cd-d">91</span><div class="cdl">Days</div></div><div class="sp">:</div>
    <div class="cdu"><span class="cdn" id="cd-h">00</span><div class="cdl">Hours</div></div><div class="sp">:</div>
    <div class="cdu"><span class="cdn" id="cd-m">00</span><div class="cdl">Mins</div></div><div class="sp">:</div>
    <div class="cdu"><span class="cdn" id="cd-s">00</span><div class="cdl">Secs</div></div>
  </div>
  <div class="er"><input type="email" id="ei" placeholder="Enter your email"><button onclick="notify()">Notify Me</button></div>
  <div class="tgs"><span class="tg">AI Video</span><span class="tg">Transcription</span><span class="tg">Semantic Search</span><span class="tg">Chrome Extension</span><span class="tg">Smart Notes</span></div>
</div>
<script>
(function(){
'use strict';
var C=document.getElementById('bc');
var ctx=C.getContext('2d');
var BW=600,BH=460;
C.width=BW;C.height=BH;
C.style.width=BW+'px';C.style.height=BH+'px';

// ── Rotation ──────────────────────────────────────────────────
var rotY=0,targetRotY=0;
var isDrag=false,dragSX=0,rotSY=0;
var autoSpin=true;
var actF=null;
var lbl=document.getElementById('lbl');
var ckx=0,cky=0;

// ── Brain anatomy paths ───────────────────────────────────────
// Scale: brain fits nicely in 600x460 canvas
// Frontal lobe LEFT (x~90-200), Occipital RIGHT (x~470-520)
// Top vertex y~55, base y~310 for main cerebrum

// Main cerebrum - lateral profile
var CER=[
  // Start at frontal base (inferior frontal)
  [138,305],
  // Frontal lobe traces up and forward
  [108,285],[88,262],[78,236],[76,208],[80,180],
  [88,155],[102,132],[120,112],
  // Frontoparietal
  [142,96],[168,82],[198,70],[230,60],
  // Parietal - vertex top  
  [264,54],[300,50],[336,54],
  // Parieto-occipital
  [370,62],[402,74],[430,88],[452,106],
  // Occipital
  [466,126],[476,148],[480,172],[478,196],
  // Temporal-occipital junction (back lower)
  [470,218],[456,236],[438,250],[418,258],
  // Superior temporal / parieto-temporal
  [395,262],[370,264],[344,262],[318,266],
  // Temporal pole region (upper temporal)
  [292,270],[266,272],[240,268],[215,262],
  // Sylvian fissure notch
  [194,254],[175,242],[160,228],
  // Frontal base back to start
  [148,270],[140,288],[138,305]
];

// Temporal lobe (below Sylvian fissure) - integrated, not too separate
var TEM=[
  [160,228],// sylvian fissure point
  [148,240],[138,256],[130,272],[124,290],
  [120,308],[118,326],[120,344],[126,360],
  [136,372],[150,380],[166,384],[182,382],
  [198,376],[212,364],[222,348],[228,330],
  [230,312],[226,295],[218,278],[206,264],
  [194,254],[175,242],[160,228]
];

// Cerebellum (lower right, connected)
var CERE=[
  [430,262],[448,258],[464,258],[478,262],
  [490,272],[496,286],[496,302],[490,318],
  [480,330],[466,338],[450,340],[434,338],
  [420,330],[412,318],[410,304],[412,290],
  [418,276],[430,262]
];

// Brainstem (connects bottom of cerebrum to cerebellum area)
var BS=[
  [222,300],[240,294],[256,298],[268,308],
  [274,322],[274,340],[272,358],[266,374],
  [256,386],[242,392],[228,390],[216,382],
  [208,368],[206,352],[208,336],[214,320],
  [222,300]
];

// ── Nodes - distributed across entire brain ───────────────────
// Orange hot nodes - spread ALL over the brain surface
var ON=[ // orange nodes [x,y]
  // Frontal lobe (left region)
  [120,175],[145,155],[170,145],[148,200],[125,225],
  // Central parietal
  [200,125],[232,110],[268,105],[302,115],[200,165],
  // Parietal
  [240,145],[275,135],[310,140],[340,148],[370,148],
  // Post-parietal / occipital
  [400,150],[425,162],[448,180],[462,200],
  // Middle band
  [235,188],[265,178],[295,172],[328,175],[360,178],
  [390,182],[418,195],[442,215],
  // Lower middle
  [180,230],[210,215],[245,210],[278,205],[310,208],
  [342,210],[372,215],[400,222],[425,238],
  // Upper temporal
  [185,258],[218,248],[252,242],[285,240],[318,242],
  [348,240],[378,244],[406,250],
  // Temporal area
  [152,285],[175,298],[200,308],[228,315],[256,310],
  [284,308],[312,305],[340,302],[368,298],[395,292]
];

var BN=[ // blue/white nodes [x,y]
  [135,195],[115,215],[92,240],[95,200],[108,168],
  [168,120],[198,105],[228,96],[260,92],[294,92],
  [326,96],[358,106],[385,118],[410,130],[432,148],
  [456,168],[470,190],[474,208],[466,228],
  [148,168],[178,172],[208,178],[238,170],[268,162],
  [298,158],[328,162],[358,165],[388,165],[416,170],
  [175,215],[205,208],[235,200],[265,195],[295,192],
  [325,195],[355,198],[385,202],[412,210],[436,225],
  [163,242],[193,238],[222,232],[252,228],[282,225],
  [312,228],[342,230],[370,234],[396,238],[420,248],
  [445,256],[460,270],[480,288],[484,305],[476,320],
  [462,332],[444,338],[160,310],[182,322],[205,332],
  [230,340],[256,335],[282,330],[308,326],[334,320],
  [360,316],[386,310],[410,304],[432,296]
];

var nodes=[];
ON.forEach(function(p){nodes.push({x:p[0],y:p[1],o:true,r:2.2+Math.random()*1.8,ph:Math.random()*Math.PI*2});});
BN.forEach(function(p){nodes.push({x:p[0],y:p[1],o:false,r:1.2+Math.random()*1.4,ph:Math.random()*Math.PI*2});});

// Build connections
var conns=[];
(function(){
  for(var i=0;i<nodes.length;i++){
    for(var j=i+1;j<nodes.length;j++){
      var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
      var d=Math.sqrt(dx*dx+dy*dy);
      var both=nodes[i].o&&nodes[j].o;
      var lim=both?140:70;
      var prob=both?0.65:0.22;
      if(d<lim&&Math.random()<prob){
        conns.push({i:i,j:j,oo:both,mo:nodes[i].o||nodes[j].o});
      }
    }
  }
})();

// Fibrous surface texture
var fibers=[];
(function(){
  for(var i=0;i<350;i++){
    var x=80+Math.random()*420;
    var y=55+Math.random()*320;
    fibers.push({x:x,y:y,len:12+Math.random()*40,angle:Math.random()*Math.PI*2,curve:(-0.5+Math.random())*0.9,op:0.03+Math.random()*0.1});
  }
})();

// Features
var features=[
  {id:'aiq', name:'AI Q&A',           x:145,y:178, tY:-22},
  {id:'vid', name:'Video Processing',  x:305,y:108, tY:0 },
  {id:'tran',name:'Transcription',     x:188,y:270, tY:-16},
  {id:'sem', name:'Semantic Search',   x:456,y:190, tY:18 },
  {id:'note',name:'Smart Notes',       x:450,y:300, tY:14 },
  {id:'ext', name:'Chrome Extension',  x:242,y:376, tY:0  }
];

// ── Drawing ───────────────────────────────────────────────────
function mkPath(pts){
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<pts.length-2;i++){
    ctx.quadraticCurveTo(pts[i][0],pts[i][1],(pts[i][0]+pts[i+1][0])/2,(pts[i][1]+pts[i+1][1])/2);
  }
  ctx.quadraticCurveTo(pts[pts.length-2][0],pts[pts.length-2][1],pts[pts.length-1][0],pts[pts.length-1][1]);
  ctx.closePath();
}

function txX(x){
  var cos=Math.cos(rotY*Math.PI/180);
  return BW*0.5+(x-BW*0.5)*cos;
}

function drawRegion(pts,grad,strokeCol){
  var tp=pts.map(function(p){return[txX(p[0]),p[1]];});
  mkPath(tp);
  ctx.fillStyle=grad;ctx.fill();
  mkPath(tp);
  [
    {w:12,c:'rgba(50,90,200,0.07)'},
    {w:7, c:'rgba(80,130,230,0.13)'},
    {w:3.5,c:'rgba(120,170,255,0.32)'},
    {w:1.5,c:'rgba(190,215,255,0.8)'}
  ].forEach(function(g){
    ctx.strokeStyle=g.c;ctx.lineWidth=g.w;
    ctx.shadowColor='rgba(100,160,255,0.8)';ctx.shadowBlur=g.w>4?12:6;
    ctx.stroke();ctx.shadowBlur=0;
  });
}

function draw(){
  ctx.clearRect(0,0,BW,BH);
  var cos=Math.cos(rotY*Math.PI/180);
  var absCos=Math.abs(cos);

  // Dark interior gradient
  var dg=ctx.createRadialGradient(BW*0.48,BH*0.42,10,BW*0.48,BH*0.42,280);
  dg.addColorStop(0,'rgba(5,10,35,0.98)');
  dg.addColorStop(0.6,'rgba(3,6,22,0.98)');
  dg.addColorStop(1,'rgba(1,3,12,0.98)');

  // Draw sub-regions first (behind main cerebrum)
  drawRegion(BS,dg);
  drawRegion(CERE,dg);
  drawRegion(TEM,dg);

  // Main cerebrum clipped
  var tp=CER.map(function(p){return[txX(p[0]),p[1]];});
  ctx.save();
  mkPath(tp);ctx.clip();

  // Interior fill
  ctx.fillStyle=dg;ctx.fillRect(0,0,BW,BH);

  // Fibrous texture (surface web)
  fibers.forEach(function(f){
    var fx=txX(f.x);
    var ex=fx+Math.cos(f.angle)*f.len*absCos;
    var ey=f.y+Math.sin(f.angle)*f.len;
    var cpx=fx+(ex-fx)*0.5-Math.sin(f.angle)*f.len*f.curve*absCos;
    var cpy=f.y+(ey-f.y)*0.5+Math.cos(f.angle)*f.len*f.curve;
    ctx.beginPath();ctx.moveTo(fx,f.y);
    ctx.quadraticCurveTo(cpx,cpy,ex,ey);
    ctx.strokeStyle='rgba(70,130,255,'+f.op+')';
    ctx.lineWidth=0.5;ctx.stroke();
  });

  // Connections
  var t=Date.now()/1000;
  conns.forEach(function(c){
    var ni=nodes[c.i],nj=nodes[c.j];
    var nix=txX(ni.x),njx=txX(nj.x);
    ctx.beginPath();ctx.moveTo(nix,ni.y);ctx.lineTo(njx,nj.y);
    if(c.oo){ctx.strokeStyle='rgba(255,210,20,0.60)';ctx.lineWidth=1.1;}
    else if(c.mo){ctx.strokeStyle='rgba(200,130,20,0.35)';ctx.lineWidth=0.7;}
    else{ctx.strokeStyle='rgba(50,110,210,0.28)';ctx.lineWidth=0.5;}
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(function(n){
    var nx=txX(n.x);
    var p=0.68+Math.sin(t*3+n.ph)*0.32;
    var r=n.r*p;
    if(n.o){
      var g=ctx.createRadialGradient(nx,n.y,0,nx,n.y,r*4);
      g.addColorStop(0,'rgba(255,225,130,0.92)');
      g.addColorStop(0.25,'rgba(255,150,30,0.75)');
      g.addColorStop(0.6,'rgba(230,80,10,0.35)');
      g.addColorStop(1,'rgba(180,40,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(nx,n.y,r*4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,240,180,0.95)';
      ctx.beginPath();ctx.arc(nx,n.y,r*0.7,0,Math.PI*2);ctx.fill();
    } else {
      var g2=ctx.createRadialGradient(nx,n.y,0,nx,n.y,r*3.5);
      g2.addColorStop(0,'rgba(210,225,255,0.88)');
      g2.addColorStop(0.3,'rgba(130,180,255,0.55)');
      g2.addColorStop(0.7,'rgba(60,120,220,0.22)');
      g2.addColorStop(1,'rgba(40,80,200,0)');
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(nx,n.y,r*3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(220,235,255,0.88)';
      ctx.beginPath();ctx.arc(nx,n.y,r*0.6,0,Math.PI*2);ctx.fill();
    }
  });

  ctx.restore(); // end clip

  // Cerebrum outline glow
  var tp2=CER.map(function(p){return[txX(p[0]),p[1]];});
  [
    {w:18,c:'rgba(40,80,200,0.06)'},
    {w:11,c:'rgba(70,120,230,0.12)'},
    {w:5.5,c:'rgba(110,160,255,0.25)'},
    {w:2.5,c:'rgba(160,200,255,0.55)'},
    {w:1.2,c:'rgba(210,228,255,0.92)'}
  ].forEach(function(g){
    mkPath(tp2);
    ctx.strokeStyle=g.c;ctx.lineWidth=g.w;
    ctx.shadowColor='rgba(120,180,255,0.9)';ctx.shadowBlur=g.w>8?18:8;
    ctx.stroke();ctx.shadowBlur=0;
  });

  // Hotspot dots
  features.forEach(function(f,i){
    var isA=actF&&actF.id===f.id;
    var fx=txX(f.x);
    var p2=0.78+Math.sin(t*3.5+i*1.1)*0.22;
    // Outer pulse
    ctx.beginPath();ctx.arc(fx,f.y,13*p2,0,Math.PI*2);
    ctx.fillStyle=isA?'rgba(255,80,20,0.12)':'rgba(74,240,252,0.08)';ctx.fill();
    // Ring
    ctx.beginPath();ctx.arc(fx,f.y,7.5,0,Math.PI*2);
    ctx.strokeStyle=isA?'rgba(255,130,60,0.9)':'rgba(74,240,252,0.85)';ctx.lineWidth=1.5;
    ctx.fillStyle=isA?'rgba(255,80,20,0.18)':'rgba(74,240,252,0.1)';
    ctx.fill();ctx.stroke();
    // Center
    ctx.beginPath();ctx.arc(fx,f.y,3.8,0,Math.PI*2);
    ctx.fillStyle=isA?'#ff6b35':'#4af0fc';
    ctx.shadowColor=isA?'rgba(255,100,50,1)':'rgba(74,240,252,1)';
    ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;
  });
}

// ── Events ────────────────────────────────────────────────────
C.addEventListener('mousedown',function(e){isDrag=true;dragSX=e.clientX;rotSY=targetRotY;ckx=e.clientX;cky=e.clientY;autoSpin=false;},{passive:true});
document.addEventListener('mousemove',function(e){if(!isDrag)return;targetRotY=Math.max(-80,Math.min(80,rotSY+(e.clientX-dragSX)*0.38));});
document.addEventListener('mouseup',function(){isDrag=false;});
C.addEventListener('touchstart',function(e){isDrag=true;dragSX=e.touches[0].clientX;rotSY=targetRotY;ckx=dragSX;cky=e.touches[0].clientY;autoSpin=false;e.preventDefault();},{passive:false});
document.addEventListener('touchmove',function(e){if(!isDrag)return;targetRotY=Math.max(-80,Math.min(80,rotSY+(e.touches[0].clientX-dragSX)*0.38));e.preventDefault();},{passive:false});
document.addEventListener('touchend',function(){isDrag=false;});

C.addEventListener('click',function(e){
  if(Math.abs(e.clientX-ckx)>6||Math.abs(e.clientY-cky)>6)return;
  var rect=C.getBoundingClientRect();
  var mx=(e.clientX-rect.left)*(BW/rect.width);
  var my=(e.clientY-rect.top)*(BH/rect.height);
  var hit=null,minD=9999;
  features.forEach(function(f){
    var fx=txX(f.x);
    var d=Math.sqrt((mx-fx)*(mx-fx)+(my-f.y)*(my-f.y));
    if(d<24&&d<minD){minD=d;hit=f;}
  });
  if(hit){
    if(actF&&actF.id===hit.id){actF=null;lbl.classList.remove('show');autoSpin=true;}
    else{actF=hit;lbl.textContent=hit.name;lbl.classList.add('show');targetRotY=hit.tY;}
  } else {actF=null;lbl.classList.remove('show');}
});

// ── Main loop ─────────────────────────────────────────────────
function loop(){
  if(autoSpin&&!isDrag)targetRotY+=0.14;
  rotY+=(targetRotY-rotY)*0.08;
  draw();
}
setInterval(loop,16);

// Countdown
var tgt=new Date();tgt.setDate(tgt.getDate()+91);
function tick(){var d=Math.max(0,tgt-new Date());document.getElementById('cd-d').textContent=String(Math.floor(d/86400000)).padStart(2,'0');document.getElementById('cd-h').textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');document.getElementById('cd-m').textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');document.getElementById('cd-s').textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');}
tick();setInterval(tick,1000);
window.notify=function(){var e=document.getElementById('ei').value;if(e&&e.includes('@')){alert('Thanks! We will notify you at '+e);document.getElementById('ei').value='';}};
function txX(x){var cos=Math.cos(rotY*Math.PI/180);return BW*0.5+(x-BW*0.5)*cos;}
})();
</script>
</body>
</html>
