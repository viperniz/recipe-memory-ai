<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06061a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh}
#main{position:absolute;inset:0;display:flex;align-items:center}

/* Globe container */
#globe-wrap{position:relative;width:min(52vw,500px);height:100vh;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#globe-canvas{display:block;cursor:grab;position:absolute;inset:0}
#globe-canvas:active{cursor:grabbing}

/* Icon nodes */
.icon-node{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(15,28,80,0.82);border:1.5px solid rgba(80,150,255,0.55);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.28s ease;z-index:10;backdrop-filter:blur(6px);box-shadow:0 0 14px rgba(50,110,255,0.25)}
.icon-node:hover{background:rgba(30,65,160,0.92);border-color:rgba(120,190,255,0.88);box-shadow:0 0 26px rgba(70,150,255,0.55);transform:scale(1.13)}
.icon-node.active{background:rgba(50,90,200,0.98);border-color:rgba(180,225,255,1);box-shadow:0 0 32px rgba(100,180,255,0.85),0 0 70px rgba(80,130,255,0.25);transform:scale(1.2)}
.icon-node svg{width:21px;height:21px;fill:none;stroke:rgba(150,200,255,0.9);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s}
.icon-node.active svg{stroke:#fff}
.icon-label{position:absolute;font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(100,160,240,0.65);white-space:nowrap;pointer-events:none;transition:color 0.25s}
.icon-node.active+.icon-label,.icon-node:hover+.icon-label{color:rgba(180,220,255,0.95)}

/* Right panel */
#right-panel{flex:1;height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 0 0 10px;position:relative;overflow:hidden;z-index:5}
#feature-name{font-size:clamp(20px,3.2vw,48px);font-weight:200;letter-spacing:clamp(4px,1.2vw,12px);text-transform:uppercase;opacity:0;transition:opacity 0.5s ease;color:#ddeeff;white-space:nowrap;text-shadow:0 0 40px rgba(100,160,255,0.4)}
#feature-desc{font-size:clamp(10px,1.1vw,14px);letter-spacing:2.5px;color:rgba(100,150,220,0.65);opacity:0;transition:opacity 0.55s ease 0.08s;text-transform:uppercase;margin-top:6px}
#feature-name.vis{opacity:1}
#feature-desc.vis{opacity:0.7}

/* Top branding */
#branding{position:absolute;top:20px;left:0;right:0;text-align:center;z-index:20;pointer-events:none}
#logo-txt{font-size:10px;letter-spacing:8px;color:#6688ee;text-transform:uppercase;opacity:.7}
#site-title{font-size:clamp(18px,2.4vw,30px);font-weight:300;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(90deg,#5588ff,#bb77ff,#55aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

#countdown{display:flex;gap:16px;position:absolute;top:92px;left:0;right:0;justify-content:center;z-index:20;pointer-events:none}
.cd-block{display:flex;flex-direction:column;align-items:center;gap:1px}
.cd-num{font-size:19px;font-weight:200;color:#99bbee;letter-spacing:2px}
.cd-label{font-size:7px;letter-spacing:3px;color:#445599;text-transform:uppercase}

#bottom-ui{position:absolute;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:9px;z-index:20}
#email-row{display:flex;gap:0;width:min(340px,68vw)}
#email-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(80,120,240,0.26);border-right:none;color:#fff;padding:8px 13px;font-size:12px;outline:none;letter-spacing:1px}
#email-input::placeholder{color:#334477}
#email-btn{background:linear-gradient(135deg,#2244bb,#5522aa);border:none;color:#fff;padding:8px 15px;font-size:10px;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
#tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:480px;padding:0 14px}
.tag{background:rgba(50,70,160,0.1);border:1px solid rgba(60,90,200,0.18);color:#6688cc;padding:3px 8px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
<body>
<div id="branding">
  <div id="logo-txt">Cortexle</div>
  <div id="site-title">Coming Soon</div>
</div>
<div id="countdown">
  <div class="cd-block"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Days</span></div>
  <div class="cd-block"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Hours</span></div>
  <div class="cd-block"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Mins</span></div>
  <div class="cd-block"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Secs</span></div>
</div>
<div id="main">
  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
  </div>
  <div id="right-panel">
    <div id="feature-name"></div>
    <div id="feature-desc"></div>
  </div>
</div>
<canvas id="wave-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:2"></canvas>
<div id="bottom-ui">
  <div id="email-row">
    <input id="email-input" type="email" placeholder="Enter your email for early access"/>
    <button id="email-btn">Notify Me</button>
  </div>
  <div id="tags">
    <span class="tag">AI Q&amp;A</span>
    <span class="tag">Video Processing</span>
    <span class="tag">Transcription</span>
    <span class="tag">Semantic Search</span>
    <span class="tag">Smart Notes</span>
    <span class="tag">Chrome Extension</span>
  </div>
</div>

<script>
const launch=new Date('2025-09-01T00:00:00Z');
function updateCD(){const now=new Date(),diff=Math.max(0,launch-now);const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1e3);document.getElementById('cd-d').textContent=String(d).padStart(2,'0');document.getElementById('cd-h').textContent=String(h).padStart(2,'0');document.getElementById('cd-m').textContent=String(m).padStart(2,'0');document.getElementById('cd-s').textContent=String(s).padStart(2,'0');}
updateCD();setInterval(updateCD,1000);
document.getElementById('email-btn').addEventListener('click',()=>{const v=document.getElementById('email-input').value;if(v&&v.includes('@')){document.getElementById('email-btn').textContent='Done ✓';}});

const features=[
  {name:'AI Q&A',        desc:'Instant answers from your videos',  icon:'brain',  col:'#ff8833'},
  {name:'Video Processing',   desc:'Frame-by-frame intelligence',        icon:'video',  col:'#ff8833'},
  {name:'Transcription',      desc:'Speech to searchable text',          icon:'mic',    col:'#55aaff'},
  {name:'Semantic Search',    desc:'Find anything by meaning',           icon:'search', col:'#55aaff'},
  {name:'Smart Notes',        desc:'Auto-generated insights',            icon:'notes',  col:'#aa77ff'},
  {name:'Chrome Extension',   desc:'Works anywhere in your browser',     icon:'chrome', col:'#aa77ff'},
];
const svgIcons={
  brain:'<circle cx="12" cy="12" r="3"/><path d="M6.6 8.4A6 6 0 0 1 18 12a6 6 0 0 1-11.4 3.6"/><path d="M12 6v2M12 16v2M6 12H4M20 12h-2"/>',
  video:'<rect x="2" y="6" width="14" height="12" rx="2"/><polyline points="16 10 22 7 22 17 16 14"/>',
  mic:'<path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>',
  search:'<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  notes:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
  chrome:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/>',
};

// Icon positions: angleDeg, radiusFactor (how far out), labelSide (left/right of icon)
const iconDefs=[
  {feat:0,angleDeg:200,rf:1.62,ls:'left'},   // AI Q&A
  {feat:1,angleDeg:245,rf:1.55,ls:'left'},   // Video Processing
  {feat:2,angleDeg:160,rf:1.58,ls:'left'},   // Transcription
  {feat:3,angleDeg:115,rf:1.62,ls:'left'},   // Semantic Search
  {feat:4,angleDeg:140,rf:1.52,ls:'left'},   // Smart Notes
  {feat:5,angleDeg:290,rf:1.58,ls:'left'},   // Chrome Extension
];

import('https://unpkg.com/three@0.160.0/build/three.module.js').then(THREE=>{
const gCanvas=document.getElementById('globe-canvas');
const gWrap=document.getElementById('globe-wrap');
const renderer=new THREE.WebGLRenderer({canvas:gCanvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,1,0.1,100);
camera.position.set(0,0,5.0);
function resizeG(){const W=gWrap.offsetWidth,H=gWrap.offsetHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
resizeG();window.addEventListener('resize',()=>{resizeG();posIcons();});
function randSph(r){const u=Math.random()*2-1,th=Math.random()*Math.PI*2,k=Math.sqrt(1-u*u);return new THREE.Vector3(k*Math.cos(th)*r,u*r,k*Math.sin(th)*r);}
const brain=new THREE.Group();scene.add(brain);
brain.add(new THREE.Mesh(new THREE.SphereGeometry(1.44,64,48),new THREE.MeshBasicMaterial({color:0x04040f})));
const rimVS='varying vec3 vN;varying vec3 vP;void main(){vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}';
const rimFS='varying vec3 vN;varying vec3 vP;void main(){vec3 V=normalize(-vP);float f=clamp(dot(vN,V),0.,1.);float rim=pow(1.-f,3.0);vec3 col=mix(vec3(0.4,0.7,1.0),vec3(0.7,0.5,1.0),pow(1.-f,2.0))*5.0;gl_FragColor=vec4(col*rim,rim);}';
brain.add(new THREE.Mesh(new THREE.SphereGeometry(1.455,64,48),new THREE.ShaderMaterial({vertexShader:rimVS,fragmentShader:rimFS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.FrontSide})));
function dotTex(r,g,b){const c=document.createElement('canvas');c.width=64;c.height=64;const cx=c.getContext('2d'),gd=cx.createRadialGradient(32,32,0,32,32,32);gd.addColorStop(0,'rgba(255,255,255,1)');gd.addColorStop(0.1,'rgba('+r+','+g+','+b+',0.9)');gd.addColorStop(0.35,'rgba('+r+','+g+','+b+',0.35)');gd.addColorStop(0.65,'rgba('+r+','+g+','+b+',0.06)');gd.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=gd;cx.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const texO=dotTex(255,140,40),texB=dotTex(60,140,255);
const oPos=[],bPos=[];
for(let i=0;i<100;i++) oPos.push(randSph(1.45));
for(let i=0;i<120;i++) bPos.push(randSph(1.455));
function spP(pts,tex,sz){const geo=new THREE.BufferGeometry();const arr=new Float32Array(pts.length*3);pts.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});geo.setAttribute('position',new THREE.BufferAttribute(arr,3));return new THREE.Points(geo,new THREE.PointsMaterial({size:sz,map:tex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true}));}
brain.add(spP(oPos,texO,0.17));brain.add(spP(bPos,texB,0.11));
const wPts=[];for(let i=0;i<1000;i++) wPts.push(randSph(1.448));
const wS=[];for(let i=0;i<wPts.length;i++){const nb=[];for(let j=0;j<wPts.length;j++) if(i!==j&&wPts[i].distanceTo(wPts[j])<0.34) nb.push(j);nb.sort(()=>Math.random()-.5).slice(0,2).forEach(j=>{wS.push(wPts[i].clone(),wPts[j].clone());});}
brain.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(wS),new THREE.LineBasicMaterial({color:0x2240dd,transparent:true,opacity:.13,depthWrite:false,blending:THREE.AdditiveBlending})));
function lns(pts,col,mxD,mxC,op){const s=[];for(let i=0;i<pts.length;i++){let c=0;for(let j=i+1;j<pts.length&&c<mxC;j++){if(pts[i].distanceTo(pts[j])<mxD){s.push(pts[i].clone(),pts[j].clone());c++;}}}if(!s.length)return;brain.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(s),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op,depthWrite:false,blending:THREE.AdditiveBlending})));}
lns(oPos,0xddcc00,0.44,3,0.55);lns(bPos,0x2244ee,0.40,3,0.28);

let drag=false,lx=0,ly=0,rY=0.4,rX=-.05;
gCanvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;e.preventDefault();});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{if(!drag)return;rY+=(e.clientX-lx)*.007;rX+=(e.clientY-ly)*.004;rX=Math.max(-1.2,Math.min(1.2,rX));lx=e.clientX;ly=e.clientY;});
gCanvas.addEventListener('touchstart',e=>{const t=e.touches[0];drag=true;lx=t.clientX;ly=t.clientY;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];rY+=(t.clientX-lx)*.007;rX+=(t.clientY-ly)*.004;rX=Math.max(-1.2,Math.min(1.2,rX));lx=t.clientX;ly=t.clientY;},{passive:false});

// Icon HTML elements
let activeIdx=-1;
const nameEl=document.getElementById('feature-name');
const descEl=document.getElementById('feature-desc');
const iconEls=[];
const labelEls=[];

function selectFeature(idx){
  if(activeIdx===idx){
    iconEls[idx].classList.remove('active');
    activeIdx=-1;
    nameEl.classList.remove('vis');descEl.classList.remove('vis');
    return;
  }
  if(activeIdx>=0) iconEls[activeIdx].classList.remove('active');
  activeIdx=idx;
  iconEls[idx].classList.add('active');
  nameEl.classList.remove('vis');descEl.classList.remove('vis');
  setTimeout(()=>{
    nameEl.textContent=features[iconDefs[idx].feat].name.toUpperCase();
    descEl.textContent=features[iconDefs[idx].feat].desc;
    void nameEl.offsetWidth; // reflow
    nameEl.classList.add('vis');descEl.classList.add('vis');
  },280);
}

iconDefs.forEach((def,idx)=>{
  const el=document.createElement('div');
  el.className='icon-node';
  el.innerHTML='<svg viewBox="0 0 24 24">'+svgIcons[features[def.feat].icon]+'</svg>';
  el.addEventListener('click',()=>selectFeature(idx));
  gWrap.appendChild(el);
  iconEls.push(el);
  
  // Label
  const lbl=document.createElement('div');
  lbl.className='icon-label';
  lbl.textContent=features[def.feat].name.toUpperCase();
  gWrap.appendChild(lbl);
  labelEls.push(lbl);
});

let connSVG=null;
function posIcons(){
  const W=gWrap.offsetWidth,H=gWrap.offsetHeight;
  const cx=W/2,cy=H/2;
  const globeR=Math.min(W,H)*0.37;
  const pad=54; // padding from edge
  
  if(connSVG) connSVG.remove();
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:5';
  
  iconDefs.forEach((def,idx)=>{
    const rad=def.angleDeg*Math.PI/180;
    const iconR=globeR*def.rf;
    let x=cx+Math.cos(rad)*iconR;
    let y=cy+Math.sin(rad)*iconR;
    // Clamp to viewport
    x=Math.max(pad,Math.min(W-pad,x));
    y=Math.max(pad+50,Math.min(H-pad-50,y));
    
    iconEls[idx].style.left=(x-23)+'px';
    iconEls[idx].style.top=(y-23)+'px';
    
    // Label placement
    const lblEl=labelEls[idx];
    if(x<cx){lblEl.style.left=(x+28)+'px';lblEl.style.transform='none';}
    else{lblEl.style.left=(x-23-lblEl.offsetWidth-6)+'px';lblEl.style.transform='none';}
    lblEl.style.top=(y+14)+'px';
    
    // Connector: from globe edge to icon
    const ex=cx+Math.cos(rad)*globeR*0.98;
    const ey=cy+Math.sin(rad)*globeR*0.98;
    
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ex);line.setAttribute('y1',ey);
    line.setAttribute('x2',x);line.setAttribute('y2',y);
    line.setAttribute('stroke','rgba(70,140,255,0.32)');
    line.setAttribute('stroke-width','1.2');
    line.setAttribute('stroke-dasharray','5 3');
    svg.appendChild(line);
    
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',ex);dot.setAttribute('cy',ey);
    dot.setAttribute('r','3.5');dot.setAttribute('fill','rgba(80,170,255,0.65)');
    svg.appendChild(dot);
  });
  gWrap.appendChild(svg);
  connSVG=svg;
}
posIcons();

let tt=0;
function animG(){requestAnimationFrame(animG);tt+=.016;if(!drag){rY+=.0008;}brain.rotation.y=rY;brain.rotation.x=rX;renderer.render(scene,camera);}
animG();
});

// ── Wave canvas ──────────────────────────────────────────────
const wc=document.getElementById('wave-canvas');
const wCtx=wc.getContext('2d');
function rsW(){wc.width=window.innerWidth;wc.height=window.innerHeight;}
rsW();window.addEventListener('resize',rsW);

let wt=0;
function animWave(){
  requestAnimationFrame(animWave);wt+=0.016;
  wc.width=wc.width;
  const W=wc.width,H=wc.height;
  const gW=document.getElementById('globe-wrap').offsetWidth;
  const sX=gW*0.72; // wave starts around right edge of globe
  const cY=H*0.5;
  
  // Multiple ribbon waves emanating right
  const waves=[
    {amp:62,freq:1.6,ph:0,    col:[130,55,230], w:2.2, op:0.28},
    {amp:45,freq:2.1,ph:0.9,  col:[160,80,255], w:1.6, op:0.22},
    {amp:80,freq:1.3,ph:1.7,  col:[90,40,200],  w:2.8, op:0.24},
    {amp:35,freq:2.9,ph:2.5,  col:[190,110,255],w:1.2, op:0.18},
    {amp:55,freq:2.4,ph:3.3,  col:[110,50,210], w:2.0, op:0.20},
    {amp:28,freq:3.8,ph:0.6,  col:[210,130,255],w:1.0, op:0.15},
    {amp:70,freq:1.5,ph:2.1,  col:[150,75,245], w:2.4, op:0.22},
    {amp:38,freq:2.7,ph:1.3,  col:[100,48,200], w:1.5, op:0.17},
    {amp:20,freq:4.5,ph:0.3,  col:[240,160,255],w:0.8, op:0.12},
    {amp:48,freq:1.9,ph:4.0,  col:[120,60,220], w:1.8, op:0.19},
  ];
  
  waves.forEach(w=>{
    wCtx.beginPath();
    const [r,g,b]=w.col;
    wCtx.strokeStyle='rgba('+r+','+g+','+b+','+w.op+')';
    wCtx.lineWidth=w.w;
    const pts=140;
    for(let i=0;i<=pts;i++){
      const t=i/pts;
      const x=sX+t*(W-sX-10);
      const sp=Math.pow(t*(1-t)*4,0.7);
      const y=cY+(Math.sin(t*Math.PI*w.freq*1.2+wt+w.ph)*w.amp+Math.sin(t*Math.PI*w.freq*.5+wt*.8+w.ph)*w.amp*.3)*sp;
      if(i===0) wCtx.moveTo(x,y); else wCtx.lineTo(x,y);
    }
    wCtx.stroke();
  });
  
  // Bright core ribbon
  wCtx.beginPath();
  wCtx.strokeStyle='rgba(180,100,255,0.55)';
  wCtx.lineWidth=1.8;
  for(let i=0;i<=120;i++){const t=i/120;const x=sX+t*(W-sX-10);const sp=Math.pow(t*(1-t)*4,0.7);const y=cY+Math.sin(t*Math.PI*2.2+wt*1.1)*32*sp;if(i===0) wCtx.moveTo(x,y); else wCtx.lineTo(x,y);}
  wCtx.stroke();
  
  // Extra bright highlight
  wCtx.beginPath();
  wCtx.strokeStyle='rgba(220,160,255,0.35)';
  wCtx.lineWidth=1.2;
  for(let i=0;i<=120;i++){const t=i/120;const x=sX+t*(W-sX-10);const sp=Math.pow(t*(1-t)*4,0.6);const y=cY+Math.sin(t*Math.PI*3.1+wt*1.4)*18*sp;if(i===0) wCtx.moveTo(x,y); else wCtx.lineTo(x,y);}
  wCtx.stroke();
}
animWave();
</script></body></html>
