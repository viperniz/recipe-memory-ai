html,body{width:100%;height:100%;overflow:hidden;background:#04060f;font-family:'Inter',sans-serif}

</style>

<script>
/* ======================================================
   STARFIELD BACKGROUND
====================================================== */
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize(); window.addEventListener('resize',resize);
  var stars=[];
  for(var i=0;i<1800;i++) stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.1+0.1,a:Math.random()*0.7+0.1});
  function draw(){
    ctx.fillStyle='#04060f';ctx.fillRect(0,0,c.width,c.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i],x=s.x%c.width,y=s.y%c.height;
      ctx.globalAlpha=s.a*(0.6+0.4*Math.sin(Date.now()*0.0005+i));
      ctx.fillStyle='#aac8ff';ctx.beginPath();ctx.arc(x,y,s.r,0,6.283);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  draw();
  setInterval(draw,80);
})();

/* ======================================================
   NEURAL SPHERE — volumetric particle cloud + glow
====================================================== */
(function(){
  var sc=document.getElementById('sphere-canvas'),ctx=sc.getContext('2d');
  function resize(){sc.width=innerWidth;sc.height=innerHeight;}
  resize(); window.addEventListener('resize',resize);

  // Sphere node data — 3D positions on unit sphere + interior
  var NODES=[];
  var N_SURFACE=1100, N_INNER=400;

  // Surface nodes
  for(var i=0;i<N_SURFACE;i++){
    var th=Math.acos(2*Math.random()-1),ph=Math.random()*6.283;
    var r=0.88+Math.random()*0.12;
    NODES.push({
      ox:Math.sin(th)*Math.cos(ph)*r, oy:Math.cos(th)*r, oz:Math.sin(th)*Math.sin(ph)*r,
      size: Math.random()*1.8+0.4, surface:true,
      flicker: Math.random()*6.283, fspeed: 0.5+Math.random()*2
    });
  }
  // Interior nodes (volumetric depth)
  for(var i=0;i<N_INNER;i++){
    var th=Math.acos(2*Math.random()-1),ph=Math.random()*6.283,r=Math.random()*0.85;
    NODES.push({
      ox:Math.sin(th)*Math.cos(ph)*r, oy:Math.cos(th)*r, oz:Math.sin(th)*Math.sin(ph)*r,
      size: Math.random()*1.2+0.2, surface:false,
      flicker: Math.random()*6.283, fspeed: 0.3+Math.random()*1.5
    });
  }

  // Edges — only between close surface nodes for dense graph
  var EDGES=[];
  var surfaceNodes=NODES.filter(function(n){return n.surface;}).slice(0,300);
  for(var i=0;i<surfaceNodes.length;i++){
    for(var j=i+1;j<surfaceNodes.length;j++){
      var dx=surfaceNodes[i].ox-surfaceNodes[j].ox,dy=surfaceNodes[i].oy-surfaceNodes[j].oy,dz=surfaceNodes[i].oz-surfaceNodes[j].oz;
      var d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(d<0.28 && Math.random()<0.35) EDGES.push({a:surfaceNodes[i],b:surfaceNodes[j],d:d});
    }
  }

  var rotY=0, rotSpeed=0.004;

  function project(n,cx,cy,R,ry){
    var cos=Math.cos(ry),sin=Math.sin(ry);
    var x3=n.ox*cos - n.oz*sin;
    var z3=n.ox*sin + n.oz*cos;
    var scale=3.2/(3.2+z3);
    return {x:cx+x3*R*scale, y:cy+n.oy*R*scale, z:z3, depth:scale};
  }

  function drawSphere(){
    var wrap=document.getElementById('globe-wrap');
    var r=wrap.getBoundingClientRect();
    var cx=r.left+r.width*0.5, cy=r.top+r.height*0.5;
    var R=r.width*0.48;
    var t=Date.now()*0.001;

    ctx.clearRect(0,0,sc.width,sc.height);
    ctx.globalCompositeOperation='source-over';

    // --- DEEP GLOW AURA ---
    // Outer halo
    var halo=ctx.createRadialGradient(cx,cy,R*0.5,cx,cy,R*1.5);
    halo.addColorStop(0,'rgba(20,60,180,0.18)');
    halo.addColorStop(0.5,'rgba(10,30,120,0.08)');
    halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;ctx.beginPath();ctx.arc(cx,cy,R*1.5,0,6.283);ctx.fill();

    // Inner volumetric glow
    var inner=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.02);
    inner.addColorStop(0,'rgba(40,120,255,0.22)');
    inner.addColorStop(0.4,'rgba(20,80,220,0.14)');
    inner.addColorStop(0.75,'rgba(10,40,160,0.07)');
    inner.addColorStop(1,'rgba(5,20,80,0.0)');
    ctx.fillStyle=inner;ctx.beginPath();ctx.arc(cx,cy,R*1.02,0,6.283);ctx.fill();

    // --- PROJECT ALL NODES ---
    var projected=NODES.map(function(n){return Object.assign({},n,project(n,cx,cy,R,rotY));});
    projected.sort(function(a,b){return a.z-b.z;}); // back to front

    // --- EDGES (additive, back nodes first) ---
    ctx.globalCompositeOperation='lighter';
    for(var i=0;i<EDGES.length;i++){
      var e=EDGES[i];
      var pa=project(e.a,cx,cy,R,rotY),pb=project(e.b,cx,cy,R,rotY);
      var depthAlpha=((pa.depth+pb.depth)*0.5-0.7)*0.35;
      if(depthAlpha<0.01) continue;
      // Right-side emission bonus
      var rightBonus=(pa.x>cx?((pa.x-cx)/(R*0.6))*0.3:0);
      var alpha=Math.max(0,Math.min(0.55,depthAlpha+rightBonus));
      ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
      ctx.strokeStyle='rgba(40,140,255,'+alpha.toFixed(3)+')';
      ctx.lineWidth=0.5;ctx.stroke();
    }

    // --- NODES ---
    for(var i=0;i<projected.length;i++){
      var n=projected[i];
      var flkr=0.55+0.45*Math.sin(t*n.fspeed+n.flicker);
      var depthAlpha=(n.depth-0.7)*1.8*flkr;
      if(depthAlpha<0.02) continue;

      // Right-side emission: brighter on right hemisphere
      var rightFrac=Math.max(0,(n.x-cx)/(R));
      var emitBoost=1+rightFrac*3.5;

      var isRight=n.x>cx+R*0.5;
      var alpha=Math.min(1,depthAlpha*emitBoost*(n.surface?1:0.5));
      var sz=n.size*(0.6+n.depth*0.7);

      ctx.globalCompositeOperation='lighter';
      if(isRight && n.surface){
        // Emission seam — bright cyan-white particles on right rim
        var grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*3.5);
        grd.addColorStop(0,'rgba(200,240,255,'+Math.min(1,alpha*0.9).toFixed(2)+')');
        grd.addColorStop(0.3,'rgba(80,200,255,'+Math.min(1,alpha*0.6).toFixed(2)+')');
        grd.addColorStop(1,'rgba(20,80,255,0)');
        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(n.x,n.y,sz*3.5,0,6.283);ctx.fill();
      } else if(n.surface){
        var grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*2.2);
        grd.addColorStop(0,'rgba(120,200,255,'+Math.min(1,alpha*0.75).toFixed(2)+')');
        grd.addColorStop(0.5,'rgba(40,100,220,'+Math.min(1,alpha*0.35).toFixed(2)+')');
        grd.addColorStop(1,'rgba(10,40,180,0)');
        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(n.x,n.y,sz*2.2,0,6.283);ctx.fill();
      } else {
        // Interior — deep blue, very soft
        var grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*1.5);
        grd.addColorStop(0,'rgba(60,120,255,'+Math.min(0.4,alpha*0.4).toFixed(2)+')');
        grd.addColorStop(1,'rgba(20,60,200,0)');
        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(n.x,n.y,sz*1.5,0,6.283);ctx.fill();
      }
    }

    // --- EMISSION SEAM bright arc on right edge ---
    ctx.globalCompositeOperation='lighter';
    var seamGrad=ctx.createLinearGradient(cx,cy-R,cx,cy+R);
    seamGrad.addColorStop(0,'rgba(60,180,255,0)');
    seamGrad.addColorStop(0.3,'rgba(100,220,255,0.18)');
    seamGrad.addColorStop(0.5,'rgba(180,240,255,0.35)');
    seamGrad.addColorStop(0.7,'rgba(100,200,255,0.18)');
    seamGrad.addColorStop(1,'rgba(40,120,255,0)');
    ctx.fillStyle=seamGrad;
    ctx.beginPath();ctx.arc(cx,cy,R,Math.PI*0.5,Math.PI*1.5,true);ctx.closePath();ctx.fill();
    // Bright rim line
    var rimGrad=ctx.createLinearGradient(cx,cy-R,cx,cy+R);
    rimGrad.addColorStop(0,'rgba(120,220,255,0)');
    rimGrad.addColorStop(0.4,'rgba(200,240,255,0.55)');
    rimGrad.addColorStop(0.5,'rgba(255,255,255,0.75)');
    rimGrad.addColorStop(0.6,'rgba(200,240,255,0.55)');
    rimGrad.addColorStop(1,'rgba(120,220,255,0)');
    ctx.strokeStyle=rimGrad;
    ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.arc(cx,cy,R,Math.PI*0.65,Math.PI*1.35,true);
    ctx.stroke();

    ctx.globalCompositeOperation='source-over';
    rotY+=rotSpeed;
  }

  (function loop(){requestAnimationFrame(loop);drawSphere();})();
})();
/* ======================================================
   ICON NODES (clickable, no labels)
====================================================== */
var FEATURES=[
  {id:'aiq',icon:'brain',name:'AI Q&A',desc:'Instant answers from your videos',angleDeg:118},
  {id:'vid',icon:'video',name:'Video Processing',desc:'Frame-by-frame intelligence',angleDeg:155},
  {id:'trn',icon:'mic',name:'Transcription',desc:'Speech to searchable text',angleDeg:195},
  {id:'sem',icon:'search',name:'Semantic Search',desc:'Find anything by meaning',angleDeg:235},
  {id:'snt',icon:'notes',name:'Smart Notes',desc:'Auto-generated insights',angleDeg:270},
  {id:'chr',icon:'chrome',name:'Chrome Extension',desc:'Works anywhere in your browser',angleDeg:308}
];
var ICONS={
  brain:'<svg viewBox="0 0 24 24"><path d="M12 5C9.2 5 7 7.2 7 10c0 1.4.5 2.6 1.4 3.5C7.5 14.3 7 15.6 7 17h10c0-1.4-.5-2.7-1.4-3.5C16.5 12.6 17 11.4 17 10c0-2.8-2.2-5-5-5z"/><line x1="12" y1="5" x2="12" y2="3"/><line x1="9" y1="17" x2="9" y2="19"/><line x1="15" y1="17" x2="15" y2="19"/></svg>',
  video:'<svg viewBox="0 0 24 24"><rect x="2" y="6" width="14" height="12" rx="2"/><polygon points="22,8 16,12 22,16"/></svg>',
  mic:'<svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>',
  search:'<svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>',
  notes:'<svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>',
  chrome:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="8" x2="12" y2="2"/><line x1="17.2" y1="15" x2="22.3" y2="6.3"/><line x1="6.8" y1="15" x2="1.7" y2="6.3"/></svg>'
};
var wrapEl=document.getElementById('globe-wrap'),svgEl=document.getElementById('connectors-svg'),activeId=null;
function placeNodes(){
  document.querySelectorAll('.icon-node').forEach(function(n){n.remove();});svgEl.innerHTML='';
  var W=wrapEl.offsetWidth,H=wrapEl.offsetHeight,cx=W/2,cy=H/2,R=W*0.52;
  FEATURES.forEach(function(f){
    var rad=f.angleDeg*Math.PI/180,nx=cx+R*Math.cos(rad),ny=cy+R*Math.sin(rad);
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);line.setAttribute('x2',nx);line.setAttribute('y2',ny);
    line.setAttribute('stroke','rgba(60,160,255,0.18)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','3 5');
    svgEl.appendChild(line);
    var node=document.createElement('div');node.className='icon-node';node.dataset.id=f.id;
    node.style.left=nx+'px';node.style.top=ny+'px';node.innerHTML=ICONS[f.icon]||'';
    node.addEventListener('click',function(){onIconClick(f);});wrapEl.appendChild(node);
  });
}
function onIconClick(f){
  var fn=document.getElementById('feature-name'),fd=document.getElementById('feature-desc'),prev=activeId;
  document.querySelectorAll('.icon-node').forEach(function(n){n.classList.remove('active');});
  if(prev===f.id){activeId=null;fn.style.opacity='0';fd.style.opacity='0';setTimeout(function(){fn.textContent='';fd.textContent='';},500);}
  else{activeId=f.id;document.querySelector('.icon-node[data-id="'+f.id+'"]').classList.add('active');fn.style.opacity='0';fd.style.opacity='0';setTimeout(function(){fn.textContent=f.name;fd.textContent=f.desc;fn.style.opacity='1';fd.style.opacity='1';},300);}
}
placeNodes();window.addEventListener('resize',placeNodes);
/* ======================================================
   WAVE RIBBON — parametric sinusoidal, amplitude-modulated
   y(t) = A(x,t) * sum_n[ a_n * sin(w_n*x + s_n*t + p_n) ]
   Rendered as filled ribbon mesh with additive blending
   Turbulent seam zone near sphere, smooth flow further right
====================================================== */
(function(){
  var wc=document.getElementById('wave-canvas'),ctx=wc.getContext('2d');
  function resize(){wc.width=innerWidth;wc.height=innerHeight;}
  resize();window.addEventListener('resize',resize);

  var gT=0;

  // --- STRAND DEFINITIONS ---
  // 64 strands total: 12 fat core ribbons + 52 thin outer strands
  var STRANDS=[];

  function makeStrand(frac,role){
    var dc=Math.abs(frac);
    return {
      frac:frac, dc:dc, role:role,
      // Three frequency components for superposition
      w1:1.4+dc*0.6+Math.random()*0.5,
      w2:3.2+dc*1.0+Math.random()*0.8,
      w3:7.5+dc*0.8+Math.random()*1.5,
      a1:1.0,
      a2:0.32+Math.random()*0.14,
      a3:0.12+Math.random()*0.07,
      p1:Math.random()*6.283,
      p2:Math.random()*6.283,
      p3:Math.random()*6.283,
      s1:0.40+Math.random()*0.25,
      s2:0.75+Math.random()*0.38,
      s3:1.15+Math.random()*0.55,
      // Turbulence params (seam zone)
      tw1:8+Math.random()*6, tw2:14+Math.random()*8,
      tp1:Math.random()*6.283, tp2:Math.random()*6.283,
      ts1:2.5+Math.random()*2, ts2:3.8+Math.random()*2,
      // Ribbon thickness
      thick: role==='core' ? (2.2-dc*1.0) : (0.9-dc*0.5),
      ampScale: role==='core' ? (0.95-dc*0.5) : (0.55-dc*0.3),
      vertBase: frac * 0.30,
    };
  }

  // Core ribbons — 14 strands, evenly spaced -1..1
  for(var i=0;i<14;i++){
    var f=(i/13)*2-1;
    STRANDS.push(makeStrand(f,'core'));
  }
  // Thin outer strands — 50 strands, concentrated near center
  for(var i=0;i<50;i++){
    var f=(Math.random()*2-1)*0.95;
    STRANDS.push(makeStrand(f,'thin'));
  }

  function getOrigin(){
    var gw=document.getElementById('globe-wrap'),r=gw.getBoundingClientRect();
    return {x:r.left+r.width*0.84, y:r.top+r.height*0.50, R:r.width*0.48};
  }

  function computeCenterLine(ln,ox,oy,W,H,t,STEPS){
    var pts=[];
    var totalW=W-ox;
    for(var i=0;i<=STEPS;i++){
      var px=i/STEPS;
      var x=ox+px*totalW;

      // === AMPLITUDE ENVELOPE A(x,t) ===
      // Sigmoid onset at origin, exponential decay toward right
      var onset=1/(1+Math.exp(-20*(px-0.03)));
      var decay=Math.exp(-px*1.05);
      var env=onset*decay;
      // Slow breathing
      var breathe=1.0+0.15*Math.sin(t*0.18+ln.frac*1.2);
      var A=H*ln.ampScale*0.12*env*breathe;

      // === TURBULENCE near seam (px < 0.12) ===
      // Decays exponentially — chaotic at junction, smooth past it
      var turbDecay=Math.exp(-px*28);
      var turb=(Math.sin(ln.tw1*px*6.283+t*ln.ts1+ln.tp1)*0.6
               +Math.sin(ln.tw2*px*6.283+t*ln.ts2+ln.tp2)*0.4)
               *H*0.045*turbDecay;

      // === SUPERPOSED SINE WAVES ===
      var xw=px*6.283;
      var wave=( ln.a1*Math.sin(ln.w1*xw+t*ln.s1+ln.p1)
               + ln.a2*Math.sin(ln.w2*xw+t*ln.s2+ln.p2)
               + ln.a3*Math.sin(ln.w3*xw+t*ln.s3+ln.p3) );

      // === VERTICAL CONVERGENCE ===
      var spread=Math.pow(Math.max(0,1-px),0.65);
      var vertOff=ln.vertBase*H*spread;

      var y=oy+vertOff+A*wave+turb;
      pts.push({x:x,y:y,env:env,px:px});
    }
    return pts;
  }

  function drawStrand(ln,ox,oy,W,H,t){
    var totalW=W-ox;
    if(totalW<10) return;
    var STEPS=180;
    var pts=computeCenterLine(ln,ox,oy,W,H,t,STEPS);

    // Build ribbon edges via perpendicular normals
    var upper=[],lower=[];
    for(var i=0;i<=STEPS;i++){
      var prev=i>0?i-1:0,next=i<STEPS?i+1:STEPS;
      var tx=pts[next].x-pts[prev].x, ty=pts[next].y-pts[prev].y;
      var tl=Math.sqrt(tx*tx+ty*ty)||1;
      var nx2=-ty/tl, ny2=tx/tl;
      // Thickness envelope: fat at peak, thin at tail
      var env=pts[i].env;
      var halfT=ln.thick*(0.4+env*2.0)*(1-pts[i].px*0.7);
      upper.push({x:pts[i].x+nx2*halfT,y:pts[i].y+ny2*halfT});
      lower.push({x:pts[i].x-nx2*halfT,y:pts[i].y-ny2*halfT});
    }

    ctx.save();
    ctx.globalCompositeOperation='lighter';

    // === COLOR GRADIENT: purple(origin)->magenta->violet(tail) ===
    var dc=ln.dc;
    var grad=ctx.createLinearGradient(ox,0,W,0);
    if(dc<0.2){
      // Bright luminous core
      grad.addColorStop(0,  'rgba(100,60,220,0)');
      grad.addColorStop(0.03,'rgba(160,80,255,0.40)');
      grad.addColorStop(0.18,'rgba(200,100,255,0.65)');
      grad.addColorStop(0.40,'rgba(220,80,200,0.55)');
      grad.addColorStop(0.65,'rgba(180,60,200,0.30)');
      grad.addColorStop(0.85,'rgba(120,40,180,0.12)');
      grad.addColorStop(1,  'rgba(60,20,120,0.01)');
    } else if(dc<0.55){
      // Purple mid
      grad.addColorStop(0,  'rgba(80,30,180,0)');
      grad.addColorStop(0.03,'rgba(120,40,220,0.32)');
      grad.addColorStop(0.20,'rgba(160,50,210,0.50)');
      grad.addColorStop(0.50,'rgba(140,30,180,0.35)');
      grad.addColorStop(0.80,'rgba(80,20,150,0.14)');
      grad.addColorStop(1,  'rgba(40,10,100,0.01)');
    } else {
      // Deep violet outer
      grad.addColorStop(0,  'rgba(50,20,140,0)');
      grad.addColorStop(0.04,'rgba(80,25,170,0.22)');
      grad.addColorStop(0.25,'rgba(100,30,170,0.30)');
      grad.addColorStop(0.65,'rgba(70,20,130,0.14)');
      grad.addColorStop(1,  'rgba(30,10,80,0.01)');
    }
    ctx.fillStyle=grad;

    // Trace filled ribbon
    ctx.beginPath();
    ctx.moveTo(upper[0].x,upper[0].y);
    for(var i=1;i<=STEPS;i++) ctx.lineTo(upper[i].x,upper[i].y);
    for(var i=STEPS;i>=0;i--) ctx.lineTo(lower[i].x,lower[i].y);
    ctx.closePath();ctx.fill();

    // Bright spine line for core strands
    if(dc<0.28){
      var spineGrad=ctx.createLinearGradient(ox,0,W,0);
      spineGrad.addColorStop(0,  'rgba(220,160,255,0)');
      spineGrad.addColorStop(0.03,'rgba(240,180,255,0.60)');
      spineGrad.addColorStop(0.20,'rgba(255,200,255,0.75)');
      spineGrad.addColorStop(0.50,'rgba(220,140,255,0.45)');
      spineGrad.addColorStop(0.80,'rgba(160,80,220,0.18)');
      spineGrad.addColorStop(1,  'rgba(80,30,160,0.01)');
      ctx.beginPath();
      for(var i=0;i<=STEPS;i++){if(i===0)ctx.moveTo(pts[i].x,pts[i].y);else ctx.lineTo(pts[i].x,pts[i].y);}
      ctx.strokeStyle=spineGrad;ctx.lineWidth=1.0;ctx.globalAlpha=0.8;ctx.stroke();
    }

    ctx.restore();
  }

  // Seam emission particles — turbulent sparks at origin zone
  var SPARKS=[];
  for(var i=0;i<80;i++){
    SPARKS.push({
      vfrac:(Math.random()-0.5)*0.8,
      xfrac:Math.random()*0.12,
      phase:Math.random()*6.283,
      speed:1.5+Math.random()*3,
      alpha:0.3+Math.random()*0.5,
      size:0.5+Math.random()*1.2
    });
  }

  function drawSeamSparks(ox,oy,W,H,t){
    ctx.save();ctx.globalCompositeOperation='lighter';
    for(var i=0;i<SPARKS.length;i++){
      var s=SPARKS[i];
      var px=s.xfrac*(0.5+0.5*Math.sin(t*s.speed*0.3+s.phase));
      var x=ox+px*(W-ox);
      var y=oy+s.vfrac*H*0.38*(1-px*4)*Math.sin(t*s.speed+s.phase);
      var flk=0.5+0.5*Math.sin(t*s.speed*2+s.phase);
      var a=(s.alpha*flk*Math.exp(-px*35)).toFixed(3);
      var grd=ctx.createRadialGradient(x,y,0,x,y,s.size*4);
      grd.addColorStop(0,'rgba(220,180,255,'+a+')');
      grd.addColorStop(0.4,'rgba(160,80,255,'+(parseFloat(a)*0.5).toFixed(3)+')');
      grd.addColorStop(1,'rgba(80,20,200,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,s.size*4,0,6.283);ctx.fill();
    }
    ctx.restore();
  }

  function draw(){
    wc.getContext('2d').clearRect(0,0,wc.width,wc.height);
    var o=getOrigin(),ox=o.x,oy=o.y;
    if(wc.width-ox<10){gT+=0.016;requestAnimationFrame(draw);return;}

    // Sort: outer strands first (behind), core strands on top
    STRANDS.sort(function(a,b){return b.dc-a.dc;});
    for(var i=0;i<STRANDS.length;i++) drawStrand(STRANDS[i],ox,oy,wc.width,wc.height,gT);
    drawSeamSparks(ox,oy,wc.width,wc.height,gT);

    gT+=0.016;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ======================================================
   COUNTDOWN
====================================================== */
(function(){
  var target=new Date('2025-09-01T00:00:00Z');
  function tick(){
    var now=new Date(),diff=Math.max(0,target-now);
    var d=Math.floor(diff/86400000);diff%=86400000;
    var h=Math.floor(diff/3600000);diff%=3600000;
    var m=Math.floor(diff/60000);diff%=60000;
    var s=Math.floor(diff/1000);
    document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
    document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
})();

document.getElementById('notify-btn').addEventListener('click',function(){
  var v=document.getElementById('email-input').value.trim();
  if(!v||!v.includes('@')){document.getElementById('email-input').style.borderColor='#f87171';return;}
  this.textContent='You are in!';this.style.background='linear-gradient(135deg,#059669,#10b981)';
  document.getElementById('email-input').disabled=true;
});
</script>
