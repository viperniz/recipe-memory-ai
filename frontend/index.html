<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cortexle - Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
header{width:100%;padding:22px 40px;display:flex;align-items:center;justify-content:center}
.logo{font-size:28px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#4fc3f7,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero{text-align:center;padding:8px 20px 0}
.hero h1{font-size:clamp(30px,5vw,52px);font-weight:700;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,#4fc3f7 50%,#7c4dff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:clamp(13px,1.8vw,17px);color:rgba(255,255,255,0.55);max-width:480px;margin:0 auto 12px}
#brain-section{position:relative;width:100%;max-width:680px;height:480px;margin:0 auto}
#brain-canvas{display:block;width:100%;height:100%;cursor:grab}
#brain-canvas:active{cursor:grabbing}
.feature-label{position:absolute;left:50%;top:16%;transform:translate(-50%,-50%);background:rgba(0,0,20,0.9);border:1px solid rgba(79,195,247,0.7);border-radius:8px;padding:8px 18px;font-size:14px;font-weight:600;color:#4fc3f7;pointer-events:none;opacity:0;transition:opacity 0.4s;white-space:nowrap;letter-spacing:0.5px;box-shadow:0 0 20px rgba(79,195,247,0.35)}
.feature-label.visible{opacity:1}
.hint{font-size:10px;color:rgba(255,255,255,0.22);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;text-align:center}
.countdown-section{text-align:center;padding:4px 20px 14px}
.countdown-title{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.countdown-grid{display:flex;gap:20px;justify-content:center}
.countdown-item{text-align:center}
.countdown-num{font-size:clamp(26px,4vw,42px);font-weight:700;color:#4fc3f7;line-height:1;display:block}
.countdown-lbl{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.email-section{padding:0 20px 14px;text-align:center}
.email-form{display:flex;gap:10px;max-width:380px;margin:0 auto;justify-content:center}
.email-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(79,195,247,0.3);border-radius:8px;padding:10px 15px;color:#fff;font-size:14px;outline:none;transition:border-color 0.3s}
.email-input::placeholder{color:rgba(255,255,255,0.28)}
.email-input:focus{border-color:#4fc3f7}
.email-btn{background:linear-gradient(135deg,#4fc3f7,#7c4dff);border:none;border-radius:8px;padding:10px 20px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.3s;white-space:nowrap}
.email-btn:hover{opacity:0.85}
.features-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 20px 24px;max-width:620px}
.feat-tag{background:rgba(79,195,247,0.07);border:1px solid rgba(79,195,247,0.22);border-radius:20px;padding:5px 13px;font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:0.3px}
</style>
</head>
<body>
<header><div class="logo">CORTEXLE</div></header>
<div class="hero">
  <h1>AI Video Intelligence</h1>
  <p>Transform any video into searchable, interactive knowledge</p>
</div>
<div id="brain-section">
  <canvas id="brain-canvas"></canvas>
  <div class="feature-label" id="feat-label"></div>
</div>
<div class="hint">Click a node &bull; Drag to explore</div>
<div class="countdown-section">
  <div class="countdown-title">Launching In</div>
  <div class="countdown-grid">
    <div class="countdown-item"><span class="countdown-num" id="cd-d">00</span><div class="countdown-lbl">Days</div></div>
    <div class="countdown-item"><span class="countdown-num" id="cd-h">00</span><div class="countdown-lbl">Hours</div></div>
    <div class="countdown-item"><span class="countdown-num" id="cd-m">00</span><div class="countdown-lbl">Mins</div></div>
    <div class="countdown-item"><span class="countdown-num" id="cd-s">00</span><div class="countdown-lbl">Secs</div></div>
  </div>
</div>
<div class="email-section">
  <form class="email-form" onsubmit="return false">
    <input class="email-input" type="email" placeholder="Enter your email" id="email-in"/>
    <button class="email-btn" onclick="notifyMe()">Notify Me</button>
  </form>
</div>
<div class="features-row">
  <span class="feat-tag">AI Q&amp;A</span>
  <span class="feat-tag">Video Processing</span>
  <span class="feat-tag">Transcription</span>
  <span class="feat-tag">Semantic Search</span>
  <span class="feat-tag">Smart Notes</span>
  <span class="feat-tag">Chrome Extension</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  var target=new Date('2025-09-01T00:00:00Z');
  function upd(){var now=new Date(),diff=Math.max(0,target-now);var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);document.getElementById('cd-d').textContent=String(d).padStart(2,'0');document.getElementById('cd-h').textContent=String(h).padStart(2,'0');document.getElementById('cd-m').textContent=String(m).padStart(2,'0');document.getElementById('cd-s').textContent=String(s).padStart(2,'0');}
  upd();setInterval(upd,1000);
})();
window.notifyMe=function(){var v=document.getElementById('email-in').value;if(!v||!v.includes('@'))return;alert('Thanks! We will notify you at '+v);};
</script>

<script>
(function(){
  var section=document.getElementById('brain-section');
  var canvas=document.getElementById('brain-canvas');
  var label=document.getElementById('feat-label');
  var W=section.clientWidth, H=section.clientHeight;
  canvas.width=W*window.devicePixelRatio; canvas.height=H*window.devicePixelRatio;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';

  var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  renderer.setClearColor(0x000000,1);

  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);
  camera.position.set(0,0,4.8);

  // === Brain geometry: displaced sphere matching lateral brain profile ===
  var brainGeo=new THREE.SphereGeometry(1.0,100,70);
  var pos=brainGeo.attributes.position;
  for(var i=0;i<pos.count;i++){
    var x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    var len=Math.sqrt(x*x+y*y+z*z);
    var nx=x/len,ny=y/len,nz=z/len;
    // Ellipsoid base: wide left-right, medium height, thin front-back
    var sx=1.35,sy=1.0,sz=1.0;
    // Frontal lobe: bulge at front-left (positive Z in our coord = viewer side)
    var frontal=0.12*Math.max(0,nz)*Math.max(0,nx+0.3)*Math.max(0,ny+0.2);
    // Occipital: bulge back-right
    var occip=0.10*Math.max(0,-nz)*Math.max(0,-nx+0.3)*Math.max(0,ny+0.2);
    // Parietal: top center
    var parietal=0.07*Math.max(0,ny-0.3)*Math.exp(-nx*nx*3);
    // Temporal: lower side pocket
    var temporal=0.08*Math.max(0,nz-0.3)*Math.max(0,-ny-0.1)*Math.max(0,-ny-0.0);
    // Cerebellum: bottom-back notch
    var cerebellum=-0.10*Math.max(0,-ny-0.3)*Math.max(0,-nx);
    // Sulcus groove at top (central sulcus)
    var sulcus=-0.04*Math.exp(-nx*nx*20)*Math.max(0,ny-0.5);
    var disp=frontal+occip+parietal+temporal+cerebellum+sulcus;
    var r=1.0+disp;
    pos.setXYZ(i,nx*r*sx,ny*r*sy,nz*r*sz);
  }
  brainGeo.computeVertexNormals();

  // Brain shader - dark interior, glowing blue rim
  var brainMat=new THREE.ShaderMaterial({
    uniforms:{
      rimCol:{value:new THREE.Color(0.12,0.30,1.0)},
      rimCol2:{value:new THREE.Color(0.05,0.15,0.60)},
      innerCol:{value:new THREE.Color(0.008,0.008,0.05)},
    },
    vertexShader:`
      varying vec3 vN;
      varying vec3 vVD;
      void main(){
        vN=normalize(normalMatrix*normal);
        vec4 wp=modelViewMatrix*vec4(position,1.0);
        vVD=normalize(-wp.xyz);
        gl_Position=projectionMatrix*wp;
      }
    `,
    fragmentShader:`
      uniform vec3 rimCol;
      uniform vec3 rimCol2;
      uniform vec3 innerCol;
      varying vec3 vN;
      varying vec3 vVD;
      void main(){
        float facing=abs(dot(vN,vVD));
        float rim=1.0-facing;
        // Sharp bright rim
        float rimHard=pow(rim,2.0);
        float rimSoft=pow(rim,1.2);
        vec3 col=mix(innerCol,rimCol2,rimSoft*0.7);
        col=mix(col,rimCol,rimHard*1.1);
        // Extra bright outer edge
        col+=rimCol*pow(rim,3.5)*0.8;
        gl_FragColor=vec4(col,0.95);
      }
    `,
    transparent:true,
    side:THREE.FrontSide
  });

  var brainMesh=new THREE.Mesh(brainGeo,brainMat);
  scene.add(brainMesh);

  // Dark back face (interior)
  var backMesh=new THREE.Mesh(brainGeo,new THREE.MeshBasicMaterial({color:0x000308,side:THREE.BackSide,transparent:true,opacity:0.98}));
  scene.add(backMesh);

  // Outer glow shell
  var glowGeo=new THREE.SphereGeometry(1.55,40,28);
  var glowMat=new THREE.ShaderMaterial({
    uniforms:{gc:{value:new THREE.Color(0.08,0.22,0.95)}},
    vertexShader:`varying vec3 vN,vV;void main(){vN=normalize(normalMatrix*normal);vec4 wp=modelViewMatrix*vec4(position,1.0);vV=normalize(-wp.xyz);gl_Position=projectionMatrix*wp;}`,
    fragmentShader:`uniform vec3 gc;varying vec3 vN,vV;void main(){float r=1.0-abs(dot(vN,vV));float a=pow(r,3.0)*0.5;gl_FragColor=vec4(gc,a);}`,
    transparent:true,side:THREE.BackSide,depthWrite:false
  });
  var glowShell=new THREE.Mesh(glowGeo,glowMat);
  scene.add(glowShell);

  // === Generate nodes on brain surface ===
  // Use rejection sampling to place nodes on the ellipsoid surface
  function brainPos(nx,ny,nz){
    var sx=1.35,sy=1.0,sz=1.0;
    var frontal=0.12*Math.max(0,nz)*Math.max(0,nx+0.3)*Math.max(0,ny+0.2);
    var occip=0.10*Math.max(0,-nz)*Math.max(0,-nx+0.3)*Math.max(0,ny+0.2);
    var parietal=0.07*Math.max(0,ny-0.3)*Math.exp(-nx*nx*3);
    var temporal=0.08*Math.max(0,nz-0.3)*Math.max(0,-ny-0.1);
    var cerebellum=-0.10*Math.max(0,-ny-0.3)*Math.max(0,-nx);
    var sulcus=-0.04*Math.exp(-nx*nx*20)*Math.max(0,ny-0.5);
    var disp=frontal+occip+parietal+temporal+cerebellum+sulcus;
    var r=1.0+disp;
    return {x:nx*r*sx,y:ny*r*sy,z:nz*r*sz};
  }

  function randomSurfaceNode(){
    // Random point on unit sphere -> project to brain surface
    var u=Math.random()*2-1;
    var t=Math.random()*Math.PI*2;
    var s=Math.sqrt(1-u*u);
    var nx=s*Math.cos(t), ny=u, nz=s*Math.sin(t);
    var p=brainPos(nx,ny,nz);
    // Add tiny random offset outward (1-3% of radius)
    var scale=1.01+Math.random()*0.03;
    return {x:p.x*scale,y:p.y*scale,z:p.z*scale};
  }

  var orangeNodes=[], blueNodes=[];
  for(var i=0;i<58;i++) orangeNodes.push(randomSurfaceNode());
  for(var i=0;i<70;i++) blueNodes.push(randomSurfaceNode());

  // Make sprite textures
  function makeSpriteTex(isOrange){
    var c=document.createElement('canvas');c.width=64;c.height=64;
    var ctx=c.getContext('2d');
    var g=ctx.createRadialGradient(32,32,0,32,32,28);
    if(isOrange){
      g.addColorStop(0,'rgba(255,255,255,1)');
      g.addColorStop(0.12,'rgba(255,200,100,1)');
      g.addColorStop(0.3,'rgba(255,100,20,0.85)');
      g.addColorStop(0.6,'rgba(255,60,0,0.3)');
      g.addColorStop(1,'rgba(200,40,0,0)');
    } else {
      g.addColorStop(0,'rgba(255,255,255,1)');
      g.addColorStop(0.12,'rgba(200,230,255,1)');
      g.addColorStop(0.3,'rgba(80,160,255,0.75)');
      g.addColorStop(0.6,'rgba(40,100,220,0.25)');
      g.addColorStop(1,'rgba(20,60,200,0)');
    }
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(32,32,28,0,Math.PI*2);ctx.fill();
    return new THREE.CanvasTexture(c);
  }

  var orangeTex=makeSpriteTex(true);
  var blueTex=makeSpriteTex(false);

  function makePoints(nodes, tex, size){
    var arr=[];
    nodes.forEach(function(n){arr.push(n.x,n.y,n.z);});
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    var mat=new THREE.PointsMaterial({size:size,map:tex,transparent:true,depthTest:false,sizeAttenuation:true,alphaTest:0.02});
    var pts=new THREE.Points(geo,mat);
    pts.renderOrder=2;
    return pts;
  }

  var orangePts=makePoints(orangeNodes,orangeTex,0.10);
  var bluePts=makePoints(blueNodes,blueTex,0.08);
  scene.add(orangePts);
  scene.add(bluePts);

  // Connections
  function makeLines(nodes, color, opacity, maxDist, prob){
    var arr=[];
    for(var i=0;i<nodes.length;i++){
      var a=nodes[i];
      for(var j=i+1;j<nodes.length;j++){
        var b=nodes[j];
        var dx=a.x-b.x,dy=a.y-b.y,dz=a.z-b.z;
        if(Math.sqrt(dx*dx+dy*dy+dz*dz)<maxDist && Math.random()<prob){
          arr.push(a.x,a.y,a.z,b.x,b.y,b.z);
        }
      }
    }
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    var mat=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:opacity,depthTest:false});
    var ls=new THREE.LineSegments(geo,mat);
    ls.renderOrder=1;
    return ls;
  }

  var yellowLines=makeLines(orangeNodes,0xddcc00,0.55,0.75,0.4);
  var blueLines=makeLines(blueNodes,0x2288ff,0.30,0.60,0.32);
  scene.add(yellowLines);
  scene.add(blueLines);

  // Surface fiber web
  (function(){
    var arr=[];
    for(var f=0;f<500;f++){
      var u=Math.random()*2-1,t=Math.random()*Math.PI*2;
      var s=Math.sqrt(1-u*u);
      var nx=s*Math.cos(t),ny=u,nz=s*Math.sin(t);
      var p=brainPos(nx,ny,nz);
      var r0=1.02+Math.random()*0.02;
      var x0=p.x*r0,y0=p.y*r0,z0=p.z*r0;
      // tangent direction
      var tang=new THREE.Vector3(-Math.sin(t),0,Math.cos(t));
      var tang2=new THREE.Vector3(-u*Math.cos(t),Math.sqrt(1-u*u),-u*Math.sin(t)).normalize();
      var mixA=Math.random(),mixB=Math.random();
      var len=0.08+Math.random()*0.18;
      var ex=tang.x*mixA*len+tang2.x*mixB*len;
      var ey=tang.y*mixA*len+tang2.y*mixB*len;
      var ez=tang.z*mixA*len+tang2.z*mixB*len;
      arr.push(x0,y0,z0,x0+ex,y0+ey,z0+ez);
    }
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    var mat=new THREE.LineBasicMaterial({color:0x1a44bb,transparent:true,opacity:0.20,depthTest:false});
    var ls=new THREE.LineSegments(geo,mat);
    ls.renderOrder=1;
    scene.add(ls);
    // store for rotation
    scene._fibers=ls;
  })();

  // === Feature hotspots ===
  // Positions in brain local space (normalized direction * surface offset)
  var features=[
    {name:'AI Q&A',           dir:new THREE.Vector3( 0.75, 0.30, 0.75)},  // Frontal: front-left-up
    {name:'Video Processing', dir:new THREE.Vector3( 0.0,  0.85, 0.45)},  // Parietal: top-center
    {name:'Transcription',    dir:new THREE.Vector3( 0.50,-0.20, 0.90)},  // Temporal: front-low-side
    {name:'Semantic Search',  dir:new THREE.Vector3(-0.80, 0.20, 0.40)},  // Occipital: back-up
    {name:'Smart Notes',      dir:new THREE.Vector3(-0.50,-0.65, 0.30)},  // Cerebellum: back-bottom
    {name:'Chrome Extension', dir:new THREE.Vector3( 0.10,-0.95, 0.10)}   // Brainstem: bottom-center
  ];

  // Compute actual 3D surface positions for each feature
  features.forEach(function(f){
    var d=f.dir.normalize();
    var p=brainPos(d.x,d.y,d.z);
    f.pos=new THREE.Vector3(p.x*1.05,p.y*1.05,p.z*1.05);
  });

  // Hotspot sprite
  function makeHotspotTex(){
    var c=document.createElement('canvas');c.width=64;c.height=64;
    var ctx=c.getContext('2d');
    var g=ctx.createRadialGradient(32,32,1,32,32,26);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.18,'rgba(255,180,80,1)');
    g.addColorStop(0.45,'rgba(255,80,10,0.7)');
    g.addColorStop(0.8,'rgba(200,40,0,0.2)');
    g.addColorStop(1,'rgba(180,20,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(32,32,26,0,Math.PI*2);ctx.fill();
    // Ring
    ctx.strokeStyle='rgba(255,180,60,0.9)';
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(32,32,20,0,Math.PI*2);ctx.stroke();
    return new THREE.CanvasTexture(c);
  }
  var hotTex=makeHotspotTex();

  var hotspotObjs=[];
  features.forEach(function(f,idx){
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute([f.pos.x,f.pos.y,f.pos.z],3));
    var mat=new THREE.PointsMaterial({size:0.14,map:hotTex,transparent:true,depthTest:false,sizeAttenuation:true});
    var pt=new THREE.Points(geo,mat);
    pt.renderOrder=4;
    pt.userData={fi:idx};
    scene.add(pt);
    hotspotObjs.push(pt);
  });

  // Pulse rings
  var pulseRings=[];
  features.forEach(function(f,idx){
    var pts=[];
    var segs=32;
    for(var s=0;s<=segs;s++){var a=s/segs*Math.PI*2;pts.push(Math.cos(a)*0.08,Math.sin(a)*0.08,0);}
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    var mat=new THREE.LineBasicMaterial({color:0xff8833,transparent:true,opacity:0.6,depthTest:false});
    var ring=new THREE.LineLoop(geo,mat);
    ring.position.copy(f.pos);
    ring.renderOrder=3;
    ring.userData={phase:idx*1.1};
    scene.add(ring);
    pulseRings.push(ring);
  });

  // Group everything for rotation
  var brainGroup=new THREE.Group();
  // Re-add all objects to group
  scene.children.slice().forEach(function(o){scene.remove(o);brainGroup.add(o);});
  scene.add(brainGroup);

  // === Interaction ===
  var rotY=0.25, rotX=-0.05;
  var targetRotY=0.25, targetRotX=-0.05;
  var isDragging=false, lastMX=0, lastMY=0;
  var autoSpin=true;
  var labelTimer=null;

  canvas.addEventListener('mousedown',function(e){
    isDragging=true; lastMX=e.clientX; lastMY=e.clientY;
    autoSpin=false;
    handleClick(e.clientX,e.clientY);
  });
  document.addEventListener('mousemove',function(e){
    if(!isDragging)return;
    var dx=e.clientX-lastMX,dy=e.clientY-lastMY;
    targetRotY+=dx*0.008;
    targetRotX=Math.max(-0.9,Math.min(0.9,targetRotX+dy*0.005));
    lastMX=e.clientX;lastMY=e.clientY;
  });
  document.addEventListener('mouseup',function(){isDragging=false;});

  canvas.addEventListener('touchstart',function(e){
    e.preventDefault();isDragging=true;autoSpin=false;
    lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;
    handleClick(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:false});
  document.addEventListener('touchmove',function(e){
    if(!isDragging)return;
    var dx=e.touches[0].clientX-lastMX,dy=e.touches[0].clientY-lastMY;
    targetRotY+=dx*0.008;
    targetRotX=Math.max(-0.9,Math.min(0.9,targetRotX+dy*0.005));
    lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;
  },{passive:false});
  document.addEventListener('touchend',function(){isDragging=false;});

  var raycaster=new THREE.Raycaster();
  raycaster.params.Points={threshold:0.15};
  var mouse2D=new THREE.Vector2();

  function handleClick(cx,cy){
    var rect=canvas.getBoundingClientRect();
    mouse2D.x=((cx-rect.left)/rect.width)*2-1;
    mouse2D.y=-((cy-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse2D,camera);
    var hits=raycaster.intersectObjects(hotspotObjs,false);
    if(hits.length>0){
      var fi=hits[0].object.userData.fi;
      var f=features[fi];
      // Rotate brain so this feature faces camera (bring Z toward viewer)
      targetRotY=-Math.atan2(f.pos.x,f.pos.z)+0.0;
      targetRotX=-Math.atan2(f.pos.y,Math.sqrt(f.pos.x*f.pos.x+f.pos.z*f.pos.z))*0.5;
      showLabel(f.name);
    } else {
      hideLabel();
    }
  }

  function showLabel(name){
    if(labelTimer)clearTimeout(labelTimer);
    label.textContent=name;
    label.classList.add('visible');
    labelTimer=setTimeout(hideLabel,3500);
  }
  function hideLabel(){label.classList.remove('visible');}

  var clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var t=clock.getElapsedTime();
    if(autoSpin) targetRotY+=0.0025;
    rotY+=(targetRotY-rotY)*0.055;
    rotX+=(targetRotX-rotX)*0.055;
    brainGroup.rotation.y=rotY;
    brainGroup.rotation.x=rotX;

    // Pulse rings face camera
    pulseRings.forEach(function(r,i){
      r.lookAt(camera.position);
      var ph=(t*1.5+r.userData.phase)%(Math.PI*2);
      var sc=0.9+Math.sin(ph)*0.45;
      r.scale.set(sc,sc,sc);
      r.material.opacity=0.3+Math.sin(ph)*0.4;
    });

    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',function(){
    W=section.clientWidth;H=section.clientHeight;
    camera.aspect=W/H;camera.updateProjectionMatrix();
    renderer.setSize(W,H);
  });
})();
</script>
</body>
</html>
