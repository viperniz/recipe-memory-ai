<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 50% 30%,#0a1628 0%,#050d1a 60%,#020810 100%);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.header{text-align:center;padding:28px 20px 8px}
.logo{font-size:2.6rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase}
.tagline{font-size:0.95rem;color:#64748b;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
.brain-wrap{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:10px 0}
#brainCanvas{cursor:grab;display:block;filter:drop-shadow(0 0 40px rgba(60,120,255,0.35))}
#brainCanvas:active{cursor:grabbing}
.drag-tip{color:rgba(255,255,255,0.25);font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px;text-align:center}
.bottom{text-align:center;padding:16px 20px 28px;width:100%;max-width:560px}
.cd{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.cdu{text-align:center}
.cdn{font-size:2.1rem;font-weight:700;color:#60a5fa;display:block;line-height:1}
.cdl{font-size:0.6rem;color:#475569;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.sep{color:#1e3a5f;font-size:2rem;align-self:center;margin-top:-8px}
.email-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.email-row input{padding:11px 16px;border-radius:8px;border:1px solid rgba(74,240,252,0.25);background:rgba(255,255,255,0.04);color:#fff;font-size:0.9rem;width:250px;outline:none;transition:border-color 0.2s}
.email-row input:focus{border-color:rgba(74,240,252,0.7)}
.email-row button{padding:11px 22px;border-radius:8px;border:none;background:linear-gradient(135deg,#4f46e5,#0ea5e9);color:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;transition:opacity 0.2s;letter-spacing:0.5px}
.email-row button:hover{opacity:0.85}
.tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.tag{padding:4px 12px;border-radius:20px;border:1px solid rgba(74,240,252,0.2);color:#64748b;font-size:0.72rem;letter-spacing:0.5px}
#tooltip{position:fixed;background:rgba(2,8,20,0.95);border:1px solid rgba(74,240,252,0.6);border-radius:10px;padding:10px 18px;font-size:0.9rem;font-weight:700;color:#4af0fc;pointer-events:none;opacity:0;transition:opacity 0.25s,transform 0.25s;transform:translateY(6px);z-index:100;letter-spacing:1px;text-transform:uppercase;box-shadow:0 0 20px rgba(74,240,252,0.3)}
#tooltip.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div class="header">
<div class="logo">CORTEXLE</div>
<div class="tagline">AI-Powered Video Intelligence &mdash; Coming Soon</div>
</div>
<div class="brain-wrap">
<canvas id="brainCanvas"></canvas>
<div class="drag-tip">&#8678; Drag to rotate &nbsp;&bull;&nbsp; Click to explore &#8680;</div>
</div>
<div class="bottom">
<div class="cd">
<div class="cdu"><span class="cdn" id="cd-d">91</span><div class="cdl">Days</div></div>
<div class="sep">:</div>
<div class="cdu"><span class="cdn" id="cd-h">00</span><div class="cdl">Hours</div></div>
<div class="sep">:</div>
<div class="cdu"><span class="cdn" id="cd-m">00</span><div class="cdl">Mins</div></div>
<div class="sep">:</div>
<div class="cdu"><span class="cdn" id="cd-s">00</span><div class="cdl">Secs</div></div>
</div>
<div class="email-row">
<input type="email" id="emailInput" placeholder="Enter your email">
<button onclick="notify()">Notify Me</button>
</div>
<div class="tags">
<span class="tag">AI Video</span><span class="tag">Transcription</span><span class="tag">Semantic Search</span><span class="tag">Chrome Extension</span><span class="tag">Smart Notes</span>
</div>
</div>
<div id="tooltip"></div>
<script>
(function(){
'use strict';
var canvas=document.getElementById('brainCanvas');
var ctx=canvas.getContext('2d');
var W=560,H=400;
canvas.width=W;canvas.height=H;

// Rotation state
var rotY=0; // -180 to 180 degrees, 0=side view, 90=front view
var isDragging=false,dragStart=0,rotStart=0;
var targetRotY=0;
var animFrame=null;

// Features mapped to brain regions
// For side view (rotY=0): positions are on lateral brain
// For front view (rotY=90): positions shift to front-facing lobes
var features=[
  {id:'aiq',  name:'AI Q&A',        region:'Frontal Lobe',   // language & reasoning
   side:{x:0.22,y:0.38},front:{x:0.38,y:0.28}},
  {id:'vid',  name:'Video Processing',region:'Parietal Lobe', // sensory integration
   side:{x:0.50,y:0.22},front:{x:0.42,y:0.38}},
  {id:'trans',name:'Transcription',  region:'Temporal Lobe',  // audio & speech
   side:{x:0.26,y:0.60},front:{x:0.35,y:0.62}},
  {id:'sem',  name:'Semantic Search',region:'Occipital Lobe', // visual recognition
   side:{x:0.76,y:0.38},front:{x:0.62,y:0.35}},
  {id:'notes',name:'Smart Notes',    region:'Cerebellum',     // organisation
   side:{x:0.70,y:0.72},front:{x:0.50,y:0.80}},
  {id:'ext',  name:'Chrome Extension',region:'Brainstem',     // always-on
   side:{x:0.44,y:0.82},front:{x:0.50,y:0.92}}
];

var activeFeature=null;
var tooltip=document.getElementById('tooltip');

// Brain outline paths for different rotations
// We interpolate between side-view and front-view brain shapes

// Side-view brain path (normalized 0-1)
var sidePathPts=[
  [0.14,0.50],[0.12,0.35],[0.16,0.22],[0.25,0.10],[0.38,0.04],
  [0.52,0.02],[0.65,0.06],[0.76,0.14],[0.84,0.25],[0.88,0.38],
  [0.86,0.50],[0.80,0.58],[0.82,0.64],[0.78,0.70],[0.68,0.75],
  [0.58,0.76],[0.50,0.72],[0.42,0.74],[0.34,0.72],[0.28,0.68],
  [0.20,0.62],[0.14,0.56],[0.14,0.50]
];

// Front-view brain path (symmetric, wider)
var frontPathPts=[
  [0.28,0.15],[0.22,0.20],[0.16,0.30],[0.14,0.42],[0.16,0.55],
  [0.20,0.65],[0.28,0.72],[0.38,0.75],[0.50,0.76],[0.62,0.75],
  [0.72,0.72],[0.80,0.65],[0.84,0.55],[0.86,0.42],[0.84,0.30],
  [0.78,0.20],[0.72,0.15],[0.62,0.10],[0.50,0.08],[0.38,0.10],[0.28,0.15]
];

function lerp(a,b,t){return a+(b-a)*t}

function getRotT(){
  // 0=side, 1=front-ish. Use sin to simulate perspective foreshortening
  var r=Math.abs(rotY%360);
  if(r>180)r=360-r;
  return r/180; // 0 at side, 1 at back
}

function getPathPts(){
  // For visual interest, use side path always but scale X based on rotation
  // This simulates 3D rotation of the lateral brain
  var scaleX=Math.cos(rotY*Math.PI/180);
  var absScale=Math.abs(scaleX);
  var flip=scaleX<0?1:0;
  var pts=[];
  for(var i=0;i<sidePathPts.length;i++){
    var px=sidePathPts[i][0];
    var py=sidePathPts[i][1];
    // Scale X around center (0.5)
    var cx=0.5;
    var dx=px-cx;
    var newX=cx+dx*absScale*(0.5+0.5*absScale); // some foreshortening
    if(flip)newX=1-newX+0.05; // mirror when flipped
    pts.push([newX,py]);
  }
  return pts;
}

function getFeaturePos(f){
  var scaleX=Math.cos(rotY*Math.PI/180);
  var absScale=Math.abs(scaleX);
  var flip=scaleX<0;
  var px=f.side.x;
  var cx=0.5;
  var dx=px-cx;
  var newX=cx+dx*absScale*(0.5+0.5*absScale);
  if(flip)newX=1-newX+0.05;
  return {x:newX*W,y:f.side.y*H,visible:absScale>0.15};
}

// Neural network nodes inside brain (decorative)
var nodes=[];
var numNodes=55;
function initNodes(){
  nodes=[];
  for(var i=0;i<numNodes;i++){
    // Distribute within brain bounds roughly
    var angle=Math.random()*Math.PI*2;
    var r=Math.random()*0.28+0.05;
    var cx=0.5+Math.cos(angle)*r*1.2;
    var cy=0.4+Math.sin(angle)*r*0.85;
    var isOrange=Math.random()<0.28;
    nodes.push({
      x:cx,y:cy,
      vx:(Math.random()-0.5)*0.0002,
      vy:(Math.random()-0.5)*0.0002,
      r:Math.random()*2+1,
      orange:isOrange,
      phase:Math.random()*Math.PI*2,
      brightness:0.5+Math.random()*0.5
    });
  }
  // Add medial longitudinal fissure suggestion - nodes near center
  for(var j=0;j<8;j++){
    nodes.push({x:0.5,y:0.15+j*0.07,vx:0,vy:0,r:1,orange:false,phase:Math.random()*Math.PI*2,brightness:0.4,center:true});
  }
}

function updateNodes(){
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    if(n.center)continue;
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0.18||n.x>0.84)n.vx*=-1;
    if(n.y<0.08||n.y>0.80)n.vy*=-1;
    n.phase+=0.02;
  }
}

function drawBrain(){
  ctx.clearRect(0,0,W,H);
  
  var pts=getPathPts();
  var scaleX=Math.cos(rotY*Math.PI/180);
  var absScale=Math.abs(scaleX);
  
  // Draw brainstem
  var bsX=W*0.46*(0.5+0.5*absScale)+W*0.5*(1-(0.5+0.5*absScale));
  if(scaleX<0)bsX=W-bsX+W*0.05;
  var bsY=H*0.76;
  ctx.beginPath();
  ctx.moveTo(bsX-10*absScale,bsY);
  ctx.bezierCurveTo(bsX-12*absScale,bsY+20,bsX-8*absScale,bsY+45,bsX-5*absScale,bsY+55);
  ctx.bezierCurveTo(bsX,bsY+62,bsX+5*absScale,bsY+55,bsX+8*absScale,bsY+45);
  ctx.bezierCurveTo(bsX+12*absScale,bsY+20,bsX+10*absScale,bsY,bsX+10*absScale,bsY);
  ctx.closePath();
  var bsGrad=ctx.createLinearGradient(bsX-12,bsY,bsX+12,bsY+60);
  bsGrad.addColorStop(0,'rgba(80,140,255,0.35)');
  bsGrad.addColorStop(1,'rgba(40,80,200,0.15)');
  ctx.fillStyle=bsGrad;
  ctx.fill();
  ctx.strokeStyle='rgba(100,160,255,0.5)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  
  if(pts.length<3)return;
  
  // Brain glow layers
  for(var g=4;g>=0;g--){
    ctx.beginPath();
    ctx.moveTo(pts[0][0]*W,pts[0][1]*H);
    for(var i=1;i<pts.length-2;i++){
      var xc=(pts[i][0]+pts[i+1][0])/2*W;
      var yc=(pts[i][1]+pts[i+1][1])/2*H;
      ctx.quadraticCurveTo(pts[i][0]*W,pts[i][1]*H,xc,yc);
    }
    ctx.quadraticCurveTo(pts[pts.length-2][0]*W,pts[pts.length-2][1]*H,pts[pts.length-1][0]*W,pts[pts.length-1][1]*H);
    ctx.closePath();
    
    if(g===0){
      // Fill interior
      var grad=ctx.createRadialGradient(W*0.5,H*0.42,0,W*0.5,H*0.42,W*0.42);
      grad.addColorStop(0,'rgba(20,40,100,0.5)');
      grad.addColorStop(0.5,'rgba(10,20,60,0.4)');
      grad.addColorStop(1,'rgba(5,10,30,0.2)');
      ctx.fillStyle=grad;
      ctx.fill();
      ctx.strokeStyle='rgba(120,180,255,0.9)';
      ctx.lineWidth=2;
      ctx.shadowColor='rgba(80,160,255,0.8)';
      ctx.shadowBlur=15;
      ctx.stroke();
      ctx.shadowBlur=0;
    } else {
      var alpha=0.12-g*0.02;
      ctx.fillStyle='rgba(60,120,255,'+alpha+')';
      ctx.fill();
      var glowW=g*6;
      ctx.strokeStyle='rgba(80,160,255,'+(0.3-g*0.05)+')';
      ctx.lineWidth=glowW;
      ctx.stroke();
    }
  }
  
  // Draw neural connections inside brain
  ctx.save();
  // Clip to brain shape
  ctx.beginPath();
  ctx.moveTo(pts[0][0]*W,pts[0][1]*H);
  for(var i=1;i<pts.length-2;i++){
    var xc=(pts[i][0]+pts[i+1][0])/2*W;
    var yc=(pts[i][1]+pts[i+1][1])/2*H;
    ctx.quadraticCurveTo(pts[i][0]*W,pts[i][1]*H,xc,yc);
  }
  ctx.quadraticCurveTo(pts[pts.length-2][0]*W,pts[pts.length-2][1]*H,pts[pts.length-1][0]*W,pts[pts.length-1][1]*H);
  ctx.closePath();
  ctx.clip();
  
  var t=Date.now()/1000;
  
  // Scale node X positions based on rotation
  function nodeX(n){
    var cx=0.5;
    var dx=n.x-cx;
    var nx=cx+dx*absScale*(0.5+0.5*absScale);
    if(scaleX<0)nx=1-nx+0.05;
    return nx*W;
  }
  function nodeY(n){return n.y*H}
  
  // Draw connections
  for(var i=0;i<nodes.length;i++){
    for(var j=i+1;j<nodes.length;j++){
      var ni=nodes[i],nj=nodes[j];
      var dx=(ni.x-nj.x)*absScale;
      var dy=ni.y-nj.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<0.18){
        var alpha=(1-dist/0.18)*0.35;
        var isOrangeConn=ni.orange&&nj.orange;
        if(isOrangeConn){
          ctx.strokeStyle='rgba(255,160,50,'+alpha*0.7+')';
        } else {
          ctx.strokeStyle='rgba(80,160,255,'+alpha+')';
        }
        ctx.lineWidth=0.5;
        ctx.beginPath();
        ctx.moveTo(nodeX(ni),nodeY(ni));
        ctx.lineTo(nodeX(nj),nodeY(nj));
        ctx.stroke();
      }
    }
  }
  
  // Draw gyri/sulci lines
  ctx.strokeStyle='rgba(100,160,255,0.25)';
  ctx.lineWidth=1;
  // Lateral fissure (Sylvian) - horizontal through middle
  var fissY=H*0.52;
  var fissX1=W*(0.5+0.08*absScale*(scaleX<0?-1:1));
  var fissX2=W*(0.5+0.35*absScale*(scaleX<0?-1:1));
  if(scaleX<0){var tmp=fissX1;fissX1=fissX2;fissX2=tmp;}
  ctx.beginPath();
  ctx.moveTo(fissX1,fissY);
  ctx.bezierCurveTo(fissX1+20*absScale*(scaleX<0?-1:1),fissY-5,fissX2-20*absScale*(scaleX<0?-1:1),fissY+5,fissX2,fissY);
  ctx.stroke();
  
  // Central sulcus - slight diagonal
  var csX=W*(0.5+0.15*absScale*(scaleX<0?-1:1));
  ctx.beginPath();
  ctx.moveTo(csX,H*0.18);
  ctx.bezierCurveTo(csX+5*absScale*(scaleX<0?-1:1),H*0.3,csX-3,H*0.42,csX-5,H*0.52);
  ctx.stroke();
  
  // Parieto-occipital sulcus
  var posX=W*(0.5+0.28*absScale*(scaleX<0?-1:1));
  ctx.beginPath();
  ctx.moveTo(posX,H*0.12);
  ctx.bezierCurveTo(posX+3,H*0.25,posX-3,H*0.38,posX+2,H*0.48);
  ctx.stroke();
  
  // Draw gyri contour lines (curved surface lines)
  ctx.strokeStyle='rgba(80,150,255,0.2)';
  ctx.lineWidth=0.8;
  for(var g=0;g<4;g++){
    var gy=H*(0.22+g*0.12);
    var gxs=W*(0.5-0.32*absScale);
    var gxe=W*(0.5+0.32*absScale);
    if(scaleX<0){var tmp=gxs;gxs=gxe;gxe=tmp;}
    ctx.beginPath();
    ctx.moveTo(gxs,gy);
    ctx.bezierCurveTo(gxs+40*absScale*(scaleX<0?-1:1),gy-8,gxe-40*absScale*(scaleX<0?-1:1),gy+8,gxe,gy);
    ctx.stroke();
  }
  
  // Medial longitudinal fissure (top center line when viewing from front)
  if(absScale<0.5){
    var fissAlpha=(0.5-absScale)*2;
    ctx.strokeStyle='rgba(60,120,220,'+fissAlpha*0.4+')';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(W*0.5,H*0.08);
    ctx.bezierCurveTo(W*0.5,H*0.3,W*0.5,H*0.5,W*0.5,H*0.72);
    ctx.stroke();
  }
  
  // Draw nodes
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    var nx=nodeX(n),ny=nodeY(n);
    var pulse=Math.sin(t*2+n.phase)*0.3+0.7;
    var nr=n.r*pulse;
    if(n.orange){
      ctx.shadowColor='rgba(255,120,40,0.9)';
      ctx.shadowBlur=8;
      ctx.fillStyle='rgba(255,'+(140+Math.floor(pulse*60))+',50,'+n.brightness*pulse+')';
    } else {
      ctx.shadowColor='rgba(80,160,255,0.8)';
      ctx.shadowBlur=6;
      ctx.fillStyle='rgba(150,200,255,'+n.brightness*pulse+')';
    }
    ctx.beginPath();
    ctx.arc(nx,ny,nr,0,Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.restore();
  
  // Outer glow rim
  ctx.beginPath();
  ctx.moveTo(pts[0][0]*W,pts[0][1]*H);
  for(var i=1;i<pts.length-2;i++){
    var xc=(pts[i][0]+pts[i+1][0])/2*W;
    var yc=(pts[i][1]+pts[i+1][1])/2*H;
    ctx.quadraticCurveTo(pts[i][0]*W,pts[i][1]*H,xc,yc);
  }
  ctx.quadraticCurveTo(pts[pts.length-2][0]*W,pts[pts.length-2][1]*H,pts[pts.length-1][0]*W,pts[pts.length-1][1]*H);
  ctx.closePath();
  ctx.strokeStyle='rgba(160,210,255,0.95)';
  ctx.lineWidth=2.5;
  ctx.shadowColor='rgba(120,200,255,1)';
  ctx.shadowBlur=20;
  ctx.stroke();
  ctx.shadowBlur=0;
  
  // Draw feature hotspots
  for(var i=0;i<features.length;i++){
    var f=features[i];
    var pos=getFeaturePos(f);
    if(!pos.visible)continue;
    var isActive=activeFeature&&activeFeature.id===f.id;
    var pulse2=Math.sin(t*3+i*1.2)*0.4+0.6;
    
    // Outer ring pulse
    ctx.beginPath();
    ctx.arc(pos.x,pos.y,10*pulse2,0,Math.PI*2);
    ctx.fillStyle=isActive?'rgba(255,100,50,0.15)':'rgba(74,240,252,0.1)';
    ctx.fill();
    
    // Middle ring
    ctx.beginPath();
    ctx.arc(pos.x,pos.y,6,0,Math.PI*2);
    ctx.fillStyle=isActive?'rgba(255,100,50,0.3)':'rgba(74,240,252,0.2)';
    ctx.fill();
    ctx.strokeStyle=isActive?'rgba(255,140,80,0.8)':'rgba(74,240,252,0.7)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    
    // Inner dot
    ctx.beginPath();
    ctx.arc(pos.x,pos.y,3.5,0,Math.PI*2);
    ctx.fillStyle=isActive?'#ff6b35':'#4af0fc';
    ctx.shadowColor=isActive?'#ff6b35':'#4af0fc';
    ctx.shadowBlur=12;
    ctx.fill();
    ctx.shadowBlur=0;
  }
  
  updateNodes();
}

function animate(){
  // Smooth rotation easing
  rotY+=(targetRotY-rotY)*0.12;
  drawBrain();
  animFrame=requestAnimationFrame(animate);
}

// Mouse/touch events
canvas.addEventListener('mousedown',function(e){
  isDragging=true;
  dragStart=e.clientX;
  rotStart=targetRotY;
  canvas.style.cursor='grabbing';
});
document.addEventListener('mousemove',function(e){
  if(!isDragging)return;
  var dx=e.clientX-dragStart;
  targetRotY=rotStart+dx*0.4;
});
document.addEventListener('mouseup',function(){
  isDragging=false;
  canvas.style.cursor='grab';
});

// Touch events
canvas.addEventListener('touchstart',function(e){
  isDragging=true;
  dragStart=e.touches[0].clientX;
  rotStart=targetRotY;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',function(e){
  if(!isDragging)return;
  var dx=e.touches[0].clientX-dragStart;
  targetRotY=rotStart+dx*0.4;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',function(){isDragging=false;});

// Click to show feature name
canvas.addEventListener('click',function(e){
  if(Math.abs(targetRotY-rotStart)>5)return; // was dragging
  var rect=canvas.getBoundingClientRect();
  var mx=e.clientX-rect.left;
  var my=e.clientY-rect.top;
  var scaleX=canvas.width/rect.width;
  var scaleY=canvas.height/rect.height;
  mx*=scaleX;my*=scaleY;
  
  var hit=null;
  var minD=999;
  for(var i=0;i<features.length;i++){
    var f=features[i];
    var pos=getFeaturePos(f);
    if(!pos.visible)continue;
    var dx=mx-pos.x,dy=my-pos.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<18&&d<minD){minD=d;hit=f;}
  }
  
  if(hit){
    if(activeFeature&&activeFeature.id===hit.id){
      activeFeature=null;
      tooltip.classList.remove('show');
    } else {
      activeFeature=hit;
      tooltip.textContent=hit.name;
      // Position tooltip near hotspot
      var pos=getFeaturePos(hit);
      var canvasRect=canvas.getBoundingClientRect();
      var tx=canvasRect.left+(pos.x/W)*canvasRect.width;
      var ty=canvasRect.top+(pos.y/H)*canvasRect.height-50;
      tooltip.style.left=tx+'px';
      tooltip.style.top=ty+'px';
      tooltip.style.transform='translate(-50%,0)';
      tooltip.classList.add('show');
      
      // Snap rotation toward 0 (side view) for good visibility
      targetRotY=Math.round(targetRotY/360)*360;
    }
  } else {
    activeFeature=null;
    tooltip.classList.remove('show');
  }
});

// Countdown
var tgt=new Date();tgt.setDate(tgt.getDate()+91);
function tick(){
  var d=Math.max(0,tgt-new Date());
  document.getElementById('cd-d').textContent=String(Math.floor(d/86400000)).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');
}
tick();setInterval(tick,1000);

initNodes();
animate();

window.notify=function(){
  var e=document.getElementById('emailInput').value;
  if(e&&e.includes('@')){
    alert('Thanks! We will notify you at '+e);
    document.getElementById('emailInput').value='';
  }
};

})();
</script>
