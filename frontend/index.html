<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cortexle - Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
header{width:100%;padding:18px 40px;text-align:center}
.logo{font-size:26px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#4fc3f7,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero{text-align:center;padding:4px 20px 0}
.hero h1{font-size:clamp(26px,4vw,48px);font-weight:700;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,#4fc3f7 50%,#7c4dff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:clamp(12px,1.5vw,16px);color:rgba(255,255,255,0.5);max-width:440px;margin:0 auto 6px}
#bs{position:relative;width:100%;max-width:720px;height:510px;margin:0 auto}
#bc{display:block;width:100%;height:100%;cursor:grab}
#bc:active{cursor:grabbing}
.fl{position:absolute;left:50%;top:9%;transform:translate(-50%,-50%);background:rgba(0,0,20,0.92);border:1px solid rgba(79,195,247,0.7);border-radius:8px;padding:7px 18px;font-size:14px;font-weight:600;color:#4fc3f7;pointer-events:none;opacity:0;transition:opacity 0.35s;white-space:nowrap;letter-spacing:0.5px;box-shadow:0 0 18px rgba(79,195,247,0.3)}
.fl.on{opacity:1}
.hint{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;text-align:center}
.cd-s{text-align:center;padding:2px 20px 12px}
.cd-t{font-size:11px;color:rgba(255,255,255,0.32);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.cd-g{display:flex;gap:20px;justify-content:center}
.cd-i{text-align:center}
.cd-n{font-size:clamp(24px,3.5vw,40px);font-weight:700;color:#4fc3f7;line-height:1;display:block}
.cd-l{font-size:10px;color:rgba(255,255,255,0.32);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.es{padding:0 20px 12px;text-align:center}
.ef{display:flex;gap:10px;max-width:360px;margin:0 auto}
.ei{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(79,195,247,0.28);border-radius:8px;padding:10px 14px;color:#fff;font-size:13px;outline:none;transition:border-color 0.3s}
.ei::placeholder{color:rgba(255,255,255,0.26)}
.ei:focus{border-color:#4fc3f7}
.eb{background:linear-gradient(135deg,#4fc3f7,#7c4dff);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tgs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:0 20px 22px;max-width:600px}
.tg{background:rgba(79,195,247,0.07);border:1px solid rgba(79,195,247,0.2);border-radius:20px;padding:5px 13px;font-size:11px;color:rgba(255,255,255,0.58)}
</style>
</head>
<body>
<header><div class="logo">CORTEXLE</div></header>
<div class="hero">
  <h1>AI Video Intelligence</h1>
  <p>Transform any video into searchable, interactive knowledge</p>
</div>
<div id="bs"><canvas id="bc"></canvas><div class="fl" id="fl"></div></div>
<div class="hint">Click a node &bull; Drag to rotate</div>
<div class="cd-s">
  <div class="cd-t">Launching In</div>
  <div class="cd-g">
    <div class="cd-i"><span class="cd-n" id="cd-d">00</span><div class="cd-l">Days</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-h">00</span><div class="cd-l">Hours</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-m">00</span><div class="cd-l">Mins</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-s">00</span><div class="cd-l">Secs</div></div>
  </div>
</div>
<div class="es">
  <form class="ef" onsubmit="return false">
    <input class="ei" type="email" placeholder="Enter your email" id="ei"/>
    <button class="eb" onclick="notifyMe()">Notify Me</button>
  </form>
</div>
<div class="tgs">
  <span class="tg">AI Q&amp;A</span><span class="tg">Video Processing</span><span class="tg">Transcription</span>
  <span class="tg">Semantic Search</span><span class="tg">Smart Notes</span><span class="tg">Chrome Extension</span>
</div>
<script>
(function(){
  var tgt=new Date('2025-09-01T00:00:00Z');
  function upd(){var n=new Date(),d=Math.max(0,tgt-n),v=[Math.floor(d/864e5),Math.floor((d%864e5)/36e5),Math.floor((d%36e5)/6e4),Math.floor((d%6e4)/1e3)];['cd-d','cd-h','cd-m','cd-s'].forEach(function(id,i){document.getElementById(id).textContent=String(v[i]).padStart(2,'0');});}
  upd();setInterval(upd,1000);
  window.notifyMe=function(){var v=document.getElementById('ei').value;if(v&&v.includes('@'))alert('Thanks! We will notify you at '+v);};
})();
(function(){
  var sec=document.getElementById('bs'),cv=document.getElementById('bc'),fl=document.getElementById('fl');
  var DPR=Math.min(window.devicePixelRatio||1,2);
  var W=sec.clientWidth,H=sec.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  var ctx=cv.getContext('2d');
  ctx.scale(DPR,DPR);

  // === 3D node system with simple perspective projection ===
  // Brain ellipsoid: rx=half-width(Z axis), ry=half-height, rz=half-depth(X axis)
  // We view from Z+ direction by default
  var RX=200, RY=170, RZ=130; // brain ellipsoid radii in pixels
  var CX=W/2, CY=H/2-10;  // center
  var FOV=600; // perspective depth

  // Rotation state
  var rotY=0, rotX=-0.08; // slight downward tilt to show 3D
  var targetRotY=0, targetRotX=-0.08;
  var drag=false, lastMX=0, lastMY=0, spin=true;

  // Project 3D point to 2D
  function project(px,py,pz){
    // Apply rotY (around Y axis)
    var cosY=Math.cos(rotY),sinY=Math.sin(rotY);
    var rx=px*cosY+pz*sinY;
    var ry=py;
    var rz=-px*sinY+pz*cosY;
    // Apply rotX (around X axis)
    var cosX=Math.cos(rotX),sinX=Math.sin(rotX);
    var ry2=ry*cosX-rz*sinX;
    var rz2=ry*sinX+rz*cosX;
    // Perspective
    var scale=FOV/(FOV+rz2);
    return {x:CX+rx*scale, y:CY-ry2*scale, z:rz2, scale:scale};
  }

  // Generate surface nodes on the brain ellipsoid
  function randNode(){
    var u=Math.random()*2-1;
    var t=Math.random()*Math.PI*2;
    var s=Math.sqrt(Math.max(0,1-u*u));
    var nx=s*Math.cos(t)*RX*(0.98+Math.random()*0.04);
    var ny=u*RY*(0.98+Math.random()*0.04);
    var nz=s*Math.sin(t)*RZ*(0.98+Math.random()*0.04);
    return {x:nx,y:ny,z:nz};
  }

  var oNodes=[], bNodes=[];
  for(var i=0;i<120;i++) oNodes.push(randNode());
  for(var i=0;i<140;i++) bNodes.push(randNode());

  // Build connections (precomputed pairs)
  var oConns=[], bConns=[], fibers=[];
  for(var i=0;i<oNodes.length;i++) for(var j=i+1;j<oNodes.length;j++){
    var dx=oNodes[i].x-oNodes[j].x,dy=oNodes[i].y-oNodes[j].y,dz=oNodes[i].z-oNodes[j].z;
    var d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<120&&Math.random()<0.42) oConns.push([i,j]);
  }
  for(var i=0;i<bNodes.length;i++) for(var j=i+1;j<bNodes.length;j++){
    var dx=bNodes[i].x-bNodes[j].x,dy=bNodes[i].y-bNodes[j].y,dz=bNodes[i].z-bNodes[j].z;
    var d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<105&&Math.random()<0.26) bConns.push([i,j]);
  }
  // Fiber strands (short lines on surface)
  for(var f=0;f<900;f++){
    var n=randNode();
    var ang=Math.random()*Math.PI*2, len=8+Math.random()*28;
    var tx=Math.cos(ang)*len*0.5, ty=Math.sin(ang)*len*0.5;
    fibers.push([n, {x:n.x+tx, y:n.y+ty, z:n.z+Math.random()*8-4}]);
  }

  // Feature hotspots - 3D positions on brain surface
  // Coordinate system: X=left-right(medial-lateral), Y=up-down, Z=front(+)/back(-)
  var features=[
    {name:'AI Q&A',          p:{x:30,  y:80,  z:180}}, // Frontal (+Z, upper)
    {name:'Video Processing',p:{x:10,  y:165, z:60 }}, // Parietal (top)
    {name:'Transcription',   p:{x:125, y:-30, z:80 }}, // Temporal (side, lower)
    {name:'Semantic Search', p:{x:20,  y:60,  z:-180}},// Occipital (-Z)
    {name:'Smart Notes',     p:{x:20,  y:-130,z:-130}},// Cerebellum (back-bottom)
    {name:'Chrome Extension',p:{x:10,  y:-165,z:0  }} // Brainstem (bottom)
  ];

  // Precompute target rotations for each feature
  features.forEach(function(f){
    // To center a feature, rotate so it faces the camera (positive Z)
    var p=f.p;
    f.tY=-Math.atan2(p.x,p.z); // rotate Y to bring feature's X/Z to front
    f.tX=-Math.atan2(p.y,Math.sqrt(p.x*p.x+p.z*p.z))*0.4;
  });

  // Brain lateral silhouette path (for clipping and drawing)
  function brainPath(ctx, cx, cy, scl){
    // Define lateral brain outline using bezier curves
    // This creates the classic brain side-view profile
    var s=scl||1;
    ctx.beginPath();
    // Starting from front-bottom (frontal base), going clockwise
    ctx.moveTo(cx+160*s, cy+20*s);   // front-center
    ctx.bezierCurveTo(cx+200*s,cy-40*s, cx+220*s,cy-120*s, cx+190*s,cy-170*s); // frontal upper
    ctx.bezierCurveTo(cx+150*s,cy-210*s, cx+80*s,cy-230*s, cx+0,cy-220*s); // parietal top
    ctx.bezierCurveTo(cx-80*s,cy-210*s, cx-160*s,cy-180*s, cx-195*s,cy-130*s); // occipital upper
    ctx.bezierCurveTo(cx-220*s,cy-60*s, cx-200*s,cy+30*s, cx-170*s,cy+80*s); // occipital lower
    ctx.bezierCurveTo(cx-140*s,cy+130*s, cx-100*s,cy+150*s, cx-60*s,cy+110*s); // cerebellum
    ctx.bezierCurveTo(cx-30*s,cy+80*s, cx+10*s,cy+100*s, cx+20*s,cy+120*s); // brainstem top
    ctx.bezierCurveTo(cx+30*s,cy+155*s, cx+20*s,cy+185*s, cx+10*s,cy+195*s); // brainstem
    ctx.bezierCurveTo(cx+0,cy+200*s, cx-10*s,cy+195*s, cx-15*s,cy+190*s); // brainstem back
    ctx.bezierCurveTo(cx-5*s,cy+170*s, cx-5*s,cy+150*s, cx+20*s,cy+120*s); // back to junction
    // Actually let me simplify: just draw the main cerebrum outline
    ctx.closePath();
  }

  // SIMPLIFIED APPROACH: Draw brain as an elliptical clipping path
  // that matches the lateral brain look, then clip nodes to it
  function drawBrain(){
    ctx.clearRect(0,0,W,H);

    // Step 1: Draw outer glow atmosphere
    var grad=ctx.createRadialGradient(CX,CY,RX*0.5,CX,CY,RX*1.65);
    grad.addColorStop(0,'rgba(10,30,180,0)');
    grad.addColorStop(0.7,'rgba(10,30,180,0.08)');
    grad.addColorStop(0.9,'rgba(20,50,200,0.18)');
    grad.addColorStop(1,'rgba(15,40,160,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.ellipse(CX,CY,RX*1.65,RX*1.65,0,0,Math.PI*2);
    ctx.fill();

    // Step 2: Draw brain dark interior
    // The brain boundary is an ellipse in 2D (projection of the 3D ellipsoid at this rotation)
    var projA=project(-RX,0,0), projB=project(RX,0,0), projC=project(0,-RY,0), projD=project(0,RY,0);
    var projF=project(0,0,RZ), projBk=project(0,0,-RZ);
    // The projected width and height
    var pw=Math.abs(projB.x-projA.x)/2;
    var ph=Math.abs(projD.y-projC.y)/2;
    var angle=0;

    ctx.save();
    ctx.beginPath();
    ctx.ellipse(CX,CY,pw,ph,angle,0,Math.PI*2);
    ctx.fillStyle='#000000';
    ctx.fill();
    ctx.restore();

    // Step 3: Draw fibers (clipped to brain shape)
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(CX,CY,pw*0.99,ph*0.99,angle,0,Math.PI*2);
    ctx.clip();
    ctx.globalAlpha=0.22;
    ctx.strokeStyle='#1133bb';
    ctx.lineWidth=0.7;
    fibers.forEach(function(fb){
      var p1=project(fb[0].x,fb[0].y,fb[0].z);
      var p2=project(fb[1].x,fb[1].y,fb[1].z);
      if(p1.z>0||p2.z>0){ // Only show front hemisphere
        ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      }
    });
    ctx.globalAlpha=1;

    // Step 4: Blue connections (clipped)
    ctx.lineWidth=0.85;
    bConns.forEach(function(c){
      var p1=project(bNodes[c[0]].x,bNodes[c[0]].y,bNodes[c[0]].z);
      var p2=project(bNodes[c[1]].x,bNodes[c[1]].y,bNodes[c[1]].z);
      if(p1.z>-20&&p2.z>-20){
        ctx.globalAlpha=0.28;
        ctx.strokeStyle='#2266ee';
        ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      }
    });

    // Step 5: Yellow connections between orange nodes (clipped)
    ctx.lineWidth=1.0;
    oConns.forEach(function(c){
      var p1=project(oNodes[c[0]].x,oNodes[c[0]].y,oNodes[c[0]].z);
      var p2=project(oNodes[c[1]].x,oNodes[c[1]].y,oNodes[c[1]].z);
      if(p1.z>-20&&p2.z>-20){
        var alpha=0.45+Math.max(0,Math.min(0.25,(p1.z+p2.z)/400));
        ctx.globalAlpha=alpha;
        ctx.strokeStyle='#ddcc00';
        ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      }
    });

    // Step 6: Blue nodes
    bNodes.forEach(function(n){
      var p=project(n.x,n.y,n.z);
      if(p.z>-30){
        var sz=2.8*p.scale*Math.max(0.6,1+p.z/RZ*0.3);
        var a=0.5+p.z/RZ*0.4;
        ctx.globalAlpha=Math.max(0.1,Math.min(0.9,a));
        var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz*3.5);
        g.addColorStop(0,'rgba(255,255,255,1)');
        g.addColorStop(0.15,'rgba(180,220,255,1)');
        g.addColorStop(0.5,'rgba(60,130,255,0.5)');
        g.addColorStop(1,'rgba(20,70,220,0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.arc(p.x,p.y,sz*3.5,0,Math.PI*2);ctx.fill();
      }
    });

    // Step 7: Orange nodes
    oNodes.forEach(function(n){
      var p=project(n.x,n.y,n.z);
      if(p.z>-30){
        var sz=3.5*p.scale*Math.max(0.6,1+p.z/RZ*0.35);
        var a=0.55+p.z/RZ*0.4;
        ctx.globalAlpha=Math.max(0.1,Math.min(1,a));
        var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz*3.8);
        g.addColorStop(0,'rgba(255,255,255,1)');
        g.addColorStop(0.1,'rgba(255,240,180,1)');
        g.addColorStop(0.25,'rgba(255,140,30,0.95)');
        g.addColorStop(0.55,'rgba(255,60,0,0.40)');
        g.addColorStop(1,'rgba(200,20,0,0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.arc(p.x,p.y,sz*3.8,0,Math.PI*2);ctx.fill();
      }
    });

    ctx.restore();

    // Step 8: Brain rim glow (drawn ON TOP of nodes)
    for(var i=6;i>=0;i--){
      var w=pw+i*4.5, h2=ph+i*4.5;
      var opacity=0.06+i*0.01;
      ctx.beginPath();
      ctx.ellipse(CX,CY,w,h2,0,0,Math.PI*2);
      ctx.strokeStyle='rgba(60,130,255,'+opacity+')';
      ctx.lineWidth=3.5+i*2;
      ctx.globalAlpha=1;
      ctx.stroke();
    }
    // Bright thin rim
    ctx.beginPath();
    ctx.ellipse(CX,CY,pw,ph,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,170,255,0.85)';
    ctx.lineWidth=2;
    ctx.globalAlpha=1;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(CX,CY,pw+1,ph+1,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(160,210,255,0.55)';
    ctx.lineWidth=4;
    ctx.stroke();

    // Step 9: Feature hotspot dots
    features.forEach(function(f,i){
      var p=project(f.p.x,f.p.y,f.p.z);
      if(p.z>-10){
        var sz=7*p.scale;
        ctx.globalAlpha=0.85;
        var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz*2.5);
        g.addColorStop(0,'rgba(255,255,255,1)');
        g.addColorStop(0.2,'rgba(255,200,80,1)');
        g.addColorStop(0.5,'rgba(255,100,15,0.7)');
        g.addColorStop(1,'rgba(200,30,0,0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.arc(p.x,p.y,sz*2.5,0,Math.PI*2);ctx.fill();
        // Pulse ring
        var t=Date.now()/800;
        var ph2=(t+i*1.1)%(Math.PI*2);
        var rs=(sz*1.5)*(0.8+Math.sin(ph2)*0.5);
        ctx.globalAlpha=0.3+Math.sin(ph2)*0.35;
        ctx.strokeStyle='#ff9933';
        ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(p.x,p.y,rs,0,Math.PI*2);ctx.stroke();
      }
    });
    ctx.globalAlpha=1;
  }

  // Animation loop
  var animId;
  function animate(){
    animId=requestAnimationFrame(animate);
    if(spin) targetRotY+=0.0018;
    rotY+=(targetRotY-rotY)*0.055;
    rotX+=(targetRotX-rotX)*0.055;
    drawBrain();
  }
  animate();

  // Interaction
  cv.addEventListener('mousedown',function(e){
    drag=true;spin=false;lastMX=e.clientX;lastMY=e.clientY;
    handleClick(e.clientX,e.clientY);
  });
  document.addEventListener('mousemove',function(e){
    if(!drag)return;
    targetRotY+=(e.clientX-lastMX)*0.007;
    targetRotX=Math.max(-0.85,Math.min(0.85,targetRotX+(e.clientY-lastMY)*0.005));
    lastMX=e.clientX;lastMY=e.clientY;
  });
  document.addEventListener('mouseup',function(){drag=false;});
  cv.addEventListener('touchstart',function(e){e.preventDefault();drag=true;spin=false;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;handleClick(lastMX,lastMY);},{passive:false});
  document.addEventListener('touchmove',function(e){if(!drag)return;targetRotY+=(e.touches[0].clientX-lastMX)*0.007;targetRotX=Math.max(-0.85,Math.min(0.85,targetRotX+(e.touches[0].clientY-lastMY)*0.005));lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;},{passive:false});
  document.addEventListener('touchend',function(){drag=false;});

  var lblTimer=null;
  function handleClick(mx,my){
    var rect=cv.getBoundingClientRect();
    var sx=(mx-rect.left)*(cv.width/DPR)/rect.width;
    var sy=(my-rect.top)*(cv.height/DPR)/rect.height;
    var hit=null;
    features.forEach(function(f){
      var p=project(f.p.x,f.p.y,f.p.z);
      if(p.z>-10){
        var dx=sx-p.x,dy=sy-p.y;
        if(Math.sqrt(dx*dx+dy*dy)<22&&(hit===null||p.z>hit.p.z)) hit=f;
      }
    });
    if(hit){
      targetRotY=hit.tY;
      targetRotX=hit.tX;
      if(lblTimer)clearTimeout(lblTimer);
      fl.textContent=hit.name;fl.classList.add('on');
      lblTimer=setTimeout(function(){fl.classList.remove('on');},3500);
    } else {
      fl.classList.remove('on');
    }
  }

  window.addEventListener('resize',function(){
    W=sec.clientWidth;H=sec.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.scale(DPR,DPR);
    CX=W/2;CY=H/2-10;
  });
})();
<\/script>
</body>
</html>
