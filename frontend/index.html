<style>

#globe-wrap{position:relative;width:min(38vw,68vh);height:min(38vw,68vh);flex-shrink:0;pointer-events:none}

.icon-node:hover{border-color:rgba(167,139,250,0.9);box-shadow:0 0 18px rgba(80,180,255,0.8);transform:translate(-50%,-50%) scale(1.15)}

<body>

<div id="main">

<script>
var DPR = Math.min(window.devicePixelRatio||1, 2);

/* ============================================================
   STARFIELD (2D canvas)
============================================================ */
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  c.width=Math.round(innerWidth*DPR); c.height=Math.round(innerHeight*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  var stars=[];
  for(var i=0;i<1800;i++) stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.0+0.2,a:Math.random()*0.65+0.1,fp:Math.random()*6.283,fs:Math.random()*2+0.5});
  function draw(){
    var now=Date.now()*0.001;
    ctx.fillStyle='#04060f';ctx.fillRect(0,0,innerWidth,innerHeight);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      ctx.globalAlpha=s.a*(0.55+0.45*Math.sin(now*s.fs+s.fp));
      ctx.fillStyle='#aac8ff';ctx.beginPath();ctx.arc(s.x%innerWidth,s.y%innerHeight,s.r,0,6.283);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  draw();setInterval(draw,80);
  window.addEventListener('resize',function(){
    c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  });
})();

/* ============================================================
   VOLUMETRIC SPHERE (2D canvas — unchanged from v41)
============================================================ */
(function(){
  var c=document.getElementById('sphere-canvas'),ctx=c.getContext('2d');
  c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  window.addEventListener('resize',function(){c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);});

  var NODES=[];
  for(var i=0;i<1100;i++){var th=Math.acos(2*Math.random()-1),ph=Math.random()*6.283,r=0.88+Math.random()*0.12;NODES.push({ox:Math.sin(th)*Math.cos(ph)*r,oy:Math.cos(th)*r,oz:Math.sin(th)*Math.sin(ph)*r,sz:Math.random()*1.8+0.4,surf:true,fl:Math.random()*6.283,fs:0.5+Math.random()*2});}
  for(var i=0;i<380;i++){var th=Math.acos(2*Math.random()-1),ph=Math.random()*6.283,r=Math.random()*0.84;NODES.push({ox:Math.sin(th)*Math.cos(ph)*r,oy:Math.cos(th)*r,oz:Math.sin(th)*Math.sin(ph)*r,sz:Math.random()*1.1+0.2,surf:false,fl:Math.random()*6.283,fs:0.3+Math.random()*1.4});}
  var EDGES=[],sn=NODES.filter(function(n){return n.surf;}).slice(0,280);
  for(var i=0;i<sn.length;i++)for(var j=i+1;j<sn.length;j++){var dx=sn[i].ox-sn[j].ox,dy=sn[i].oy-sn[j].oy,dz=sn[i].oz-sn[j].oz,d=Math.sqrt(dx*dx+dy*dy+dz*dz);if(d<0.27&&Math.random()<0.32)EDGES.push({a:sn[i],b:sn[j]});}
  var rotY=0;
  function proj(n,cx,cy,R,ry){var cos=Math.cos(ry),sin=Math.sin(ry),x3=n.ox*cos-n.oz*sin,z3=n.ox*sin+n.oz*cos,sc=3/(3+z3);return{x:cx+x3*R*sc,y:cy+n.oy*R*sc,z:z3,sc:sc};}
  function drawSphere(){
    var wrap=document.getElementById('globe-wrap'),r=wrap.getBoundingClientRect();
    var cx=r.left+r.width*.5,cy=r.top+r.height*.5,R=r.width*.48,t=Date.now()*.001;
    ctx.clearRect(0,0,innerWidth,innerHeight);ctx.globalCompositeOperation='source-over';
    var halo=ctx.createRadialGradient(cx,cy,R*.3,cx,cy,R*1.7);halo.addColorStop(0,'rgba(30,80,200,0.20)');halo.addColorStop(.45,'rgba(14,45,160,0.10)');halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;ctx.beginPath();ctx.arc(cx,cy,R*1.7,0,6.283);ctx.fill();
    var core=ctx.createRadialGradient(cx,cy,0,cx,cy,R);core.addColorStop(0,'rgba(50,130,255,0.28)');core.addColorStop(.45,'rgba(25,75,220,0.14)');core.addColorStop(.8,'rgba(10,35,160,0.06)');core.addColorStop(1,'rgba(5,15,80,0)');
    ctx.fillStyle=core;ctx.beginPath();ctx.arc(cx,cy,R,0,6.283);ctx.fill();
    ctx.globalCompositeOperation='lighter';
    for(var i=0;i<EDGES.length;i++){var e=EDGES[i],pa=proj(e.a,cx,cy,R,rotY),pb=proj(e.b,cx,cy,R,rotY),da=Math.max(0,(pa.sc+pb.sc)*.5-.7)*.45,rb=Math.max(0,(pa.x+pb.x)*.5-cx)/(R*.7)*.25,a=Math.min(.55,da+rb);if(a<.015)continue;ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.strokeStyle='rgba(40,150,255,'+a.toFixed(3)+')';ctx.lineWidth=.5;ctx.stroke();}
    var p2=NODES.map(function(n){var p=proj(n,cx,cy,R,rotY);return Object.assign({},n,p);});p2.sort(function(a,b){return a.z-b.z;});
    for(var i=0;i<p2.length;i++){var n=p2[i],flk=.55+.45*Math.sin(t*n.fs+n.fl),depth=Math.max(0,(n.sc-.7)*1.8)*flk;if(depth<.02)continue;var rf=Math.max(0,(n.x-cx)/R),a=Math.min(1,depth*(1+rf*3.2)*(n.surf?1:.45)),sz=n.sz*(.55+n.sc*.75);ctx.globalCompositeOperation='lighter';var isRim=(n.x>cx+R*.48&&n.surf);if(isRim){var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*4);g.addColorStop(0,'rgba(210,245,255,'+Math.min(1,a).toFixed(2)+')');g.addColorStop(.3,'rgba(80,210,255,'+Math.min(1,a*.55).toFixed(2)+')');g.addColorStop(1,'rgba(20,80,255,0)');}else if(n.surf){var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*2.2);g.addColorStop(0,'rgba(100,190,255,'+Math.min(1,a*.75).toFixed(2)+')');g.addColorStop(.5,'rgba(40,110,230,'+Math.min(1,a*.32).toFixed(2)+')');g.addColorStop(1,'rgba(10,50,200,0)');}else{var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*1.4);g.addColorStop(0,'rgba(55,110,255,'+Math.min(.38,a*.38).toFixed(2)+')');g.addColorStop(1,'rgba(20,60,200,0)');}ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,sz*(.8+isRim?2.5:1.6),0,6.283);ctx.fill();}
    ctx.globalCompositeOperation='lighter';
    var rimCX=cx+R*.72,rimCY=cy,rimG=ctx.createRadialGradient(rimCX,rimCY,0,rimCX,rimCY,R*.55);rimG.addColorStop(0,'rgba(180,240,255,0.28)');rimG.addColorStop(.35,'rgba(90,200,255,0.14)');rimG.addColorStop(.7,'rgba(40,120,255,0.05)');rimG.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rimG;ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*1.05,0,6.283);ctx.clip();ctx.beginPath();ctx.arc(rimCX,rimCY,R*.55,0,6.283);ctx.fill();ctx.restore();
    ctx.globalCompositeOperation='source-over';rotY+=.004;
  }
  (function loop(){requestAnimationFrame(loop);drawSphere();})();
})();
/* ============================================================
   3D WAVE FIELD — Three.js WebGL renderer on #wave-canvas
   24 ribbon waves at different Z depths
   DOM card collider with 3D repulsion
   Mouse parallax
============================================================ */
(function(){
  var canvas = document.getElementById('wave-canvas');
  var W = innerWidth, H = innerHeight;
  var dpr = Math.min(window.devicePixelRatio||1, 2);

  /* ---- Renderer ---- */
  var renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    alpha: true,
    antialias: true,
    premultipliedAlpha: false
  });
  renderer.setPixelRatio(dpr);
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0); // transparent — sphere shows through

  /* ---- Scene & Camera ---- */
  var scene = new THREE.Scene();
  var fov = 55;
  var camera = new THREE.PerspectiveCamera(fov, W/H, 0.1, 200);
  camera.position.set(0, 0, 12);
  camera.lookAt(0, 0, 0);

  /* ---- Viewport helpers ---- */
  // The wave field should fill the RIGHT half of the screen starting from globe edge
  // We'll render full canvas but shift wave origin to right half via scene offset
  var WAVE_X_START = -3.0;   // world-X where waves begin (near sphere edge)
  var WAVE_X_END   =  9.0;   // world-X where waves end (right edge)
  var N_SEGS = 120;           // vertices per wave (smooth but not heavy)
  var N_WAVES = 28;           // total waves

  /* ---- Wave definitions ---- */
  var waveData = [];
  for(var wi=0; wi<N_WAVES; wi++){
    var zFrac = wi / (N_WAVES-1);         // 0..1
    var zLayer = (zFrac - 0.5) * 7.0;    // Z from -3.5 to +3.5
    var isFront = zLayer > 0;
    var distToCenter = Math.abs(zLayer);

    // Color: purple->magenta, brighter for front (near) layers
    var brightness = 0.35 + (1 - distToCenter/3.5)*0.65;
    var hueShift = zFrac;  // front=purple, back=deep violet

    waveData.push({
      zLayer: zLayer,
      // Amplitude envelope params
      ampBase:  (0.55 + (1-distToCenter/3.5)*0.45) * 0.9,
      ampDepth: (0.08 + Math.random()*0.12),  // Z variation amplitude
      // Frequency components (3 superposed)
      w1: 1.2 + Math.random()*0.8,
      w2: 2.8 + Math.random()*1.2,
      w3: 6.0 + Math.random()*2.0,
      a1: 1.0,
      a2: 0.28 + Math.random()*0.14,
      a3: 0.10 + Math.random()*0.08,
      p1: Math.random()*6.283,
      p2: Math.random()*6.283,
      p3: Math.random()*6.283,
      s1: 0.35 + Math.random()*0.25,
      s2: 0.65 + Math.random()*0.35,
      s3: 1.05 + Math.random()*0.5,
      // Z oscillation
      zw1: 1.0 + Math.random()*0.8,
      zp1: Math.random()*6.283,
      zs1: 0.25 + Math.random()*0.2,
      // Vertical offset (which "slice" through wave field)
      vertFrac: (wi/(N_WAVES-1))*2-1,   // -1..1
      brightness: brightness,
      isFront: isFront,
      distToCenter: distToCenter
    });
  }

  /* ---- Color palette per wave ---- */
  function waveColor(wd){
    var d = wd.distToCenter/3.5; // 0=center, 1=far
    // Core: magenta-purple bright; outer: deep violet dim
    var r = Math.round(160 - d*60);
    var g = Math.round(20 + d*10);
    var b = Math.round(255);
    // Front waves (positive Z) lean magenta, back lean blue
    if(wd.zLayer > 0){ r = Math.round(r + 60*(wd.zLayer/3.5)); b = Math.round(b - 30*(wd.zLayer/3.5)); }
    else { r = Math.round(r*0.6); b = Math.round(b*0.9); }
    return new THREE.Color(r/255, g/255, b/255);
  }

  /* ---- Build geometry ---- */
  var waveObjects = [];
  for(var wi=0; wi<N_WAVES; wi++){
    var wd = waveData[wi];
    var geo = new THREE.BufferGeometry();
    var positions = new Float32Array((N_SEGS+1)*3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setDrawRange(0, N_SEGS+1);

    var col = waveColor(wd);
    var opacity = wd.brightness * (wd.isFront ? 0.90 : 0.55);

    var mat = new THREE.LineBasicMaterial({
      color: col,
      transparent: true,
      opacity: opacity,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      linewidth: 1  // WebGL only supports 1px line natively; we layer for bloom
    });

    var line = new THREE.Line(geo, mat);
    scene.add(line);
    waveObjects.push({geo:geo, mat:mat, wd:wd, positions:positions});
  }

  /* ---- Collider state ---- */
  var colliderBox = new THREE.Box3();  // updated each frame from DOM
  var cardVisible = false;

  function updateCollider(){
    var card = document.getElementById('feature-card');
    cardVisible = card && card.classList.contains('visible');
    if(!cardVisible){ colliderBox.makeEmpty(); return; }

    var rect = card.getBoundingClientRect();
    // Unproject 4 corners of the card into 3D world space at Z=0 plane
    // NDC: (-1..1, -1..1)
    var ndcX0 = (rect.left/W)*2 - 1;
    var ndcX1 = (rect.right/W)*2 - 1;
    var ndcY0 = -(rect.top/H)*2 + 1;
    var ndcY1 = -(rect.bottom/H)*2 + 1;

    // Unproject corners at depth z=0.5 (mid frustum, maps to world Z ~0)
    function unproj(nx, ny){
      var v = new THREE.Vector3(nx, ny, 0.5);
      v.unproject(camera);
      return v;
    }
    var tl = unproj(ndcX0, ndcY0);
    var br = unproj(ndcX1, ndcY1);

    // Expand box in Z to cover all wave layers
    colliderBox.set(
      new THREE.Vector3(Math.min(tl.x,br.x), Math.min(tl.y,br.y), -4.5),
      new THREE.Vector3(Math.max(tl.x,br.x), Math.max(tl.y,br.y),  4.5)
    );
  }

  /* ---- Mouse parallax ---- */
  var mouse = {x:0, y:0};
  var camTarget = {x:0, y:0};
  document.addEventListener('mousemove', function(e){
    mouse.x = (e.clientX/W)*2 - 1;
    mouse.y = -(e.clientY/H)*2 + 1;
  });

  /* ---- Animate ---- */
  var t = 0;
  function animate(){
    requestAnimationFrame(animate);
    t += 0.016;

    // Update collider
    updateCollider();

    // Camera parallax — smooth lerp toward mouse
    camTarget.x += (mouse.x*0.8 - camTarget.x)*0.04;
    camTarget.y += (mouse.y*0.5 - camTarget.y)*0.04;
    // Idle drift when no mouse
    var idleX = Math.sin(t*0.12)*0.3;
    var idleY = Math.cos(t*0.08)*0.15;
    camera.position.x = camTarget.x*0.6 + idleX;
    camera.position.y = camTarget.y*0.4 + idleY;
    camera.lookAt(0, 0, 0);

    // Update each wave's geometry
    for(var wi=0; wi<N_WAVES; wi++){
      var wo = waveObjects[wi];
      var wd = wo.wd;
      var pos = wo.positions;

      var envDecayScale = 1.05;
      var totalXW = WAVE_X_END - WAVE_X_START;

      for(var si=0; si<=N_SEGS; si++){
        var px = si/N_SEGS;   // 0..1 along wave
        var wx = WAVE_X_START + px*totalXW;

        // --- Amplitude envelope ---
        var onset = 1/(1+Math.exp(-18*(px-0.04)));
        var decay  = Math.exp(-px*envDecayScale);
        var breathe = 1 + 0.12*Math.sin(t*0.18 + wd.vertFrac*1.1);
        var A = wd.ampBase * onset * decay * breathe;

        // --- Turbulence near origin ---
        var turbDecay = Math.exp(-px*22);
        var turb = (Math.sin(12*px*6.283 + t*2.8 + wd.p1)*0.55 +
                    Math.sin(20*px*6.283 + t*3.9 + wd.p2)*0.35) * 0.28 * turbDecay;

        // --- Superposed sine Y ---
        var xw = px*6.283;
        var waveY = wd.a1*Math.sin(wd.w1*xw + t*wd.s1 + wd.p1)
                  + wd.a2*Math.sin(wd.w2*xw + t*wd.s2 + wd.p2)
                  + wd.a3*Math.sin(wd.w3*xw + t*wd.s3 + wd.p3);

        // Vertical spread: wide at origin, converges right
        var spread = Math.pow(Math.max(0,1-px), 0.60);
        var wy = wd.vertFrac*1.8*spread + A*waveY + turb;

        // --- Z oscillation ---
        var wz = wd.zLayer + wd.ampDepth*Math.sin(wd.zw1*xw + t*wd.zs1 + wd.zp1)*0.5;

        // --- Collider repulsion ---
        if(cardVisible && !colliderBox.isEmpty()){
          var pt = new THREE.Vector3(wx, wy, wz);
          // Distance to box (0 if inside)
          var clamped = pt.clone().clamp(colliderBox.min, colliderBox.max);
          var dist = pt.distanceTo(clamped);
          var falloff = 1.2; // world units
          if(dist < falloff){
            // Repulsion direction: away from nearest box point
            var repDir;
            if(dist < 0.001){
              // Inside box: push toward nearest face
              repDir = new THREE.Vector3(0,1,0);
            } else {
              repDir = pt.clone().sub(clamped).normalize();
            }
            // Strength: stronger for near-Z waves, smooth falloff
            var strength = (1 - dist/falloff);
            strength = strength * strength; // quadratic falloff
            var depthFactor = 1 - wd.distToCenter/3.5; // near waves deflect more
            var push = strength * 1.8 * (0.4 + depthFactor*0.6);
            wy += repDir.y * push;
            wz += repDir.z * push * 0.5;
          }
        }

        var idx = si*3;
        pos[idx]   = wx;
        pos[idx+1] = wy;
        pos[idx+2] = wz;
      }

      wo.geo.attributes.position.needsUpdate = true;
    }

    renderer.render(scene, camera);
  }
  animate();

  /* ---- Resize ---- */
  window.addEventListener('resize', function(){
    W = innerWidth; H = innerHeight;
    dpr = Math.min(window.devicePixelRatio||1, 2);
    renderer.setPixelRatio(dpr);
    renderer.setSize(W, H);
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
  });
})();

var wrapEl=document.getElementById('globe-wrap'),svgEl=document.getElementById('connectors-svg'),activeId=null;
function placeNodes(){
  document.querySelectorAll('.icon-node').forEach(function(n){n.remove();});svgEl.innerHTML='';
  var W2=wrapEl.offsetWidth,H2=wrapEl.offsetHeight,cx=W2/2,cy=H2/2,R=W2*0.52;
  FEATURES.forEach(function(f){
    var rad=f.angleDeg*Math.PI/180,nx=cx+R*Math.cos(rad),ny=cy+R*Math.sin(rad);
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);line.setAttribute('x2',nx);line.setAttribute('y2',ny);
    line.setAttribute('stroke','rgba(60,160,255,0.18)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','3 5');
    svgEl.appendChild(line);
    var node=document.createElement('div');node.className='icon-node';node.dataset.id=f.id;
    node.style.left=nx+'px';node.style.top=ny+'px';node.innerHTML=ICONS[f.icon]||'';
    node.addEventListener('click',function(){onIconClick(f);});wrapEl.appendChild(node);
  });
}
function onIconClick(f){
  var fn=document.getElementById('feature-name'),fd=document.getElementById('feature-desc'),card=document.getElementById('feature-card'),prev=activeId;
  document.querySelectorAll('.icon-node').forEach(function(n){n.classList.remove('active');});
  if(prev===f.id){activeId=null;card.classList.remove('visible');setTimeout(function(){fn.textContent='';fd.textContent='';},500);}
  else{activeId=f.id;document.querySelector('.icon-node[data-id="'+f.id+'"]').classList.add('active');card.classList.remove('visible');fn.textContent='';fd.textContent='';setTimeout(function(){fn.textContent=f.name;fd.textContent=f.desc;card.classList.add('visible');},300);}
}
placeNodes();window.addEventListener('resize',placeNodes);

(function(){
  var target=new Date('2025-09-01T00:00:00Z');
  function tick(){
    var now=new Date(),diff=Math.max(0,target-now);
    var d=Math.floor(diff/86400000);diff%=86400000;
    var h=Math.floor(diff/3600000);diff%=3600000;
    var m=Math.floor(diff/60000);diff%=60000;
    var s=Math.floor(diff/1000);
    document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
    document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
})();
