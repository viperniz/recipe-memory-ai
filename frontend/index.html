<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 50% 30%,#080e20 0%,#040a16 60%,#020810 100%);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.header{text-align:center;padding:28px 20px 8px}
.logo{font-size:2.6rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase}
.tagline{font-size:0.95rem;color:#64748b;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
.brain-wrap{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:8px 0}
#brainCanvas{cursor:grab;display:block;max-width:100%}
#brainCanvas:active{cursor:grabbing}
.drag-tip{color:rgba(255,255,255,0.22);font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;margin-top:2px;text-align:center}
.bottom{text-align:center;padding:14px 20px 24px;width:100%;max-width:560px}
.cd{display:flex;justify-content:center;gap:20px;margin-bottom:18px;align-items:center}
.cdu{text-align:center}
.cdn{font-size:2.1rem;font-weight:700;color:#60a5fa;display:block;line-height:1}
.cdl{font-size:0.6rem;color:#475569;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.sep{color:#1e3a5f;font-size:1.8rem;padding-bottom:16px}
.email-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.email-row input{padding:11px 16px;border-radius:8px;border:1px solid rgba(74,240,252,0.25);background:rgba(255,255,255,0.04);color:#fff;font-size:0.9rem;width:250px;outline:none;transition:border-color 0.2s}
.email-row input:focus{border-color:rgba(74,240,252,0.7)}
.email-row button{padding:11px 22px;border-radius:8px;border:none;background:linear-gradient(135deg,#4f46e5,#0ea5e9);color:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;transition:opacity 0.2s}
.email-row button:hover{opacity:0.85}
.tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.tag{padding:4px 12px;border-radius:20px;border:1px solid rgba(74,240,252,0.2);color:#64748b;font-size:0.72rem;letter-spacing:0.5px}
#tooltip{position:fixed;background:rgba(2,8,20,0.95);border:1px solid rgba(74,240,252,0.6);border-radius:10px;padding:10px 18px;font-size:0.88rem;font-weight:700;color:#4af0fc;pointer-events:none;opacity:0;transition:opacity 0.25s,transform 0.25s;transform:translateY(6px) translateX(-50%);z-index:100;letter-spacing:1px;text-transform:uppercase;box-shadow:0 0 20px rgba(74,240,252,0.3),inset 0 0 12px rgba(74,240,252,0.05)}
#tooltip.show{opacity:1;transform:translateY(0) translateX(-50%)}
</style>
</head>
<body>
<div class="header">
<div class="logo">CORTEXLE</div>
<div class="tagline">AI-Powered Video Intelligence &mdash; Coming Soon</div>
</div>
<div class="brain-wrap">
<canvas id="brainCanvas" width="580" height="420"></canvas>
<div class="drag-tip">&#8678; Drag to rotate &nbsp;&bull;&nbsp; Click points to explore &#8680;</div>
</div>
<div class="bottom">
<div class="cd">
<div class="cdu"><span class="cdn" id="cd-d">91</span><div class="cdl">Days</div></div>
<div class="sep">:</div>
<div class="cdu"><span class="cdn" id="cd-h">00</span><div class="cdl">Hours</div></div>
<div class="sep">:</div>
<div class="cdu"><span class="cdn" id="cd-m">00</span><div class="cdl">Mins</div></div>
<div class="sep">:</div>
<div class="cdu"><span class="cdn" id="cd-s">00</span><div class="cdl">Secs</div></div>
</div>
<div class="email-row">
<input type="email" id="emailInput" placeholder="Enter your email">
<button onclick="notify()">Notify Me</button>
</div>
<div class="tags">
<span class="tag">AI Video</span><span class="tag">Transcription</span><span class="tag">Semantic Search</span><span class="tag">Chrome Extension</span><span class="tag">Smart Notes</span>
</div>
</div>
<div id="tooltip"></div>
<script>
(function(){
'use strict';
var C=document.getElementById('brainCanvas');
var ctx=C.getContext('2d');
var W=580,H=420;

var rotY=0,targetRotY=0;
var isDragging=false,dragStart=0,rotStart=0;
var activeFeature=null;
var tooltip=document.getElementById('tooltip');

// Features: id, name, side-view position (normalized)
var features=[
  {id:'aiq',  name:'AI Q&A',          sx:0.20,sy:0.38},
  {id:'vid',  name:'Video Processing',  sx:0.50,sy:0.20},
  {id:'trans',name:'Transcription',     sx:0.24,sy:0.60},
  {id:'sem',  name:'Semantic Search',   sx:0.78,sy:0.36},
  {id:'notes',name:'Smart Notes',       sx:0.70,sy:0.70},
  {id:'ext',  name:'Chrome Extension',  sx:0.44,sy:0.82}
];

// Side-view brain outline (lateral, left-facing)
// Precise anatomical lateral brain silhouette
var brainPts=[
  // Frontal pole -> up over frontal -> parietal -> occipital -> down -> temporal -> frontal base
  [0.13,0.52], // frontal base (inferior)
  [0.10,0.42], // frontal mid
  [0.11,0.30], // frontal superior
  [0.16,0.18], // frontoparietal junction
  [0.26,0.08], // vertex anterior
  [0.40,0.03], // vertex top
  [0.54,0.02], // parietal top
  [0.67,0.05], // parieto-occipital
  [0.79,0.12], // occipital superior
  [0.86,0.22], // occipital
  [0.88,0.34], // occipital inferior
  [0.86,0.46], // temporal-occipital
  [0.82,0.54], // temporal posterior superior
  [0.84,0.62], // temporal posterior
  [0.78,0.68], // temporal inferior posterior
  [0.66,0.73], // temporal inferior
  [0.52,0.72], // temporal inferior mid
  [0.40,0.72], // temporal inferior anterior
  [0.30,0.68], // temporal anterior
  [0.22,0.62], // Sylvian fissure tip
  [0.14,0.58], // frontal inferior
  [0.13,0.52]  // close
];

// Sulci paths for side view (start/end normalized coords)
var sulci=[
  // Central sulcus
  {pts:[[0.38,0.12],[0.34,0.26],[0.30,0.40],[0.28,0.52]]},
  // Precentral sulcus
  {pts:[[0.26,0.12],[0.22,0.25],[0.20,0.38],[0.19,0.50]]},
  // Postcentral/Superior temporal
  {pts:[[0.50,0.10],[0.46,0.24],[0.44,0.38],[0.44,0.52]]},
  // Lateral fissure (Sylvian) - long horizontal
  {pts:[[0.22,0.56],[0.32,0.54],[0.44,0.52],[0.56,0.50],[0.66,0.52]]},
  // Superior temporal sulcus (below Sylvian)
  {pts:[[0.28,0.64],[0.42,0.63],[0.56,0.62],[0.68,0.62]]},
  // Parieto-occipital
  {pts:[[0.64,0.08],[0.62,0.22],[0.60,0.36],[0.62,0.50]]},
  // Occipital sulcus
  {pts:[[0.74,0.20],[0.76,0.34],[0.74,0.46],[0.70,0.56]]}
];

// Neural network nodes - DENSE like reference images
var nodes=[];
function initNodes(){
  nodes=[];
  var rng=function(){return Math.random()};
  // Primary orange activation nodes (like reference image hot spots)
  var orangeSeeds=[
    [0.30,0.28],[0.42,0.22],[0.38,0.40],[0.50,0.32],[0.44,0.48],
    [0.56,0.26],[0.60,0.40],[0.52,0.52],[0.66,0.30],[0.64,0.50],
    [0.72,0.38],[0.46,0.60],[0.34,0.56],[0.58,0.58]
  ];
  for(var i=0;i<orangeSeeds.length;i++){
    nodes.push({x:orangeSeeds[i][0],y:orangeSeeds[i][1],vx:(rng()-0.5)*0.0001,vy:(rng()-0.5)*0.0001,r:rng()*2+1.5,orange:true,phase:rng()*Math.PI*2,brightness:0.7+rng()*0.3});
  }
  // Blue/white nodes (many)
  for(var j=0;j<80;j++){
    var angle=rng()*Math.PI*2;
    var rad=rng()*0.33;
    var cx=0.50+Math.cos(angle)*rad*1.1;
    var cy=0.40+Math.sin(angle)*rad*0.8;
    cx=Math.max(0.14,Math.min(0.86,cx));
    cy=Math.max(0.06,Math.min(0.72,cy));
    nodes.push({x:cx,y:cy,vx:(rng()-0.5)*0.00015,vy:(rng()-0.5)*0.00015,r:rng()*1.5+0.8,orange:false,phase:rng()*Math.PI*2,brightness:0.4+rng()*0.6});
  }
}

function transformX(nx,scaleX,flip){
  var cx=0.50;
  var dx=nx-cx;
  var s=Math.abs(scaleX);
  var projected=cx+dx*s;
  if(flip)projected=1-projected+0.03;
  return projected*W;
}
function getNodeX(n,scaleX,flip){return transformX(n.x,scaleX,flip);}

function drawBrain(){
  ctx.clearRect(0,0,W,H);
  var scaleX=Math.cos(rotY*Math.PI/180);
  var s=Math.abs(scaleX);
  var flip=scaleX<0;
  
  // Transform brain outline
  var pts=brainPts.map(function(p){
    return [transformX(p[0],scaleX,flip),p[1]*H];
  });
  
  function makePath(){
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(var i=1;i<pts.length-2;i++){
      var xc=(pts[i][0]+pts[i+1][0])/2;
      var yc=(pts[i][1]+pts[i+1][1])/2;
      ctx.quadraticCurveTo(pts[i][0],pts[i][1],xc,yc);
    }
    ctx.quadraticCurveTo(pts[pts.length-2][0],pts[pts.length-2][1],pts[pts.length-1][0],pts[pts.length-1][1]);
    ctx.closePath();
  }
  
  // --- Brainstem ---
  var bsX=transformX(0.44,scaleX,flip);
  var bsW=18*s+4;
  var bsY0=H*0.78,bsY1=H*0.96;
  ctx.beginPath();
  ctx.moveTo(bsX-bsW,bsY0);
  ctx.bezierCurveTo(bsX-bsW-4,bsY0+15,bsX-bsW*0.5,bsY1,bsX,bsY1);
  ctx.bezierCurveTo(bsX+bsW*0.5,bsY1,bsX+bsW+4,bsY0+15,bsX+bsW,bsY0);
  ctx.closePath();
  var bsg=ctx.createLinearGradient(bsX,bsY0,bsX,bsY1);
  bsg.addColorStop(0,'rgba(60,120,220,0.3)');
  bsg.addColorStop(1,'rgba(30,60,160,0.1)');
  ctx.fillStyle=bsg;
  ctx.fill();
  ctx.strokeStyle='rgba(100,170,255,0.55)';
  ctx.lineWidth=1.5;
  ctx.shadowColor='rgba(100,180,255,0.4)';
  ctx.shadowBlur=8;
  ctx.stroke();
  ctx.shadowBlur=0;
  
  // --- Glow layers behind brain ---
  for(var g=5;g>=1;g--){
    makePath();
    ctx.fillStyle='rgba(30,80,200,'+(0.04+g*0.01)+')';
    ctx.fill();
  }
  
  // --- Brain interior fill ---
  makePath();
  var grad=ctx.createRadialGradient(W*0.48,H*0.38,10,W*0.48,H*0.38,W*0.42);
  grad.addColorStop(0,'rgba(15,35,90,0.85)');
  grad.addColorStop(0.5,'rgba(8,20,55,0.75)');
  grad.addColorStop(1,'rgba(4,10,30,0.6)');
  ctx.fillStyle=grad;
  ctx.fill();
  
  // --- Clip everything inside brain ---
  ctx.save();
  makePath();
  ctx.clip();
  
  var t=Date.now()/1000;
  
  // --- Sulci (internal fissure lines) ---
  for(var si=0;si<sulci.length;si++){
    var sp=sulci[si].pts;
    if(sp.length<2)continue;
    ctx.beginPath();
    var sx0=transformX(sp[0][0],scaleX,flip),sy0=sp[0][1]*H;
    ctx.moveTo(sx0,sy0);
    for(var pi=1;pi<sp.length;pi++){
      var spx=transformX(sp[pi][0],scaleX,flip),spy=sp[pi][1]*H;
      ctx.lineTo(spx,spy);
    }
    ctx.strokeStyle='rgba(80,140,220,0.22)';
    ctx.lineWidth=1;
    ctx.stroke();
  }
  
  // --- Medial fissure (visible when near front view) ---
  if(s<0.6){
    var mf=(0.6-s)/0.6;
    ctx.beginPath();
    ctx.moveTo(W*0.5,H*0.05);
    ctx.bezierCurveTo(W*0.5,H*0.25,W*0.5,H*0.5,W*0.5,H*0.74);
    ctx.strokeStyle='rgba(60,120,220,'+(mf*0.35)+')';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
  
  // --- Neural connections ---
  for(var i=0;i<nodes.length;i++){
    for(var j=i+1;j<nodes.length;j++){
      var ni=nodes[i],nj=nodes[j];
      var ddx=(ni.x-nj.x)*s*1.2;
      var ddy=ni.y-nj.y;
      var dist=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dist<0.20){
        var alpha=(1-dist/0.20)*0.45;
        var both=ni.orange&&nj.orange;
        var either=ni.orange||nj.orange;
        if(both){
          ctx.strokeStyle='rgba(255,150,30,'+alpha*0.8+')';
          ctx.lineWidth=0.9;
        } else if(either){
          ctx.strokeStyle='rgba(255,120,20,'+alpha*0.45+')';
          ctx.lineWidth=0.6;
        } else {
          ctx.strokeStyle='rgba(70,150,255,'+alpha*0.6+')';
          ctx.lineWidth=0.5;
        }
        ctx.beginPath();
        ctx.moveTo(getNodeX(ni,scaleX,flip),ni.y*H);
        ctx.lineTo(getNodeX(nj,scaleX,flip),nj.y*H);
        ctx.stroke();
      }
    }
  }
  
  // --- Neural nodes ---
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    var nx=getNodeX(n,scaleX,flip),ny=n.y*H;
    var pulse=0.7+Math.sin(t*2.5+n.phase)*0.3;
    var nr=n.r*pulse;
    if(n.orange){
      ctx.shadowColor='rgba(255,100,20,0.9)';
      ctx.shadowBlur=12;
      ctx.fillStyle='rgba(255,'+(130+Math.floor(pulse*80))+',30,'+n.brightness*pulse+')';
    } else {
      ctx.shadowColor='rgba(100,180,255,0.7)';
      ctx.shadowBlur=8;
      ctx.fillStyle='rgba(160,210,255,'+n.brightness*pulse+')';
    }
    ctx.beginPath();
    ctx.arc(nx,ny,nr,0,Math.PI*2);
    ctx.fill();
    // Extra bright core for orange nodes
    if(n.orange&&n.r>1.8){
      ctx.fillStyle='rgba(255,220,180,'+(n.brightness*0.9)+')';
      ctx.shadowBlur=0;
      ctx.beginPath();
      ctx.arc(nx,ny,nr*0.45,0,Math.PI*2);
      ctx.fill();
    }
  }
  ctx.shadowBlur=0;
  
  ctx.restore();
  
  // --- Outer brain outline (bright glowing rim) ---
  // Multiple passes for thick glow
  for(var g=3;g>=0;g--){
    makePath();
    if(g===0){
      ctx.strokeStyle='rgba(180,220,255,0.95)';
      ctx.lineWidth=2;
      ctx.shadowColor='rgba(140,200,255,1)';
      ctx.shadowBlur=22;
    } else {
      ctx.strokeStyle='rgba(80,160,255,'+(0.25+g*0.07)+')';
      ctx.lineWidth=4+g*3;
      ctx.shadowBlur=0;
    }
    ctx.stroke();
  }
  ctx.shadowBlur=0;
  
  // --- Interactive hotspots ---
  for(var i=0;i<features.length;i++){
    var f=features[i];
    var fx=transformX(f.sx,scaleX,flip);
    var fy=f.sy*H;
    var vis=s>0.12;
    if(!vis)continue;
    var isAct=activeFeature&&activeFeature.id===f.id;
    var pulse3=0.6+Math.sin(t*3+i*1.1)*0.4;
    
    // Outer pulse ring
    ctx.beginPath();
    ctx.arc(fx,fy,12*pulse3,0,Math.PI*2);
    ctx.fillStyle=isAct?'rgba(255,80,30,0.12)':'rgba(74,240,252,0.08)';
    ctx.fill();
    
    // Circle border
    ctx.beginPath();
    ctx.arc(fx,fy,7,0,Math.PI*2);
    ctx.strokeStyle=isAct?'rgba(255,130,60,0.85)':'rgba(74,240,252,0.75)';
    ctx.lineWidth=1.5;
    ctx.fillStyle=isAct?'rgba(255,80,20,0.2)':'rgba(74,240,252,0.12)';
    ctx.fill();
    ctx.stroke();
    
    // Inner dot
    ctx.beginPath();
    ctx.arc(fx,fy,3.5,0,Math.PI*2);
    ctx.fillStyle=isAct?'#ff6b35':'#4af0fc';
    ctx.shadowColor=isAct?'rgba(255,100,50,1)':'rgba(74,240,252,1)';
    ctx.shadowBlur=14;
    ctx.fill();
    ctx.shadowBlur=0;
    
    // Show label if active
    if(isAct){
      f._px=fx;f._py=fy;
    }
  }
  
  // Update node positions
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0.14||n.x>0.88)n.vx*=-1;
    if(n.y<0.06||n.y>0.72)n.vy*=-1;
    n.phase+=0.018;
  }
}

function animate(){
  rotY+=(targetRotY-rotY)*0.1;
  drawBrain();
  requestAnimationFrame(animate);
}

// Mouse events
C.addEventListener('mousedown',function(e){
  isDragging=true;dragStart=e.clientX;rotStart=targetRotY;
  C.style.cursor='grabbing';
});
document.addEventListener('mousemove',function(e){
  if(!isDragging)return;
  targetRotY=rotStart+(e.clientX-dragStart)*0.4;
});
document.addEventListener('mouseup',function(){
  isDragging=false;C.style.cursor='grab';
});
// Touch events
C.addEventListener('touchstart',function(e){
  isDragging=true;dragStart=e.touches[0].clientX;rotStart=targetRotY;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',function(e){
  if(!isDragging)return;
  targetRotY=rotStart+(e.touches[0].clientX-dragStart)*0.4;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',function(){isDragging=false;});

// Click handler
C.addEventListener('click',function(e){
  if(Math.abs(targetRotY-rotStart)>8)return;
  var rect=C.getBoundingClientRect();
  var sx=C.width/rect.width,sy=C.height/rect.height;
  var mx=(e.clientX-rect.left)*sx;
  var my=(e.clientY-rect.top)*sy;
  var scaleX=Math.cos(rotY*Math.PI/180);
  var flip=scaleX<0;
  
  var hit=null,minD=9999;
  for(var i=0;i<features.length;i++){
    var f=features[i];
    var fx=transformX(f.sx,scaleX,flip);
    var fy=f.sy*H;
    var d=Math.sqrt((mx-fx)*(mx-fx)+(my-fy)*(my-fy));
    if(d<22&&d<minD){minD=d;hit=f;}
  }
  
  if(hit){
    if(activeFeature&&activeFeature.id===hit.id){
      activeFeature=null;
      tooltip.classList.remove('show');
    } else {
      activeFeature=hit;
      var fx=transformX(hit.sx,scaleX,flip);
      var fy=hit.sy*H;
      var cr=C.getBoundingClientRect();
      var tx=cr.left+(fx/W)*cr.width;
      var ty=cr.top+(fy/H)*cr.height-52;
      tooltip.textContent=hit.name;
      tooltip.style.left=tx+'px';
      tooltip.style.top=ty+'px';
      tooltip.classList.add('show');
    }
  } else {
    activeFeature=null;
    tooltip.classList.remove('show');
  }
});

// Countdown
var tgt=new Date();tgt.setDate(tgt.getDate()+91);
function tick(){
  var d=Math.max(0,tgt-new Date());
  document.getElementById('cd-d').textContent=String(Math.floor(d/86400000)).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');
}
tick();setInterval(tick,1000);

// Expose transformX globally for click handler
window.transformX=function(nx,scaleX,flip){
  var cx=0.50,dx=nx-cx,s=Math.abs(scaleX),p=cx+dx*s;
  if(flip)p=1-p+0.03;
  return p*W;
};

initNodes();
animate();

window.notify=function(){
  var e=document.getElementById('emailInput').value;
  if(e&&e.includes('@')){alert('Thanks! We will notify you at '+e);document.getElementById('emailInput').value='';}
};
})();
</script>
</body>
</html>
