<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#04060f;font-family:'Inter',sans-serif}
/* Canvases fill viewport via CSS — pixel dims set by JS at DPR */
#bg-canvas,#sphere-canvas,#wave-canvas{
  position:fixed;inset:0;
  width:100vw;height:100vh;   /* CSS size only */
  z-index:0;pointer-events:none;
  display:block;
  /* NO transform:scale, NO image-rendering downgrade */
}
#bg-canvas{z-index:0}
#sphere-canvas{z-index:1}
#wave-canvas{z-index:2}
#main{position:fixed;inset:0;display:flex;flex-direction:row;align-items:center;z-index:3;pointer-events:none}

.icon-node:hover{border-color:rgba(167,139,250,0.9);box-shadow:0 0 18px rgba(80,180,255,0.8);transform:translate(-50%,-50%) scale(1.15)}

}

</style>

<div id="main">

<script>
/* ======================================================
   SHARED DPR UTILITY
   All canvases use this to set pixel dims correctly.
====================================================== */
var DPR = Math.min(window.devicePixelRatio || 1, 3);

function initCanvas(id){
  var c = document.getElementById(id);
  c.width  = Math.round(innerWidth  * DPR);
  c.height = Math.round(innerHeight * DPR);
  var ctx = c.getContext('2d');
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  return {c:c, ctx:ctx};
}

window.addEventListener('resize', function(){
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  ['bg-canvas','sphere-canvas','wave-canvas'].forEach(function(id){
    var c=document.getElementById(id);
    c.width  = Math.round(innerWidth  * DPR);
    c.height = Math.round(innerHeight * DPR);
    var ctx=c.getContext('2d');
    ctx.setTransform(DPR,0,0,DPR,0,0);
  });
});

/* ======================================================
   STARFIELD
====================================================== */
(function(){
  var _=initCanvas('bg-canvas'), c=_.c, ctx=_.ctx;
  var stars=[];
  for(var i=0;i<1800;i++) stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.0+0.2,a:Math.random()*0.65+0.1,fp:Math.random()*6.283,fs:Math.random()*0.003+0.0005});
  function draw(){
    ctx.fillStyle='#04060f';ctx.fillRect(0,0,innerWidth,innerHeight);
    var now=Date.now()*0.001;
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      ctx.globalAlpha=s.a*(0.55+0.45*Math.sin(now*s.fs*1000+s.fp));
      ctx.fillStyle='#aac8ff';ctx.beginPath();ctx.arc(s.x%innerWidth,s.y%innerHeight,s.r,0,6.283);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  draw();setInterval(draw,80);
})();

/* ======================================================
   VOLUMETRIC NEURAL SPHERE
   Fix 2: NO linear-gradient overlay causing dark/light split.
   Glow is purely radial, centered on sphere.
====================================================== */
(function(){
  var _=initCanvas('sphere-canvas'), c=_.c, ctx=_.ctx;

  /* Re-apply transform on resize */
  window.addEventListener('resize',function(){
    ctx.setTransform(DPR,0,0,DPR,0,0);
  });

  var NODES=[];
  /* Surface particles */
  for(var i=0;i<1100;i++){
    var th=Math.acos(2*Math.random()-1),ph=Math.random()*6.283,r=0.88+Math.random()*0.12;
    NODES.push({ox:Math.sin(th)*Math.cos(ph)*r,oy:Math.cos(th)*r,oz:Math.sin(th)*Math.sin(ph)*r,
      sz:Math.random()*1.8+0.4,surf:true,fl:Math.random()*6.283,fs:0.5+Math.random()*2.0});
  }
  /* Interior */
  for(var i=0;i<380;i++){
    var th=Math.acos(2*Math.random()-1),ph=Math.random()*6.283,r=Math.random()*0.84;
    NODES.push({ox:Math.sin(th)*Math.cos(ph)*r,oy:Math.cos(th)*r,oz:Math.sin(th)*Math.sin(ph)*r,
      sz:Math.random()*1.1+0.2,surf:false,fl:Math.random()*6.283,fs:0.3+Math.random()*1.4});
  }

  /* Edges */
  var EDGES=[];
  var sn=NODES.filter(function(n){return n.surf;}).slice(0,280);
  for(var i=0;i<sn.length;i++) for(var j=i+1;j<sn.length;j++){
    var dx=sn[i].ox-sn[j].ox,dy=sn[i].oy-sn[j].oy,dz=sn[i].oz-sn[j].oz,d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<0.27&&Math.random()<0.32) EDGES.push({a:sn[i],b:sn[j]});
  }

  var rotY=0;

  function proj(n,cx,cy,R,ry){
    var cos=Math.cos(ry),sin=Math.sin(ry);
    var x3=n.ox*cos-n.oz*sin, z3=n.ox*sin+n.oz*cos;
    var sc=3.0/(3.0+z3);
    return {x:cx+x3*R*sc,y:cy+n.oy*R*sc,z:z3,sc:sc};
  }

  function drawSphere(){
    var wrap=document.getElementById('globe-wrap');
    var r=wrap.getBoundingClientRect();
    var cx=r.left+r.width*0.5, cy=r.top+r.height*0.5, R=r.width*0.48;
    var t=Date.now()*0.001;

    ctx.clearRect(0,0,innerWidth,innerHeight);
    ctx.globalCompositeOperation='source-over';

    /* --- RADIAL AURA (no linear split) --- */
    /* Outer diffuse halo — pure radial, centered */
    var halo=ctx.createRadialGradient(cx,cy,R*0.3,cx,cy,R*1.7);
    halo.addColorStop(0,'rgba(30,80,200,0.20)');
    halo.addColorStop(0.45,'rgba(14,45,160,0.10)');
    halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;ctx.beginPath();ctx.arc(cx,cy,R*1.7,0,6.283);ctx.fill();

    /* Inner volumetric core glow */
    var core=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    core.addColorStop(0,'rgba(50,130,255,0.28)');
    core.addColorStop(0.45,'rgba(25,75,220,0.14)');
    core.addColorStop(0.80,'rgba(10,35,160,0.06)');
    core.addColorStop(1,'rgba(5,15,80,0)');
    ctx.fillStyle=core;ctx.beginPath();ctx.arc(cx,cy,R,0,6.283);ctx.fill();

    /* --- EDGES (additive) --- */
    ctx.globalCompositeOperation='lighter';
    for(var i=0;i<EDGES.length;i++){
      var e=EDGES[i];
      var pa=proj(e.a,cx,cy,R,rotY), pb=proj(e.b,cx,cy,R,rotY);
      var da=Math.max(0,(pa.sc+pb.sc)*0.5-0.70)*0.45;
      if(da<0.015) continue;
      /* Right-hemisphere brightness boost (purely per-node, not a mask) */
      var rb=Math.max(0,(pa.x+pb.x)*0.5-cx)/(R*0.7)*0.25;
      var a=Math.min(0.55,da+rb);
      ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
      ctx.strokeStyle='rgba(40,150,255,'+a.toFixed(3)+')';ctx.lineWidth=0.5;ctx.stroke();
    }

    /* --- NODES (additive, back-to-front) --- */
    var proj2=NODES.map(function(n){var p=proj(n,cx,cy,R,rotY);return Object.assign({},n,p);});
    proj2.sort(function(a,b){return a.z-b.z;});

    for(var i=0;i<proj2.length;i++){
      var n=proj2[i];
      var flk=0.55+0.45*Math.sin(t*n.fs+n.fl);
      var depth=Math.max(0,(n.sc-0.70)*1.8)*flk;
      if(depth<0.02) continue;

      /* Right-side brightness: purely additive per-node boost, not a mask */
      var rf=Math.max(0,(n.x-cx)/R);
      var boost=1+rf*3.2;
      var a=Math.min(1,depth*boost*(n.surf?1.0:0.45));
      var sz=n.sz*(0.55+n.sc*0.75);

      ctx.globalCompositeOperation='lighter';
      var isRimRight=(n.x>cx+R*0.48 && n.surf);
      if(isRimRight){
        /* Hot emission on right rim */
        var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*4);
        g.addColorStop(0,'rgba(210,245,255,'+Math.min(1,a).toFixed(2)+')');
        g.addColorStop(0.3,'rgba(80,210,255,'+Math.min(1,a*0.55).toFixed(2)+')');
        g.addColorStop(1,'rgba(20,80,255,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,sz*4,0,6.283);ctx.fill();
      } else if(n.surf){
        var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*2.2);
        g.addColorStop(0,'rgba(100,190,255,'+Math.min(1,a*0.75).toFixed(2)+')');
        g.addColorStop(0.5,'rgba(40,110,230,'+Math.min(1,a*0.32).toFixed(2)+')');
        g.addColorStop(1,'rgba(10,50,200,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,sz*2.2,0,6.283);ctx.fill();
      } else {
        var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*1.4);
        g.addColorStop(0,'rgba(55,110,255,'+Math.min(0.38,a*0.38).toFixed(2)+')');
        g.addColorStop(1,'rgba(20,60,200,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,sz*1.4,0,6.283);ctx.fill();
      }
    }

    /* --- EMISSION RIM ARC (right side only, soft radial glow) ---
       Uses a clipped arc path + radial gradient centered on the rim,
       NOT a linear gradient spanning the whole sphere. */
    ctx.globalCompositeOperation='lighter';
    var rimCX=cx+R*0.72, rimCY=cy;  /* center of glow shifted to right rim */
    var rimR=R*0.55;
    var rimG=ctx.createRadialGradient(rimCX,rimCY,0,rimCX,rimCY,rimR);
    rimG.addColorStop(0,'rgba(180,240,255,0.28)');
    rimG.addColorStop(0.35,'rgba(90,200,255,0.14)');
    rimG.addColorStop(0.7,'rgba(40,120,255,0.05)');
    rimG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rimG;
    /* Clip to sphere boundary so glow stays inside */
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*1.05,0,6.283);ctx.clip();
    ctx.beginPath();ctx.arc(rimCX,rimCY,rimR,0,6.283);ctx.fill();
    ctx.restore();

    /* Crisp bright rim line on right arc */
    ctx.globalCompositeOperation='lighter';
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*1.01,0,6.283);ctx.clip();
    var rlg=ctx.createLinearGradient(cx,cy-R,cx,cy+R);
    rlg.addColorStop(0,'rgba(120,220,255,0)');
    rlg.addColorStop(0.35,'rgba(180,240,255,0.50)');
    rlg.addColorStop(0.5,'rgba(255,255,255,0.70)');
    rlg.addColorStop(0.65,'rgba(180,240,255,0.50)');
    rlg.addColorStop(1,'rgba(120,220,255,0)');
    ctx.strokeStyle=rlg;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,R,Math.PI*0.6,Math.PI*1.4,true);ctx.stroke();
    ctx.restore();

    ctx.globalCompositeOperation='source-over';
    rotY+=0.004;
  }

  (function loop(){requestAnimationFrame(loop);drawSphere();})();
})();
/* ======================================================
   ICON NODES
====================================================== */
var FEATURES=[
  {id:'aiq',icon:'brain',name:'AI Q&A',desc:'Instant answers from your videos',angleDeg:118},
  {id:'vid',icon:'video',name:'Video Processing',desc:'Frame-by-frame intelligence',angleDeg:155},
  {id:'trn',icon:'mic',name:'Transcription',desc:'Speech to searchable text',angleDeg:195},
  {id:'sem',icon:'search',name:'Semantic Search',desc:'Find anything by meaning',angleDeg:235},
  {id:'snt',icon:'notes',name:'Smart Notes',desc:'Auto-generated insights',angleDeg:270},
  {id:'chr',icon:'chrome',name:'Chrome Extension',desc:'Works anywhere in your browser',angleDeg:308}
];
var ICONS={
  brain:'<svg viewBox="0 0 24 24"><path d="M12 5C9.2 5 7 7.2 7 10c0 1.4.5 2.6 1.4 3.5C7.5 14.3 7 15.6 7 17h10c0-1.4-.5-2.7-1.4-3.5C16.5 12.6 17 11.4 17 10c0-2.8-2.2-5-5-5z"/><line x1="12" y1="5" x2="12" y2="3"/><line x1="9" y1="17" x2="9" y2="19"/><line x1="15" y1="17" x2="15" y2="19"/></svg>',
  video:'<svg viewBox="0 0 24 24"><rect x="2" y="6" width="14" height="12" rx="2"/><polygon points="22,8 16,12 22,16"/></svg>',
  mic:'<svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>',
  search:'<svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>',
  notes:'<svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>',
  chrome:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="8" x2="12" y2="2"/><line x1="17.2" y1="15" x2="22.3" y2="6.3"/><line x1="6.8" y1="15" x2="1.7" y2="6.3"/></svg>'
};
var wrapEl=document.getElementById('globe-wrap'),svgEl=document.getElementById('connectors-svg'),activeId=null;
function placeNodes(){
  document.querySelectorAll('.icon-node').forEach(function(n){n.remove();});svgEl.innerHTML='';
  var W=wrapEl.offsetWidth,H=wrapEl.offsetHeight,cx=W/2,cy=H/2,R=W*0.52;
  FEATURES.forEach(function(f){
    var rad=f.angleDeg*Math.PI/180,nx=cx+R*Math.cos(rad),ny=cy+R*Math.sin(rad);
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);line.setAttribute('x2',nx);line.setAttribute('y2',ny);
    line.setAttribute('stroke','rgba(60,160,255,0.18)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','3 5');
    svgEl.appendChild(line);
    var node=document.createElement('div');node.className='icon-node';node.dataset.id=f.id;
    node.style.left=nx+'px';node.style.top=ny+'px';node.innerHTML=ICONS[f.icon]||'';
    node.addEventListener('click',function(){onIconClick(f);});wrapEl.appendChild(node);
  });
}
function onIconClick(f){
  var fn=document.getElementById('feature-name'),fd=document.getElementById('feature-desc'),scrim=document.getElementById('feature-scrim'),prev=activeId;
  document.querySelectorAll('.icon-node').forEach(function(n){n.classList.remove('active');});
  if(prev===f.id){
    activeId=null;
    scrim.classList.remove('visible');
    setTimeout(function(){fn.textContent='';fd.textContent='';},500);
  } else {
    activeId=f.id;
    document.querySelector('.icon-node[data-id="'+f.id+'"]').classList.add('active');
    scrim.classList.remove('visible');
    fn.textContent='';fd.textContent='';
    setTimeout(function(){fn.textContent=f.name;fd.textContent=f.desc;scrim.classList.add('visible');},300);
  }
}
placeNodes();window.addEventListener('resize',placeNodes);

/* ======================================================
   WAVE RIBBON — Fix 1: DPR-correct canvas rendering
   y(t) = A(x,t) * sum[a_n * sin(w_n*x + s_n*t + p_n)]
   Filled ribbon mesh, additive blending, purple->magenta
====================================================== */
(function(){
  var _=initCanvas('wave-canvas'), wc=_.c, ctx=_.ctx;
  window.addEventListener('resize',function(){ctx.setTransform(DPR,0,0,DPR,0,0);});

  var gT=0;

  /* Build strands */
  var STRANDS=[];
  function makeStrand(frac,role){
    var dc=Math.abs(frac);
    return {frac:frac,dc:dc,role:role,
      w1:1.4+dc*0.6+Math.random()*0.5, w2:3.2+dc*1.0+Math.random()*0.8, w3:7.5+dc*0.8+Math.random()*1.5,
      a1:1.0, a2:0.30+Math.random()*0.14, a3:0.10+Math.random()*0.07,
      p1:Math.random()*6.283, p2:Math.random()*6.283, p3:Math.random()*6.283,
      s1:0.38+Math.random()*0.22, s2:0.70+Math.random()*0.36, s3:1.10+Math.random()*0.50,
      tw1:8+Math.random()*6, tw2:14+Math.random()*8,
      tp1:Math.random()*6.283, tp2:Math.random()*6.283,
      ts1:2.5+Math.random()*2, ts2:3.8+Math.random()*2,
      thick: role==='core'?(2.0-dc*0.9):(0.85-dc*0.45),
      ampScale: role==='core'?(0.92-dc*0.48):(0.52-dc*0.28),
      vertBase: frac*0.29
    };
  }
  for(var i=0;i<14;i++) STRANDS.push(makeStrand((i/13)*2-1,'core'));
  for(var i=0;i<50;i++) STRANDS.push(makeStrand((Math.random()*2-1)*0.95,'thin'));

  function getOrigin(){
    var gw=document.getElementById('globe-wrap'),r=gw.getBoundingClientRect();
    return {x:r.left+r.width*0.84, y:r.top+r.height*0.50};
  }

  function drawStrand(ln,ox,oy,W,H,t){
    var totalW=W-ox; if(totalW<10) return;
    var STEPS=240; /* more steps = smoother curves on retina */
    var pts=[];
    for(var i=0;i<=STEPS;i++){
      var px=i/STEPS, x=ox+px*totalW;
      var onset=1/(1+Math.exp(-20*(px-0.03)));
      var decay=Math.exp(-px*1.05);
      var breathe=1+0.14*Math.sin(t*0.18+ln.frac*1.2);
      var A=H*ln.ampScale*0.12*onset*decay*breathe;
      var turbDecay=Math.exp(-px*28);
      var turb=(Math.sin(ln.tw1*px*6.283+t*ln.ts1+ln.tp1)*0.6+Math.sin(ln.tw2*px*6.283+t*ln.ts2+ln.tp2)*0.4)*H*0.04*turbDecay;
      var xw=px*6.283;
      var wave=ln.a1*Math.sin(ln.w1*xw+t*ln.s1+ln.p1)+ln.a2*Math.sin(ln.w2*xw+t*ln.s2+ln.p2)+ln.a3*Math.sin(ln.w3*xw+t*ln.s3+ln.p3);
      var spread=Math.pow(Math.max(0,1-px),0.65);
      pts.push({x:x,y:oy+ln.vertBase*H*spread+A*wave+turb,env:onset*decay,px:px});
    }
    var upper=[],lower=[];
    for(var i=0;i<=STEPS;i++){
      var prev=i>0?i-1:0,next=i<STEPS?i+1:STEPS;
      var tx=pts[next].x-pts[prev].x,ty=pts[next].y-pts[prev].y;
      var tl=Math.sqrt(tx*tx+ty*ty)||1;
      var nx2=-ty/tl,ny2=tx/tl;
      var halfT=ln.thick*(0.35+pts[i].env*2.1)*(1-pts[i].px*0.65);
      upper.push({x:pts[i].x+nx2*halfT,y:pts[i].y+ny2*halfT});
      lower.push({x:pts[i].x-nx2*halfT,y:pts[i].y-ny2*halfT});
    }
    ctx.save();ctx.globalCompositeOperation='lighter';
    var dc=ln.dc;
    var grad=ctx.createLinearGradient(ox,0,W,0);
    if(dc<0.2){
      grad.addColorStop(0,'rgba(100,60,220,0)');grad.addColorStop(0.03,'rgba(160,80,255,0.42)');
      grad.addColorStop(0.18,'rgba(210,100,255,0.65)');grad.addColorStop(0.40,'rgba(225,80,200,0.52)');
      grad.addColorStop(0.68,'rgba(180,55,195,0.28)');grad.addColorStop(0.88,'rgba(110,35,175,0.10)');
      grad.addColorStop(1,'rgba(55,15,110,0.01)');
    } else if(dc<0.55){
      grad.addColorStop(0,'rgba(80,30,180,0)');grad.addColorStop(0.03,'rgba(120,42,225,0.32)');
      grad.addColorStop(0.20,'rgba(162,52,215,0.50)');grad.addColorStop(0.52,'rgba(140,28,178,0.33)');
      grad.addColorStop(0.82,'rgba(78,18,148,0.12)');grad.addColorStop(1,'rgba(38,8,95,0.01)');
    } else {
      grad.addColorStop(0,'rgba(50,18,140,0)');grad.addColorStop(0.04,'rgba(80,25,172,0.20)');
      grad.addColorStop(0.28,'rgba(100,30,172,0.28)');grad.addColorStop(0.68,'rgba(68,18,128,0.12)');
      grad.addColorStop(1,'rgba(28,8,75,0.01)');
    }
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.moveTo(upper[0].x,upper[0].y);
    for(var i=1;i<=STEPS;i++) ctx.lineTo(upper[i].x,upper[i].y);
    for(var i=STEPS;i>=0;i--) ctx.lineTo(lower[i].x,lower[i].y);
    ctx.closePath();ctx.fill();
    /* Luminous spine on core strands */
    if(dc<0.28){
      var sg=ctx.createLinearGradient(ox,0,W,0);
      sg.addColorStop(0,'rgba(230,170,255,0)');sg.addColorStop(0.03,'rgba(245,185,255,0.62)');
      sg.addColorStop(0.20,'rgba(255,205,255,0.75)');sg.addColorStop(0.52,'rgba(222,138,255,0.42)');
      sg.addColorStop(0.82,'rgba(155,72,218,0.16)');sg.addColorStop(1,'rgba(72,22,155,0.01)');
      ctx.beginPath();
      for(var i=0;i<=STEPS;i++){if(i===0)ctx.moveTo(pts[i].x,pts[i].y);else ctx.lineTo(pts[i].x,pts[i].y);}
      ctx.strokeStyle=sg;ctx.lineWidth=0.9;ctx.globalAlpha=0.82;ctx.stroke();
    }
    ctx.restore();
  }

  /* Seam sparks */
  var SPARKS=[];
  for(var i=0;i<80;i++) SPARKS.push({vf:(Math.random()-0.5)*0.8,xf:Math.random()*0.12,ph:Math.random()*6.283,sp:1.5+Math.random()*3,al:0.3+Math.random()*0.5,sz:0.5+Math.random()*1.2});
  function drawSeam(ox,oy,W,H,t){
    ctx.save();ctx.globalCompositeOperation='lighter';
    for(var i=0;i<SPARKS.length;i++){
      var s=SPARKS[i],px=s.xf*(0.5+0.5*Math.sin(t*s.sp*0.3+s.ph));
      var x=ox+px*(W-ox),y=oy+s.vf*H*0.36*(1-px*4)*Math.sin(t*s.sp+s.ph);
      var flk=0.5+0.5*Math.sin(t*s.sp*2+s.ph);
      var a=(s.al*flk*Math.exp(-px*35)).toFixed(3);
      if(parseFloat(a)<0.005) continue;
      var g=ctx.createRadialGradient(x,y,0,x,y,s.sz*4);
      g.addColorStop(0,'rgba(225,185,255,'+a+')');
      g.addColorStop(0.4,'rgba(165,82,255,'+(parseFloat(a)*0.5).toFixed(3)+')');
      g.addColorStop(1,'rgba(82,22,205,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,s.sz*4,0,6.283);ctx.fill();
    }
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,innerWidth,innerHeight);
    var o=getOrigin(),ox=o.x,oy=o.y;
    if(innerWidth-ox<10){gT+=0.016;requestAnimationFrame(draw);return;}
    STRANDS.sort(function(a,b){return b.dc-a.dc;});
    for(var i=0;i<STRANDS.length;i++) drawStrand(STRANDS[i],ox,oy,innerWidth,innerHeight,gT);
    drawSeam(ox,oy,innerWidth,innerHeight,gT);
    gT+=0.016;requestAnimationFrame(draw);
  }
  draw();
})();

/* ======================================================
   COUNTDOWN
====================================================== */
(function(){
  var target=new Date('2025-09-01T00:00:00Z');
  function tick(){
    var now=new Date(),diff=Math.max(0,target-now);
    var d=Math.floor(diff/86400000);diff%=86400000;
    var h=Math.floor(diff/3600000);diff%=3600000;
    var m=Math.floor(diff/60000);diff%=60000;
    var s=Math.floor(diff/1000);
    document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
    document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
})();
document.getElementById('notify-btn').addEventListener('click',function(){
  var v=document.getElementById('email-input').value.trim();
  if(!v||!v.includes('@')){document.getElementById('email-input').style.borderColor='#f87171';return;}
  this.textContent='You are in!';this.style.background='linear-gradient(135deg,#059669,#10b981)';
  document.getElementById('email-input').disabled=true;
});
</script>
