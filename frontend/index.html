<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cortexle – Coming Soon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#04060f;font-family:'Segoe UI',sans-serif;}
canvas{position:fixed;top:0;left:0;pointer-events:none;}
#bg-canvas{z-index:0;}
#sphere-canvas{z-index:1;}
#wave-canvas{z-index:2;}
#main{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:row;z-index:10;pointer-events:none;}
#left-col{width:52vw;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#logo-txt{
  font-size:clamp(28px,4vw,64px);
  font-weight:900;
  letter-spacing:0.55em;
  text-transform:uppercase;
  background:linear-gradient(135deg,#60a5fa,#a78bfa,#e879f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:clamp(16px,2.5vh,36px);
  pointer-events:none;
  user-select:none;
}
#globe-wrap{
  position:relative;
  width:clamp(280px,40vw,520px);
  height:clamp(280px,40vw,520px);
  pointer-events:auto;
}
#connectors-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;}
.icon-node{
  position:absolute;
  width:clamp(36px,3.5vw,52px);
  height:clamp(36px,3.5vw,52px);
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1.5px solid rgba(80,180,255,0.35);
  background:rgba(8,20,50,0.72);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;
}
.icon-node svg{width:52%;height:52%;stroke:#7dd3fc;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.icon-node:hover,.icon-node.active{border-color:rgba(120,220,255,0.8);box-shadow:0 0 18px rgba(80,200,255,0.5);background:rgba(20,50,100,0.85);}
.icon-node.active svg{stroke:#a5f3fc;}
#right-panel{flex:1;height:100%;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;padding:clamp(16px,2vw,32px) clamp(16px,2.5vw,40px);pointer-events:auto;}
#coming-soon-block{margin-top:clamp(40px,8vh,100px);width:100%;}
#cs-eyebrow{font-size:clamp(9px,0.9vw,13px);letter-spacing:0.35em;color:rgba(160,200,255,0.55);text-transform:uppercase;margin-bottom:clamp(6px,1.2vh,14px);}
#cs-title{
  font-size:clamp(28px,3.8vw,68px);
  font-weight:800;
  letter-spacing:0.06em;
  line-height:1.1;
  background:linear-gradient(135deg,#e0f2fe,#93c5fd,#c4b5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:clamp(14px,2.5vh,30px);
  text-transform:uppercase;
}
#countdown{display:flex;gap:clamp(10px,1.5vw,24px);margin-bottom:clamp(20px,4vh,48px);}
.cd-unit{display:flex;flex-direction:column;align-items:center;}
.cd-num{
  font-size:clamp(22px,3vw,52px);
  font-weight:700;
  font-variant-numeric:tabular-nums;
  color:#e0f2fe;
  letter-spacing:0.04em;
  line-height:1;
}
.cd-lbl{font-size:clamp(7px,0.65vw,10px);letter-spacing:0.2em;color:rgba(160,200,255,0.45);text-transform:uppercase;margin-top:4px;}
#feature-card{
  position:relative;
  background:rgba(8,16,40,0.82);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(80,180,255,0.22);
  border-radius:14px;
  padding:clamp(14px,2vh,24px) clamp(16px,2vw,28px);
  width:clamp(200px,90%,420px);
  margin-top:clamp(20px,4vh,48px);
  opacity:0;
  transform:translateY(10px);
  transition:opacity 0.4s ease,transform 0.4s ease;
  box-shadow:0 4px 32px rgba(40,80,200,0.25),inset 0 1px 0 rgba(255,255,255,0.06);
}
#feature-card.visible{opacity:1;transform:translateY(0);}
#feature-card::before{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(80,160,255,0.06),transparent 60%);pointer-events:none;}
#feature-name{font-size:clamp(14px,1.4vw,22px);font-weight:700;color:#e0f2fe;margin-bottom:8px;letter-spacing:0.04em;}
#feature-desc{font-size:clamp(11px,1vw,15px);color:rgba(180,210,255,0.75);line-height:1.55;}
#email-row{
  display:flex;gap:clamp(6px,0.8vw,12px);
  margin-top:auto;
  margin-bottom:clamp(24px,4vh,56px);
  width:clamp(240px,88%,440px);
}
#email-input{
  flex:1;
  padding:clamp(9px,1.2vh,14px) clamp(12px,1.2vw,18px);
  border-radius:8px;
  border:1.5px solid rgba(80,180,255,0.28);
  background:rgba(8,20,50,0.6);
  backdrop-filter:blur(8px);
  color:#e0f2fe;
  font-size:clamp(11px,1vw,14px);
  outline:none;
  transition:border-color 0.3s;
}
#email-input::placeholder{color:rgba(140,180,240,0.45);}
#email-input:focus{border-color:rgba(120,200,255,0.6);}
#notify-btn{
  padding:clamp(9px,1.2vh,14px) clamp(14px,1.5vw,22px);
  border-radius:8px;
  border:none;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:#fff;
  font-size:clamp(11px,1vw,14px);
  font-weight:600;
  cursor:pointer;
  letter-spacing:0.08em;
  transition:opacity 0.3s,transform 0.2s;
  white-space:nowrap;
}
#notify-btn:hover{opacity:0.88;transform:scale(1.03);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>
<canvas id="wave-canvas"></canvas>
<div id="main">
  <div id="left-col">
    <div id="logo-txt">CORTEXLE</div>
    <div id="globe-wrap">
      <svg id="connectors-svg"></svg>
    </div>
  </div>
  <div id="right-panel">
    <div id="coming-soon-block">
      <div id="cs-eyebrow">CORTEXLE</div>
      <div id="cs-title">COMING SOON</div>
      <div id="countdown">
        <div class="cd-unit"><span class="cd-num" id="cd-d">00</span><span class="cd-lbl">Days</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-lbl">Hours</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-lbl">Mins</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-lbl">Secs</span></div>
      </div>
    </div>
    <div id="feature-card">
      <div id="feature-name"></div>
      <div id="feature-desc"></div>
    </div>
    <div id="email-row">
      <input id="email-input" type="email" placeholder="Enter your email for early access"/>
      <button id="notify-btn">NOTIFY ME</button>
    </div>
  </div>
</div><script>
var DPR = Math.min(window.devicePixelRatio||1, 2);
/* ============================================================
   STARFIELD
============================================================ */
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  var stars=[];
  for(var i=0;i<1800;i++) stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*0.9+0.15,a:Math.random()*0.6+0.1,fp:Math.random()*6.283,fs:Math.random()*1.5+0.3});
  function draw(){var now=Date.now()*.001;ctx.fillStyle='#04060f';ctx.fillRect(0,0,innerWidth,innerHeight);for(var i=0;i<stars.length;i++){var s=stars[i];ctx.globalAlpha=s.a*(0.5+0.5*Math.sin(now*s.fs+s.fp));ctx.fillStyle='#aac8ff';ctx.beginPath();ctx.arc(s.x%innerWidth,s.y%innerHeight,s.r,0,6.283);ctx.fill();}ctx.globalAlpha=1;}
  draw();setInterval(draw,80);
  window.addEventListener('resize',function(){c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);});
})();
/* ============================================================
   initOrb() — Pytia-style holographic sphere v45
   6 layers: core volume | dense point cloud | geodesic arcs |
             flowing noise-distorted wisps | particle sparks | perimeter glow ring
============================================================ */
function initOrb(){
  var canvas=document.getElementById('sphere-canvas');
  var dpr=Math.min(window.devicePixelRatio||1,2);
  var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true,premultipliedAlpha:false});
  renderer.setPixelRatio(dpr);
  renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0x000000,0);
  renderer.sortObjects=false;
  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);
  camera.position.set(0,0,6);

  /* Helper — get orb center + radius from DOM element */
  function getOrbParams(){
    var wrap=document.getElementById('globe-wrap');
    var r=wrap.getBoundingClientRect();
    var cx=r.left+r.width*0.5;
    var cy=r.top+r.height*0.5;
    var ndcX=(cx/innerWidth)*2-1;
    var ndcY=-(cy/innerHeight)*2+1;
    var v=new THREE.Vector3(ndcX,ndcY,0.5).unproject(camera);
    var dir=v.sub(camera.position).normalize();
    var dist=-camera.position.z/dir.z;
    var worldPos=camera.position.clone().addScaledVector(dir,dist);
    var fH=2*Math.tan(THREE.MathUtils.degToRad(camera.fov/2))*camera.position.z;
    var fW=fH*camera.aspect;
    var wRadius=(r.width/innerWidth)*fW*0.50;
    return {pos:worldPos, R:wRadius};
  }

  var ORB=getOrbParams();
  var R=ORB.R;
  var OX=ORB.pos.x, OY=ORB.pos.y;

  /* ── LAYER 1: Soft core volume — multi-layer radial glow ── */
  function makeGlowSprite(sz,innerCol,outerCol,opacity){
    var gc=document.createElement('canvas');gc.width=gc.height=256;
    var ctx=gc.getContext('2d');
    var grd=ctx.createRadialGradient(128,128,0,128,128,128);
    grd.addColorStop(0,innerCol);
    grd.addColorStop(0.25,outerCol);
    grd.addColorStop(0.65,'rgba(10,30,120,0.08)');
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,256,256);
    var tex=new THREE.CanvasTexture(gc);
    var mat=new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:opacity});
    var spr=new THREE.Sprite(mat);
    spr.scale.set(sz,sz,1);
    spr.position.set(OX,OY,0);
    return spr;
  }
  /* Outer halo — wide soft blue */
  var outerGlow=makeGlowSprite(R*6.0,'rgba(30,100,255,0.30)','rgba(10,50,180,0.12)',0.90);
  scene.add(outerGlow);
  /* Mid volume */
  var midGlow=makeGlowSprite(R*3.5,'rgba(70,180,255,0.55)','rgba(30,120,255,0.22)',0.80);
  scene.add(midGlow);
  /* Tight core — bright cyan-white */
  var coreGlow=makeGlowSprite(R*1.6,'rgba(200,240,255,0.80)','rgba(80,200,255,0.45)',0.70);
  scene.add(coreGlow);

  /* ── LAYER 2: Dense Fibonacci point cloud 8k pts ── */
  var N_PTS=8000;
  var ptPos=new Float32Array(N_PTS*3);
  var ptPhases=new Float32Array(N_PTS);
  var ptSpeeds=new Float32Array(N_PTS);
  var ptOrig=new Float32Array(N_PTS*3);
  var golden=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<N_PTS;i++){
    var y=1-(i/(N_PTS-1))*2;
    var rad=Math.sqrt(Math.max(0,1-y*y));
    var theta=golden*i;
    var x=Math.cos(theta)*rad,z=Math.sin(theta)*rad;
    /* depth jitter — slight volumetric shell */
    var jit=0.88+Math.random()*0.18;
    ptOrig[i*3]=x*R*jit; ptOrig[i*3+1]=y*R*jit; ptOrig[i*3+2]=z*R*jit;
    ptPos[i*3]=OX+ptOrig[i*3]; ptPos[i*3+1]=OY+ptOrig[i*3+1]; ptPos[i*3+2]=ptOrig[i*3+2];
    ptPhases[i]=Math.random()*6.283;
    ptSpeeds[i]=0.4+Math.random()*1.6;
  }
  /* Point sprite texture */
  var ptCanvas=document.createElement('canvas');ptCanvas.width=ptCanvas.height=32;
  var ptCtx=ptCanvas.getContext('2d');
  var ptGrd=ptCtx.createRadialGradient(16,16,0,16,16,16);
  ptGrd.addColorStop(0,'rgba(220,248,255,1)');
  ptGrd.addColorStop(0.25,'rgba(100,210,255,0.85)');
  ptGrd.addColorStop(0.6,'rgba(40,140,255,0.30)');
  ptGrd.addColorStop(1,'rgba(0,0,0,0)');
  ptCtx.fillStyle=ptGrd;ptCtx.fillRect(0,0,32,32);
  var ptTex=new THREE.CanvasTexture(ptCanvas);
  var ptGeo=new THREE.BufferGeometry();
  var ptPosAttr=new THREE.BufferAttribute(ptPos.slice(),3);
  ptPosAttr.setUsage(THREE.DynamicDrawUsage);
  ptGeo.setAttribute('position',ptPosAttr);
  var ptMat=new THREE.PointsMaterial({map:ptTex,size:0.042,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.88});
  var ptMesh=new THREE.Points(ptGeo,ptMat);
  scene.add(ptMesh);

  /* ── LAYER 3: Geodesic arc network ── */
  var NET=180;
  var netV=[];
  for(var i=0;i<NET;i++){
    var idx2=Math.floor(i*(N_PTS/NET));
    netV.push(new THREE.Vector3(ptOrig[idx2*3],ptOrig[idx2*3+1],ptOrig[idx2*3+2]));
  }
  var lineGroup=new THREE.Group();
  lineGroup.position.set(OX,OY,0);
  for(var i=0;i<netV.length;i++){
    for(var j=i+1;j<netV.length;j++){
      var d=netV[i].distanceTo(netV[j]);
      if(d<R*0.42 && Math.random()<0.22){
        var mid2=netV[i].clone().add(netV[j]).multiplyScalar(0.5).normalize().multiplyScalar(R);
        var curve=new THREE.QuadraticBezierCurve3(netV[i].clone(),mid2,netV[j].clone());
        var arcPts=curve.getPoints(10);
        var arcGeo=new THREE.BufferGeometry().setFromPoints(arcPts);
        var bright=Math.random()<0.15;
        var lmat=new THREE.LineBasicMaterial({
          color:bright?0x90f0ff:0x3090d0,
          blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,
          opacity:bright?0.60:0.16
        });
        lineGroup.add(new THREE.Line(arcGeo,lmat));
      }
    }
  }
  scene.add(lineGroup);

  /* ── LAYER 4: Flowing noise-distorted wisps ── */
  /* 7 wisps: tilted ellipses + strong noise animation */
  var wisps=[];
  var WISP_DEFS=[
    {tX:0.45,tZ:0.20,ph:0.0,sp:0.22,op:0.40,col:0x50d8ff,thick:1.8},
    {tX:-0.65,tZ:0.55,ph:1.3,sp:0.15,op:0.32,col:0x40b8ff,thick:1.5},
    {tX:0.80,tZ:-0.35,ph:2.6,sp:0.28,op:0.28,col:0x70e8ff,thick:1.3},
    {tX:-0.30,tZ:-0.72,ph:3.9,sp:0.18,op:0.35,col:0x60d0ff,thick:1.6},
    {tX:0.22,tZ:0.88,ph:5.2,sp:0.24,op:0.25,col:0x80daff,thick:1.2},
    {tX:-0.90,tZ:0.12,ph:0.7,sp:0.20,op:0.22,col:0x48c8ff,thick:1.4},
    {tX:0.55,tZ:-0.60,ph:4.4,sp:0.17,op:0.30,col:0x58d4ff,thick:1.5},
  ];
  WISP_DEFS.forEach(function(def){
    var N=80;
    var origPts=[];
    for(var i=0;i<=N;i++){
      var angle=(i/N)*Math.PI*2;
      var px=Math.cos(angle)*R;
      var py=Math.sin(angle)*R*0.30;
      /* tilt X */
      var ry=py*Math.cos(def.tX)-0*Math.sin(def.tX);
      var rz=py*Math.sin(def.tX)+0*Math.cos(def.tX);
      /* tilt Z */
      var fx=px*Math.cos(def.tZ)-rz*Math.sin(def.tZ);
      var fz=px*Math.sin(def.tZ)+rz*Math.cos(def.tZ);
      origPts.push(new THREE.Vector3(OX+fx,OY+ry,fz));
    }
    var geo=new THREE.BufferGeometry().setFromPoints(origPts);
    geo.attributes.position.setUsage(THREE.DynamicDrawUsage);
    var mat=new THREE.LineBasicMaterial({color:def.col,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:def.op});
    var line=new THREE.Line(geo,mat);
    scene.add(line);
    wisps.push({geo:geo,def:def,N:N,orig:origPts.map(function(p){return p.clone();})});
  });

  /* ── LAYER 5: Perimeter spark particles ── */
  var N_SPARKS=160;
  var spkPos=new Float32Array(N_SPARKS*3);
  var spkVel=[];
  var spkLife=new Float32Array(N_SPARKS);
  var spkMaxLife=new Float32Array(N_SPARKS);
  function resetSpark(i){
    var th=Math.random()*Math.PI*2,ph2=Math.acos(2*Math.random()-1);
    var sx=Math.sin(ph2)*Math.cos(th),sy=Math.cos(ph2),sz=Math.sin(ph2)*Math.sin(th);
    spkPos[i*3]=OX+sx*R;spkPos[i*3+1]=OY+sy*R;spkPos[i*3+2]=sz*R;
    spkVel[i]=new THREE.Vector3(sx,sy,sz).multiplyScalar(0.004+Math.random()*0.006);
    spkLife[i]=0;spkMaxLife[i]=30+Math.random()*70;
  }
  for(var i=0;i<N_SPARKS;i++){resetSpark(i);spkLife[i]=Math.random()*50;}
  var spkCanvas=document.createElement('canvas');spkCanvas.width=spkCanvas.height=16;
  var spkCtx=spkCanvas.getContext('2d');
  var spkGrd=spkCtx.createRadialGradient(8,8,0,8,8,8);
  spkGrd.addColorStop(0,'rgba(240,255,255,1)');
  spkGrd.addColorStop(0.4,'rgba(80,220,255,0.65)');
  spkGrd.addColorStop(1,'rgba(0,0,0,0)');
  spkCtx.fillStyle=spkGrd;spkCtx.fillRect(0,0,16,16);
  var spkTex=new THREE.CanvasTexture(spkCanvas);
  var spkGeo=new THREE.BufferGeometry();
  var spkPosAttr=new THREE.BufferAttribute(spkPos.slice(),3);
  spkPosAttr.setUsage(THREE.DynamicDrawUsage);
  spkGeo.setAttribute('position',spkPosAttr);
  var spkMat=new THREE.PointsMaterial({map:spkTex,size:0.060,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.88});
  var spkMesh=new THREE.Points(spkGeo,spkMat);
  scene.add(spkMesh);

  /* ── LAYER 6: Bright emission seam (right-side rim light) ── */
  var rimCanvas=document.createElement('canvas');rimCanvas.width=rimCanvas.height=256;
  var rimCtx=rimCanvas.getContext('2d');
  var rimGrd=rimCtx.createRadialGradient(200,128,0,128,128,128);
  rimGrd.addColorStop(0,'rgba(140,230,255,0.70)');
  rimGrd.addColorStop(0.2,'rgba(60,160,255,0.30)');
  rimGrd.addColorStop(0.5,'rgba(20,80,200,0.08)');
  rimGrd.addColorStop(1,'rgba(0,0,0,0)');
  rimCtx.fillStyle=rimGrd;rimCtx.fillRect(0,0,256,256);
  var rimTex=new THREE.CanvasTexture(rimCanvas);
  var rimMat=new THREE.SpriteMaterial({map:rimTex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.55});
  var rimSprite=new THREE.Sprite(rimMat);
  rimSprite.scale.set(R*2.8,R*2.8,1);
  rimSprite.position.set(OX+R*0.25,OY,0.05);
  scene.add(rimSprite);

  /* ── ANIMATION ── */
  var rotY=0,t=0;
  function animate(){
    requestAnimationFrame(animate);
    t+=0.016;rotY+=0.003;
    var cosR=Math.cos(rotY),sinR=Math.sin(rotY);

    /* Rotate point cloud */
    var pPos=ptGeo.attributes.position.array;
    for(var i=0;i<N_PTS;i++){
      var ox=ptOrig[i*3],oy=ptOrig[i*3+1],oz=ptOrig[i*3+2];
      var rx2=ox*cosR+oz*sinR,rz2=-ox*sinR+oz*cosR;
      var flk=0.70+0.30*Math.sin(t*ptSpeeds[i]+ptPhases[i]);
      pPos[i*3]=OX+rx2; pPos[i*3+1]=OY+oy*flk+(1-flk)*OY; pPos[i*3+2]=rz2;
    }
    ptGeo.attributes.position.needsUpdate=true;

    /* Rotate network lines */
    lineGroup.rotation.y=rotY;

    /* Animate wisps — noise distortion + rotation */
    wisps.forEach(function(rb,ri){
      var N2=rb.N,def=rb.def;
      var posArr=rb.geo.attributes.position.array;
      for(var i=0;i<=N2;i++){
        var angle=(i/N2)*Math.PI*2+t*def.sp+def.ph;
        var noiseAmp=R*0.10;
        var nx=Math.sin(angle*3.2+t*0.8+ri*1.1)*noiseAmp;
        var ny=Math.sin(angle*2.1+t*0.55+ri*1.4)*noiseAmp*0.6;
        var nz=Math.cos(angle*2.7+t*0.65+ri*0.9)*noiseAmp*0.4;
        var op=rb.orig[i];
        var dx=op.x-OX,dz=op.z;
        var rx3=dx*cosR+dz*sinR,rz3=-dx*sinR+dz*cosR;
        posArr[i*3]=OX+rx3+nx; posArr[i*3+1]=op.y+ny; posArr[i*3+2]=rz3+nz;
      }
      rb.geo.attributes.position.needsUpdate=true;
    });

    /* Update sparks */
    var spkArr=spkGeo.attributes.position.array;
    for(var i=0;i<N_SPARKS;i++){
      spkLife[i]++;

    }
    spkGeo.attributes.position.needsUpdate=true;

    /* Pulse glows */
    var pulse=0.80+0.20*Math.sin(t*0.55);
    outerGlow.material.opacity=0.75*pulse;
    midGlow.material.opacity=0.72*pulse;
    coreGlow.material.opacity=0.65*pulse;
    rimSprite.material.opacity=0.48+0.20*Math.sin(t*0.70+1.2);

    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',function(){
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
  });
}

(function(){

  var wd=[];
  for(var wi=0;wi<NW;wi++){
    var zf=wi/(NW-1),zl=(zf-0.5)*7,dc=Math.abs(zl);

      ab:0.60+(1-dc/3.5)*0.55,ad:0.10+Math.random()*0.14,
