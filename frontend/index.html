<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Cortexle - Coming Soon</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#03030e;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh}canvas{display:block;position:absolute;inset:0}#top-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;align-items:center;padding:22px 0 0;flex-direction:column;gap:3px;pointer-events:none}#logo{font-size:11px;letter-spacing:8px;color:#6688ee;text-transform:uppercase;opacity:.75}h1{font-size:clamp(20px,2.8vw,38px);font-weight:300;letter-spacing:7px;text-transform:uppercase;background:linear-gradient(90deg,#5588ff,#bb77ff,#55aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}#sub{font-size:11px;letter-spacing:3px;color:#7788bb;text-transform:uppercase;margin-top:1px}#countdown{display:flex;gap:20px;margin:10px 0 0}.cd-block{display:flex;flex-direction:column;align-items:center;gap:2px}.cd-num{font-size:24px;font-weight:200;color:#99bbee;letter-spacing:2px}.cd-label{font-size:8px;letter-spacing:3px;color:#445599;text-transform:uppercase}#bottom-ui{position:absolute;bottom:36px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:12px}#email-row{display:flex;gap:0;width:min(380px,74vw)}#email-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(80,120,240,0.28);border-right:none;color:#fff;padding:10px 14px;font-size:13px;outline:none;letter-spacing:1px}#email-input::placeholder{color:#334477}#email-btn{background:linear-gradient(135deg,#2244bb,#5522aa);border:none;color:#fff;padding:10px 18px;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase}#tags{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:520px;padding:0 16px}.tag{background:rgba(50,70,160,0.12);border:1px solid rgba(60,90,200,0.2);color:#6688cc;padding:4px 10px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase}#popup{position:absolute;background:rgba(6,9,32,0.94);border:1px solid rgba(70,120,240,0.5);color:#99bbff;padding:8px 16px;font-size:12px;letter-spacing:2px;text-transform:uppercase;pointer-events:none;display:none;transform:translate(-50%,-140%);white-space:nowrap;backdrop-filter:blur(10px)}#hint{position:absolute;bottom:140px;width:100%;text-align:center;font-size:10px;color:#243355;letter-spacing:2px;text-transform:uppercase;pointer-events:none}</style></head><body><canvas id="c"></canvas><div id="top-bar"><div id="logo">Cortexle</div><h1>Coming Soon</h1><div id="sub">AI-Powered Video Intelligence</div><div id="countdown"><div class="cd-block"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Days</span></div><div class="cd-block"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Hours</span></div><div class="cd-block"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Mins</span></div><div class="cd-block"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Secs</span></div></div></div><div id="bottom-ui"><div id="email-row"><input id="email-input" type="email" placeholder="Enter your email for early access"/><button id="email-btn">Notify Me</button></div><div id="tags"><span class="tag">AI Q&amp;A</span><span class="tag">Video Processing</span><span class="tag">Transcription</span><span class="tag">Semantic Search</span><span class="tag">Smart Notes</span><span class="tag">Chrome Extension</span></div></div><div id="hint">Drag to explore &nbsp;&middot;&nbsp; Click nodes to discover</div><div id="popup"></div><script>
const launch=new Date('2025-09-01T00:00:00Z');
function updateCD(){const now=new Date(),diff=Math.max(0,launch-now);const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1e3);document.getElementById('cd-d').textContent=String(d).padStart(2,'0');document.getElementById('cd-h').textContent=String(h).padStart(2,'0');document.getElementById('cd-m').textContent=String(m).padStart(2,'0');document.getElementById('cd-s').textContent=String(s).padStart(2,'0');}
updateCD();setInterval(updateCD,1000);
document.getElementById('email-btn').addEventListener('click',()=>{const v=document.getElementById('email-input').value;if(v&&v.includes('@')){document.getElementById('email-btn').textContent='Done ✓';}});
import('https://unpkg.com/three@0.160.0/build/three.module.js').then(THREE=>{
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setClearColor(0x03030e,1);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,1,0.1,100);camera.position.set(0,0,5.5);
function resize(){const W=innerWidth,H=innerHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
resize();window.addEventListener('resize',resize);
function randSph(r){const u=Math.random()*2-1,th=Math.random()*Math.PI*2,k=Math.sqrt(1-u*u);return new THREE.Vector3(k*Math.cos(th)*r,u*r,k*Math.sin(th)*r);}
const brain=new THREE.Group();brain.position.y=-0.12;scene.add(brain);
brain.add(new THREE.Mesh(new THREE.SphereGeometry(1.48,64,48),new THREE.MeshBasicMaterial({color:0x03030e})));
const rimVS='varying vec3 vN;varying vec3 vP;void main(){vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}';
const rimFS='varying vec3 vN;varying vec3 vP;void main(){vec3 V=normalize(-vP);float f=clamp(dot(vN,V),0.,1.);float rim=pow(1.-f,3.5);vec3 col=mix(vec3(0.5,0.75,1.0),vec3(0.8,0.6,1.0),pow(1.-f,1.5))*4.0;gl_FragColor=vec4(col*rim,rim*1.1);}';
brain.add(new THREE.Mesh(new THREE.SphereGeometry(1.505,64,48),new THREE.ShaderMaterial({vertexShader:rimVS,fragmentShader:rimFS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.FrontSide})));
const innerFS='varying vec3 vN;varying vec3 vP;void main(){vec3 V=normalize(-vP);float f=clamp(dot(vN,V),0.,1.);float inner=pow(f,1.2)*0.35;gl_FragColor=vec4(vec3(0.04,0.08,0.3)*inner,inner*0.4);}';
brain.add(new THREE.Mesh(new THREE.SphereGeometry(1.50,64,48),new THREE.ShaderMaterial({vertexShader:rimVS,fragmentShader:innerFS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.FrontSide})));
function dotTex(r,g,b){const c=document.createElement('canvas');c.width=64;c.height=64;const cx=c.getContext('2d'),gd=cx.createRadialGradient(32,32,0,32,32,32);gd.addColorStop(0,'rgba(255,255,255,1)');gd.addColorStop(0.10,'rgba('+r+','+g+','+b+',0.92)');gd.addColorStop(0.32,'rgba('+r+','+g+','+b+',0.38)');gd.addColorStop(0.60,'rgba('+r+','+g+','+b+',0.06)');gd.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=gd;cx.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const texO=dotTex(255,140,40),texB=dotTex(60,140,255);
const oPos=[],bPos=[];
for(let i=0;i<130;i++) oPos.push(randSph(1.49));
for(let i=0;i<160;i++) bPos.push(randSph(1.495));
function spritePts(pts,tex,sz){const geo=new THREE.BufferGeometry();const arr=new Float32Array(pts.length*3);pts.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});geo.setAttribute('position',new THREE.BufferAttribute(arr,3));return new THREE.Points(geo,new THREE.PointsMaterial({size:sz,map:tex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true}));}
brain.add(spritePts(oPos,texO,0.18));brain.add(spritePts(bPos,texB,0.12));
function lines(pts,col,maxD,maxConn,op){const segs=[];for(let i=0;i<pts.length;i++){let c=0;for(let j=i+1;j<pts.length&&c<maxConn;j++){if(pts[i].distanceTo(pts[j])<maxD){segs.push(pts[i].clone(),pts[j].clone());c++;}}}if(!segs.length)return;brain.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(segs),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op,depthWrite:false,blending:THREE.AdditiveBlending})));}
lines(oPos,0xddcc00,0.44,3,0.58);lines(bPos,0x2244ee,0.40,3,0.30);
const wPts2=[];for(let i=0;i<1200;i++) wPts2.push(randSph(1.485));
const wSegs=[];for(let i=0;i<wPts2.length;i++){const nb=[];for(let j=0;j<wPts2.length;j++) if(i!==j&&wPts2[i].distanceTo(wPts2[j])<0.33) nb.push(j);nb.sort(()=>Math.random()-.5).slice(0,2).forEach(j=>{wSegs.push(wPts2[i].clone(),wPts2[j].clone());});}
brain.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(wSegs),new THREE.LineBasicMaterial({color:0x1a30cc,transparent:true,opacity:.11,depthWrite:false,blending:THREE.AdditiveBlending})));
const feats=[{name:'AI Q&A',theta:.40,phi:1.05,col:0xff7722},{name:'Video Processing',theta:.25,phi:2.10,col:0xff7722},{name:'Transcription',theta:-.15,phi:2.80,col:0xff7722},{name:'Semantic Search',theta:.10,phi:.30,col:0x55aaff},{name:'Smart Notes',theta:-.80,phi:1.55,col:0x55aaff},{name:'Chrome Extension',theta:-1.0,phi:2.20,col:0x55aaff}];
function sphPos(th,ph,r){return new THREE.Vector3(r*Math.cos(th)*Math.cos(ph),r*Math.sin(th),r*Math.cos(th)*Math.sin(ph));}
const hotspots=feats.map(f=>{const pos=sphPos(f.theta,f.phi,1.50);const dot=new THREE.Mesh(new THREE.SphereGeometry(.046,16,16),new THREE.MeshBasicMaterial({color:f.col}));dot.position.copy(pos);const glow=new THREE.Mesh(new THREE.SphereGeometry(.09,16,16),new THREE.MeshBasicMaterial({color:f.col,transparent:true,opacity:.16,depthWrite:false,blending:THREE.AdditiveBlending}));glow.position.copy(pos);const ring=new THREE.Mesh(new THREE.RingGeometry(.062,.078,32),new THREE.MeshBasicMaterial({color:f.col,transparent:true,opacity:.7,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending}));ring.position.copy(pos);ring.lookAt(new THREE.Vector3());ring.rotateX(Math.PI/2);brain.add(dot);brain.add(glow);brain.add(ring);return{pos,dot,ring,glow,name:f.name,phase:Math.random()*Math.PI*2};});
const WN=2200,wvPos=new Float32Array(WN*3),wPh=new Float32Array(WN),wSpd=new Float32Array(WN);
for(let i=0;i<WN;i++){const t=Math.pow(i/WN,0.6);wvPos[i*3]=1.8+t*6.0+(Math.random()-.5)*.5;wvPos[i*3+1]=(Math.random()-.5)*2.6*(1-t*.65);wvPos[i*3+2]=(Math.random()-.5)*1.1*(1-t*.5);wPh[i]=Math.random()*Math.PI*2;wSpd[i]=0.6+Math.random()*.8;}
const wGeo=new THREE.BufferGeometry();wGeo.setAttribute('position',new THREE.BufferAttribute(wvPos,3));
scene.add(new THREE.Points(wGeo,new THREE.PointsMaterial({size:.018,color:0x5511cc,transparent:true,opacity:.38,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true})));
const coreN=400,corePos=new Float32Array(coreN*3);const wGeo2=new THREE.BufferGeometry();
for(let i=0;i<coreN;i++){const t=i/coreN;corePos[i*3]=1.8+t*5.5;corePos[i*3+1]=0;corePos[i*3+2]=0;}
wGeo2.setAttribute('position',new THREE.BufferAttribute(corePos,3));
scene.add(new THREE.Points(wGeo2,new THREE.PointsMaterial({size:.016,color:0x8844ee,transparent:true,opacity:.48,depthWrite:false,blending:THREE.AdditiveBlending})));
let drag=false,lx=0,ly=0,rY=0.5,rX=-.08;
const popup=document.getElementById('popup');const ray=new THREE.Raycaster();const mv=new THREE.Vector2();const dotMeshes=hotspots.map(h=>h.dot);
canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',e=>{if(!drag)return;const dx=e.clientX-lx,dy=e.clientY-ly;if(Math.abs(dx)<5&&Math.abs(dy)<5){mv.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);ray.setFromCamera(mv,camera);const hits=ray.intersectObjects(dotMeshes);if(hits.length){const i=dotMeshes.indexOf(hits[0].object);const h=hotspots[i];popup.textContent=h.name;popup.style.display='block';popup.style.left=e.clientX+'px';popup.style.top=e.clientY+'px';}else popup.style.display='none';}drag=false;});
window.addEventListener('mousemove',e=>{if(!drag)return;rY+=(e.clientX-lx)*.008;rX+=(e.clientY-ly)*.005;rX=Math.max(-1.4,Math.min(1.4,rX));lx=e.clientX;ly=e.clientY;});
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];drag=true;lx=t.clientX;ly=t.clientY;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];rY+=(t.clientX-lx)*.008;rX+=(t.clientY-ly)*.005;rX=Math.max(-1.4,Math.min(1.4,rX));lx=t.clientX;ly=t.clientY;e.preventDefault();},{passive:false});
let tt=0;
function anim(){requestAnimationFrame(anim);tt+=.016;if(!drag){rY+=.0010;}brain.rotation.y=rY;brain.rotation.x=rX;hotspots.forEach(h=>{const s=1+.20*Math.sin(tt*2.8+h.phase);h.ring.scale.setScalar(s);h.ring.material.opacity=.45+.3*Math.sin(tt*2.8+h.phase);h.glow.material.opacity=.10+.07*Math.sin(tt*2+h.phase);});const wp=wGeo.attributes.position.array;for(let i=0;i<WN;i++){const bt=i/WN;const amp=(1-bt*.58)*.40;wp[i*3+1]=Math.sin(bt*20+tt*wSpd[i]+wPh[i])*amp+Math.sin(bt*8+tt*.85)*amp*.3;wp[i*3+2]=Math.cos(bt*12+tt*wSpd[i]*.8+wPh[i])*amp*.48*(.25+bt*.75);}wGeo.attributes.position.needsUpdate=true;const cp=wGeo2.attributes.position.array;for(let i=0;i<coreN;i++){const t=i/coreN;cp[i*3+1]=Math.sin(t*14+tt*2.0)*.30*(1-t*.6);cp[i*3+2]=Math.cos(t*9+tt*1.4)*.15*t;}wGeo2.attributes.position.needsUpdate=true;renderer.render(scene,camera);}
anim();
});
</script></body></html>
