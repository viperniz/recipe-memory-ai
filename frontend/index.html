<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cortexle - Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
header{width:100%;padding:18px 40px;text-align:center}
.logo{font-size:26px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#4fc3f7,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero{text-align:center;padding:4px 20px 0}
.hero h1{font-size:clamp(26px,4vw,48px);font-weight:700;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,#4fc3f7 50%,#7c4dff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:clamp(12px,1.5vw,16px);color:rgba(255,255,255,0.5);max-width:440px;margin:0 auto 6px}
#bs{position:relative;width:100%;max-width:720px;height:520px;margin:0 auto}
#bc{display:block;width:100%;height:100%;cursor:grab}
#bc:active{cursor:grabbing}
.fl{position:absolute;left:50%;top:9%;transform:translate(-50%,-50%);background:rgba(0,0,20,0.92);border:1px solid rgba(79,195,247,0.7);border-radius:8px;padding:7px 18px;font-size:14px;font-weight:600;color:#4fc3f7;pointer-events:none;opacity:0;transition:opacity 0.35s;white-space:nowrap;letter-spacing:0.5px;box-shadow:0 0 18px rgba(79,195,247,0.3)}
.fl.on{opacity:1}
.hint{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;text-align:center}
.cd-s{text-align:center;padding:2px 20px 12px}
.cd-t{font-size:11px;color:rgba(255,255,255,0.32);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.cd-g{display:flex;gap:20px;justify-content:center}
.cd-i{text-align:center}
.cd-n{font-size:clamp(24px,3.5vw,40px);font-weight:700;color:#4fc3f7;line-height:1;display:block}
.cd-l{font-size:10px;color:rgba(255,255,255,0.32);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.es{padding:0 20px 12px;text-align:center}
.ef{display:flex;gap:10px;max-width:360px;margin:0 auto}
.ei{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(79,195,247,0.28);border-radius:8px;padding:10px 14px;color:#fff;font-size:13px;outline:none;transition:border-color 0.3s}
.ei::placeholder{color:rgba(255,255,255,0.26)}
.ei:focus{border-color:#4fc3f7}
.eb{background:linear-gradient(135deg,#4fc3f7,#7c4dff);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tgs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:0 20px 22px;max-width:600px}
.tg{background:rgba(79,195,247,0.07);border:1px solid rgba(79,195,247,0.2);border-radius:20px;padding:5px 13px;font-size:11px;color:rgba(255,255,255,0.58)}
</style>
</head>
<body>
<header><div class="logo">CORTEXLE</div></header>
<div class="hero">
  <h1>AI Video Intelligence</h1>
  <p>Transform any video into searchable, interactive knowledge</p>
</div>
<div id="bs"><canvas id="bc"></canvas><div class="fl" id="fl"></div></div>
<div class="hint">Click a node &bull; Drag to rotate</div>
<div class="cd-s">
  <div class="cd-t">Launching In</div>
  <div class="cd-g">
    <div class="cd-i"><span class="cd-n" id="cd-d">00</span><div class="cd-l">Days</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-h">00</span><div class="cd-l">Hours</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-m">00</span><div class="cd-l">Mins</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-s">00</span><div class="cd-l">Secs</div></div>
  </div>
</div>
<div class="es">
  <form class="ef" onsubmit="return false">
    <input class="ei" type="email" placeholder="Enter your email" id="ei"/>
    <button class="eb" onclick="notifyMe()">Notify Me</button>
  </form>
</div>
<div class="tgs">
  <span class="tg">AI Q&amp;A</span><span class="tg">Video Processing</span><span class="tg">Transcription</span>
  <span class="tg">Semantic Search</span><span class="tg">Smart Notes</span><span class="tg">Chrome Extension</span>
</div>
<script>
(function(){
  var tgt=new Date('2025-09-01T00:00:00Z');
  function upd(){var n=new Date(),d=Math.max(0,tgt-n),v=[Math.floor(d/864e5),Math.floor((d%864e5)/36e5),Math.floor((d%36e5)/6e4),Math.floor((d%6e4)/1e3)];['cd-d','cd-h','cd-m','cd-s'].forEach(function(id,i){document.getElementById(id).textContent=String(v[i]).padStart(2,'0');});}
  upd();setInterval(upd,1000);
  window.notifyMe=function(){var v=document.getElementById('ei').value;if(v&&v.includes('@'))alert('Thanks! We will notify you at '+v);};
})();
(function(){
  var sec=document.getElementById('bs'),cv=document.getElementById('bc'),fl=document.getElementById('fl');
  var DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    var W=sec.clientWidth,H=sec.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
    return {W:W,H:H};
  }
  var sz=resize();
  var W=sz.W,H=sz.H;
  var ctx=cv.getContext('2d');ctx.scale(DPR,DPR);

  // Brain center and scale
  var CX=W/2-5, CY=H/2;
  var SC=Math.min(W,H)/520; // scale factor

  // === BRAIN SILHOUETTE PATH (lateral view, facing right = frontal lobe on right) ===
  // Normalized to unit coordinates (scale with SC)
  // Brain is centered at (0,0) in normalized space
  // Spans roughly x:-220 to x:220, y:-220 to y:210 (in pixels at SC=1)
  function makeBrainPath(ctx,cx,cy,s,rotY){
    // s = scale, rotY = Y-rotation angle (compresses X by cos(rotY))
    var cosY=Math.cos(rotY);
    function px(x){return cx+x*s*cosY;}
    function py(y){return cy+y*s;}
    ctx.beginPath();
    // Start at temporal lobe area (right side, middle)
    // Going clockwise: up through frontal, over parietal, down occipital, through cerebellum, brainstem, back up
    ctx.moveTo(px(175), py(25));         // temporal-frontal junction
    // Frontal lobe: upper right
    ctx.bezierCurveTo(px(215),py(-25), px(230),py(-90), px(210),py(-155));
    ctx.bezierCurveTo(px(188),py(-205), px(140),py(-240), px(65),py(-245));
    // Parietal: top of brain
    ctx.bezierCurveTo(px(10),py(-250), px(-55),py(-238), px(-120),py(-215));
    // Occipital: upper-back
    ctx.bezierCurveTo(px(-180),py(-190), px(-220),py(-145), px(-225),py(-85));
    // Occipital lower-back  
    ctx.bezierCurveTo(px(-228),py(-20), px(-210),py(50), px(-185),py(100));
    // Cerebellum notch area
    ctx.bezierCurveTo(px(-165),py(140), px(-140),py(165), px(-105),py(155));
    ctx.bezierCurveTo(px(-75),py(145), px(-55),py(125), px(-40),py(115));
    // Brainstem area (bottom)
    ctx.bezierCurveTo(px(-20),py(135), px(-5),py(165), px(0),py(190));
    ctx.bezierCurveTo(px(5),py(210), px(12),py(215), px(18),py(210));
    ctx.bezierCurveTo(px(30),py(200), px(28),py(175), px(18),py(155));
    // Brainstem/temporal back up
    ctx.bezierCurveTo(px(30),py(135), px(60),py(120), px(90),py(130));
    ctx.bezierCurveTo(px(125),py(140), px(155),py(120), px(170),py(80));
    // Temporal lobe back to start
    ctx.bezierCurveTo(px(182),py(55), px(180),py(38), px(175),py(25));
    ctx.closePath();
  }

  // Check if a point is inside the brain path
  function makeTempCanvas(){
    var tc=document.createElement('canvas');tc.width=Math.ceil(W*DPR);tc.height=Math.ceil(H*DPR);
    var tx=tc.getContext('2d');tx.scale(DPR,DPR);
    return {c:tc,x:tx};
  }
  var tc=makeTempCanvas();

  function isInBrain(x,y,rotY){
    tc.x.clearRect(0,0,W,H);
    makeBrainPath(tc.x,CX,CY,SC,rotY);
    return tc.x.isPointInPath(x,y);
  }

  // Generate nodes INSIDE the brain shape (rejection sampling at rotY=0)
  function genNode(){
    var attempts=0;
    while(attempts<100){
      // Random point in bounding box
      var px=CX+(-200+Math.random()*400)*SC;
      var py=CY+(-250+Math.random()*450)*SC;
      if(isInBrain(px,py,0)){
        // Store in brain-local coords (relative to center, normalized)
        var lx=(px-CX)/(SC);
        var ly=(py-CY)/(SC);
        // Z-depth: points near center of the ellipsoid have more depth
        var zMax=130*(1-Math.pow(lx/210,2)-Math.pow(ly/240,2));
        var lz=(Math.random()*2-1)*Math.max(0,Math.sqrt(Math.abs(zMax)));
        return {x:lx, y:ly, z:lz};
      }
      attempts++;
    }
    return {x:0,y:0,z:0};
  }

  var oNodes=[],bNodes=[];
  for(var i=0;i<120;i++) oNodes.push(genNode());
  for(var i=0;i<140;i++) bNodes.push(genNode());

  // Build connections
  var oConns=[],bConns=[],fiberData=[];
  for(var i=0;i<oNodes.length;i++) for(var j=i+1;j<oNodes.length;j++){
    var dx=oNodes[i].x-oNodes[j].x,dy=oNodes[i].y-oNodes[j].y;
    var d2D=Math.sqrt(dx*dx+dy*dy);
    if(d2D<95&&Math.random()<0.42) oConns.push([i,j]);
  }
  for(var i=0;i<bNodes.length;i++) for(var j=i+1;j<bNodes.length;j++){
    var dx=bNodes[i].x-bNodes[j].x,dy=bNodes[i].y-bNodes[j].y;
    var d2D=Math.sqrt(dx*dx+dy*dy);
    if(d2D<80&&Math.random()<0.26) bConns.push([i,j]);
  }
  // Fiber strands
  for(var f=0;f<900;f++){
    var n=genNode();
    var ang=Math.random()*Math.PI*2,len=5+Math.random()*22;
    fiberData.push([n.x,n.y,n.z, n.x+Math.cos(ang)*len, n.y+Math.sin(ang)*len, n.z+Math.random()*6-3]);
  }

  // Feature hotspots (brain-local coordinates)
  var features=[
    {name:'AI Q&A',         lx:155, ly:-90,  lz:60 },  // Frontal lobe
    {name:'Video Processing',lx:30,  ly:-220, lz:40 },  // Parietal (top)
    {name:'Transcription',  lx:155, ly:40,   lz:80 },  // Temporal (side)
    {name:'Semantic Search',lx:-175,ly:-60,  lz:50 },  // Occipital
    {name:'Smart Notes',    lx:-120,ly:130,  lz:40 },  // Cerebellum
    {name:'Chrome Extension',lx:10, ly:195,  lz:20 }   // Brainstem
  ];
  features.forEach(function(f){
    f.tY=-Math.atan2(f.lx,f.lz+130)*0.5;
    f.tX=-Math.atan2(f.ly,230)*0.3;
  });

  var rotY=0, rotX=0, tRotY=0, tRotX=0;
  var drag=false, lastMX=0, lastMY=0, spin=true;
  var lblTimer=null;

  function getScreenPos(lx,ly,lz,rY,rX){
    var cosY=Math.cos(rY),sinY=Math.sin(rY);
    var cosX=Math.cos(rX),sinX=Math.sin(rX);
    // Apply Y rotation (around vertical axis)
    var rx=lx*cosY+lz*sinY;
    var ry=ly;
    var rz=-lx*sinY+lz*cosY;
    // Apply X rotation (tilt up/down)
    var ry2=ry*cosX-rz*sinX;
    var rz2=ry*sinX+rz*cosX;
    var scale=(600/(600+rz2));
    return {sx:CX+rx*scale*SC, sy:CY+ry2*scale*SC, depth:rz2, scale:scale};
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // Outer glow
    var grad=ctx.createRadialGradient(CX,CY,50*SC,CX,CY,320*SC);
    grad.addColorStop(0,'rgba(8,20,140,0)');
    grad.addColorStop(0.65,'rgba(8,22,160,0.07)');
    grad.addColorStop(0.85,'rgba(15,35,180,0.18)');
    grad.addColorStop(1,'rgba(10,25,140,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.ellipse(CX,CY,320*SC,320*SC,0,0,Math.PI*2);ctx.fill();

    // Draw brain interior (black fill)
    makeBrainPath(ctx,CX,CY,SC,rotY);
    ctx.fillStyle='#000000';
    ctx.fill();

    // Clip to brain shape for fibers, connections, nodes
    ctx.save();
    makeBrainPath(ctx,CX,CY,SC,rotY);
    ctx.clip();

    // Draw fibers
    ctx.lineWidth=0.7/SC;
    ctx.strokeStyle='#1133bb';
    ctx.globalAlpha=0.20;
    fiberData.forEach(function(fb){
      var p1=getScreenPos(fb[0],fb[1],fb[2],rotY,rotX);
      var p2=getScreenPos(fb[3],fb[4],fb[5],rotY,rotX);
      if(p1.depth<80&&p2.depth<80){
        ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.stroke();
      }
    });

    // Blue connections
    ctx.lineWidth=0.9;
    bConns.forEach(function(c){
      var p1=getScreenPos(bNodes[c[0]].x,bNodes[c[0]].y,bNodes[c[0]].z,rotY,rotX);
      var p2=getScreenPos(bNodes[c[1]].x,bNodes[c[1]].y,bNodes[c[1]].z,rotY,rotX);
      if(p1.depth<80&&p2.depth<80){
        ctx.globalAlpha=0.30;ctx.strokeStyle='#2266ee';
        ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.stroke();
      }
    });

    // Yellow connections
    ctx.lineWidth=1.0;
    oConns.forEach(function(c){
      var p1=getScreenPos(oNodes[c[0]].x,oNodes[c[0]].y,oNodes[c[0]].z,rotY,rotX);
      var p2=getScreenPos(oNodes[c[1]].x,oNodes[c[1]].y,oNodes[c[1]].z,rotY,rotX);
      if(p1.depth<80&&p2.depth<80){
        ctx.globalAlpha=0.60;ctx.strokeStyle='#ddcc00';
        ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.stroke();
      }
    });

    // Blue nodes
    bNodes.forEach(function(n){
      var p=getScreenPos(n.x,n.y,n.z,rotY,rotX);
      if(p.depth<80){
        var r=3.2*p.scale;
        ctx.globalAlpha=Math.max(0.15,Math.min(0.85,0.5-p.depth/200));
        var g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*4);
        g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.15,'rgba(170,215,255,1)');
        g.addColorStop(0.4,'rgba(55,125,255,0.55)');g.addColorStop(1,'rgba(15,65,210,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.sx,p.sy,r*4,0,Math.PI*2);ctx.fill();
      }
    });

    // Orange nodes
    oNodes.forEach(function(n){
      var p=getScreenPos(n.x,n.y,n.z,rotY,rotX);
      if(p.depth<80){
        var r=4.2*p.scale;
        ctx.globalAlpha=Math.max(0.15,Math.min(1,0.65-p.depth/180));
        var g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*4);
        g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.08,'rgba(255,245,185,1)');
        g.addColorStop(0.22,'rgba(255,145,35,0.98)');g.addColorStop(0.5,'rgba(255,60,0,0.42)');
        g.addColorStop(1,'rgba(195,10,0,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.sx,p.sy,r*4,0,Math.PI*2);ctx.fill();
      }
    });

    ctx.restore();

    // Brain rim glow (multiple layers outside the path)
    for(var i=8;i>=0;i--){
      makeBrainPath(ctx,CX,CY,SC*(1+i*0.012),rotY);
      ctx.strokeStyle='rgba(50,120,255,'+(0.055-i*0.004)+')';
      ctx.lineWidth=5+i*3;
      ctx.globalAlpha=1;
      ctx.stroke();
    }
    // Bright thin rim
    makeBrainPath(ctx,CX,CY,SC,rotY);
    ctx.strokeStyle='rgba(100,175,255,0.88)';ctx.lineWidth=2;ctx.stroke();
    makeBrainPath(ctx,CX,CY,SC*1.008,rotY);
    ctx.strokeStyle='rgba(160,215,255,0.50)';ctx.lineWidth=3.5;ctx.stroke();

    // Feature hotspots
    var t=Date.now()/800;
    features.forEach(function(f,i){
      var p=getScreenPos(f.lx,f.ly,f.lz,rotY,rotX);
      // Check if visible (in front half)
      if(p.depth<90){
        var r=6*p.scale;
        ctx.globalAlpha=0.88;
        var g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*3);
        g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.18,'rgba(255,200,80,1)');
        g.addColorStop(0.45,'rgba(255,105,15,0.75)');g.addColorStop(1,'rgba(195,20,0,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.sx,p.sy,r*3,0,Math.PI*2);ctx.fill();
        // Pulse ring
        var ph=(t+i*1.1)%(Math.PI*2);
        var rs=r*(1.8+Math.sin(ph)*0.6);
        ctx.globalAlpha=0.22+Math.sin(ph)*0.30;
        ctx.strokeStyle='#ff9933';ctx.lineWidth=1.8;
        ctx.beginPath();ctx.arc(p.sx,p.sy,rs,0,Math.PI*2);ctx.stroke();
      }
    });
    ctx.globalAlpha=1;
  }

  function animate(){
    requestAnimationFrame(animate);
    if(spin) tRotY+=0.0018;
    rotY+=(tRotY-rotY)*0.055;
    rotX+=(tRotX-rotX)*0.055;
    draw();
  }
  animate();

  cv.addEventListener('mousedown',function(e){drag=true;spin=false;lastMX=e.clientX;lastMY=e.clientY;handleClick(e.clientX,e.clientY);});
  document.addEventListener('mousemove',function(e){if(!drag)return;tRotY+=(e.clientX-lastMX)*0.007;tRotX=Math.max(-0.8,Math.min(0.8,tRotX+(e.clientY-lastMY)*0.005));lastMX=e.clientX;lastMY=e.clientY;});
  document.addEventListener('mouseup',function(){drag=false;});
  cv.addEventListener('touchstart',function(e){e.preventDefault();drag=true;spin=false;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;handleClick(lastMX,lastMY);},{passive:false});
  document.addEventListener('touchmove',function(e){if(!drag)return;tRotY+=(e.touches[0].clientX-lastMX)*0.007;tRotX=Math.max(-0.8,Math.min(0.8,tRotX+(e.touches[0].clientY-lastMY)*0.005));lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;},{passive:false});
  document.addEventListener('touchend',function(){drag=false;});

  function handleClick(mx,my){
    var rect=cv.getBoundingClientRect();
    var sx=(mx-rect.left)*W/rect.width;
    var sy=(my-rect.top)*H/rect.height;
    var best=null,bestD=25;
    features.forEach(function(f){
      var p=getScreenPos(f.lx,f.ly,f.lz,rotY,rotX);
      if(p.depth<90){
        var d=Math.sqrt(Math.pow(sx-p.sx,2)+Math.pow(sy-p.sy,2));
        if(d<bestD){bestD=d;best=f;}
      }
    });
    if(best){
      tRotY=best.tY;tRotX=best.tX;
      if(lblTimer)clearTimeout(lblTimer);
      fl.textContent=best.name;fl.classList.add('on');
      lblTimer=setTimeout(function(){fl.classList.remove('on');},3500);
    } else {
      fl.classList.remove('on');
    }
  }

  window.addEventListener('resize',function(){
    var s=resize();W=s.W;H=s.H;ctx.scale(DPR,DPR);CX=W/2-5;CY=H/2;
    tc=makeTempCanvas();
  });
})();
<\/script>
</body>
</html>
