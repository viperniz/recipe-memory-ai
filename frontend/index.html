<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cortexle – Coming Soon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#04060f;font-family:'Segoe UI',sans-serif;}
canvas{position:fixed;top:0;left:0;pointer-events:none;}
#bg-canvas{z-index:0;}#sphere-canvas{z-index:1;}#wave-canvas{z-index:2;}
#main{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:row;z-index:10;pointer-events:none;}
#left-col{width:52vw;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#logo-txt{font-size:clamp(28px,4vw,64px);font-weight:900;letter-spacing:0.55em;text-transform:uppercase;background:linear-gradient(135deg,#60a5fa,#a78bfa,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:clamp(16px,2.5vh,36px);pointer-events:none;user-select:none;}
#globe-wrap{position:relative;width:clamp(280px,40vw,520px);height:clamp(280px,40vw,520px);pointer-events:auto;}
#connectors-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;}
.icon-node{position:absolute;width:clamp(36px,3.5vw,52px);height:clamp(36px,3.5vw,52px);transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(80,180,255,0.35);background:rgba(8,20,50,0.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;}
.icon-node svg{width:52%;height:52%;stroke:#7dd3fc;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.icon-node:hover,.icon-node.active{border-color:rgba(120,220,255,0.8);box-shadow:0 0 18px rgba(80,200,255,0.5);background:rgba(20,50,100,0.85);}
.icon-node.active svg{stroke:#a5f3fc;}
#right-panel{flex:1;height:100%;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;padding:clamp(16px,2vw,32px) clamp(16px,2.5vw,40px);pointer-events:auto;}
#coming-soon-block{margin-top:clamp(40px,8vh,100px);width:100%;}
#cs-eyebrow{font-size:clamp(9px,0.9vw,13px);letter-spacing:0.35em;color:rgba(160,200,255,0.55);text-transform:uppercase;margin-bottom:clamp(6px,1.2vh,14px);}
#cs-title{font-size:clamp(28px,3.8vw,68px);font-weight:800;letter-spacing:0.06em;line-height:1.1;background:linear-gradient(135deg,#e0f2fe,#93c5fd,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:clamp(14px,2.5vh,30px);text-transform:uppercase;}
#countdown{display:flex;gap:clamp(10px,1.5vw,24px);margin-bottom:clamp(20px,4vh,48px);}
.cd-unit{display:flex;flex-direction:column;align-items:center;}
.cd-num{font-size:clamp(22px,3vw,52px);font-weight:700;font-variant-numeric:tabular-nums;color:#e0f2fe;letter-spacing:0.04em;line-height:1;}
.cd-lbl{font-size:clamp(7px,0.65vw,10px);letter-spacing:0.2em;color:rgba(160,200,255,0.45);text-transform:uppercase;margin-top:4px;}
#feature-card{position:relative;background:rgba(8,16,40,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(80,180,255,0.22);border-radius:14px;padding:clamp(14px,2vh,24px) clamp(16px,2vw,28px);width:clamp(200px,90%,420px);margin-top:clamp(20px,4vh,48px);opacity:0;transform:translateY(10px);transition:opacity 0.4s ease,transform 0.4s ease;box-shadow:0 4px 32px rgba(40,80,200,0.25),inset 0 1px 0 rgba(255,255,255,0.06);}
#feature-card.visible{opacity:1;transform:translateY(0);}
#feature-card::before{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(80,160,255,0.06),transparent 60%);pointer-events:none;}
#feature-name{font-size:clamp(14px,1.4vw,22px);font-weight:700;color:#e0f2fe;margin-bottom:8px;letter-spacing:0.04em;}
#feature-desc{font-size:clamp(11px,1vw,15px);color:rgba(180,210,255,0.75);line-height:1.55;}
#email-row{display:flex;gap:clamp(6px,0.8vw,12px);margin-top:auto;margin-bottom:clamp(24px,4vh,56px);width:clamp(240px,88%,440px);}
#email-input{flex:1;padding:clamp(9px,1.2vh,14px) clamp(12px,1.2vw,18px);border-radius:8px;border:1.5px solid rgba(80,180,255,0.28);background:rgba(8,20,50,0.6);backdrop-filter:blur(8px);color:#e0f2fe;font-size:clamp(11px,1vw,14px);outline:none;transition:border-color 0.3s;}
#email-input::placeholder{color:rgba(140,180,240,0.45);}
#email-input:focus{border-color:rgba(120,200,255,0.6);}
#notify-btn{padding:clamp(9px,1.2vh,14px) clamp(14px,1.5vw,22px);border-radius:8px;border:none;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;font-size:clamp(11px,1vw,14px);font-weight:600;cursor:pointer;letter-spacing:0.08em;transition:opacity 0.3s,transform 0.2s;white-space:nowrap;}
#notify-btn:hover{opacity:0.88;transform:scale(1.03);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>
<canvas id="wave-canvas"></canvas>
<div id="main">
  <div id="left-col">
    <div id="logo-txt">CORTEXLE</div>
    <div id="globe-wrap"><svg id="connectors-svg"></svg></div>
  </div>
  <div id="right-panel">
    <div id="coming-soon-block">
      <div id="cs-eyebrow">CORTEXLE</div>
      <div id="cs-title">COMING SOON</div>
      <div id="countdown">
        <div class="cd-unit"><span class="cd-num" id="cd-d">00</span><span class="cd-lbl">Days</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-lbl">Hours</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-lbl">Mins</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-lbl">Secs</span></div>
      </div>
    </div>
    <div id="feature-card"><div id="feature-name"></div><div id="feature-desc"></div></div>
    <div id="email-row">
      <input id="email-input" type="email" placeholder="Enter your email for early access"/>
      <button id="notify-btn">NOTIFY ME</button>
    </div>
  </div>
</div><script>
var DPR=Math.min(window.devicePixelRatio||1,2);
/* STARFIELD */
(function(){var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);
var stars=[];for(var i=0;i<1800;i++)stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*0.9+0.15,a:Math.random()*0.6+0.1,fp:Math.random()*6.283,fs:Math.random()*1.5+0.3});
function draw(){var now=Date.now()*.001;ctx.fillStyle='#04060f';ctx.fillRect(0,0,innerWidth,innerHeight);for(var i=0;i<stars.length;i++){var s=stars[i];ctx.globalAlpha=s.a*(0.5+0.5*Math.sin(now*s.fs+s.fp));ctx.fillStyle='#aac8ff';ctx.beginPath();ctx.arc(s.x%innerWidth,s.y%innerHeight,s.r,0,6.283);ctx.fill();}ctx.globalAlpha=1;}
draw();setInterval(draw,80);
window.addEventListener('resize',function(){c.width=Math.round(innerWidth*DPR);c.height=Math.round(innerHeight*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);});
})();

/* ============================================================
   initOrb v47 — FIXED camera.updateMatrixWorld() before unproject
   All geometry local to orbGroup (centered 0,0,0 in local space)
   orbGroup.position = DOM-derived world position
============================================================ */
function initOrb(){
  var canvas=document.getElementById('sphere-canvas');
  var dpr=Math.min(window.devicePixelRatio||1,2);
  var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true,premultipliedAlpha:false});
  renderer.setPixelRatio(dpr);renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0x000000,0);renderer.sortObjects=false;
  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,200);
  camera.position.set(0,0,6);
  /* CRITICAL: must update matrices before using unproject */
  camera.updateProjectionMatrix();
  camera.updateMatrixWorld();

  function getOrbParams(){
    var wrap=document.getElementById('globe-wrap');
    var r=wrap.getBoundingClientRect();
    var cx=r.left+r.width*0.5, cy=r.top+r.height*0.5;
    var ndcX=(cx/innerWidth)*2-1, ndcY=-(cy/innerHeight)*2+1;
    var v=new THREE.Vector3(ndcX,ndcY,0.5).unproject(camera);
    var dir=v.sub(camera.position).normalize();
    var dist=-camera.position.z/dir.z;
    var worldPos=camera.position.clone().addScaledVector(dir,dist);
    var fH=2*Math.tan(THREE.MathUtils.degToRad(camera.fov/2))*camera.position.z;
    var fW=fH*camera.aspect;
    return {x:worldPos.x, y:worldPos.y, R:(r.width/innerWidth)*fW*0.47};
  }

  var P=getOrbParams(), OX=P.x, OY=P.y, R=P.R;

  /* All orb geometry goes into orbGroup, positioned at DOM center */
  var orbGroup=new THREE.Group();
  orbGroup.position.set(OX,OY,0);
  scene.add(orbGroup);

  /* Sprite factory (local to orbGroup) */
  function mkSprite(sz,c0,c1,op){
    var gc=document.createElement('canvas');gc.width=gc.height=256;
    var ctx2=gc.getContext('2d');
    var g=ctx2.createRadialGradient(128,128,0,128,128,128);
    g.addColorStop(0,c0);g.addColorStop(0.3,c1);
    g.addColorStop(0.65,'rgba(5,15,80,0.05)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx2.fillStyle=g;ctx2.fillRect(0,0,256,256);
    var m=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(gc),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:op});
    var s=new THREE.Sprite(m);s.scale.set(sz,sz,1);return s;
  }

  /* LAYER 1 — 4-layer volumetric core glow */
  var outerH=mkSprite(R*7,'rgba(15,70,200,0.22)','rgba(8,35,150,0.08)',0.88);
  var midV=mkSprite(R*4,'rgba(40,150,255,0.48)','rgba(18,90,230,0.16)',0.80);
  var coreV=mkSprite(R*2.2,'rgba(100,200,255,0.72)','rgba(50,160,255,0.32)',0.75);
  var hotC=mkSprite(R*0.9,'rgba(215,248,255,0.92)','rgba(130,230,255,0.58)',0.88);
  orbGroup.add(outerH,midV,coreV,hotC);

  /* Rim emission (right side) — added to SCENE (not group) so it doesn't rotate */
  var rimGc=document.createElement('canvas');rimGc.width=rimGc.height=256;
  var rc=rimGc.getContext('2d');
  var rg=rc.createRadialGradient(196,128,0,128,128,128);
  rg.addColorStop(0,'rgba(150,240,255,0.65)');rg.addColorStop(0.28,'rgba(50,170,255,0.25)');rg.addColorStop(0.65,'rgba(15,70,190,0.05)');rg.addColorStop(1,'rgba(0,0,0,0)');
  rc.fillStyle=rg;rc.fillRect(0,0,256,256);
  var rimM=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(rimGc),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.50});
  var rimS=new THREE.Sprite(rimM);rimS.scale.set(R*3.0,R*3.0,1);
  rimS.position.set(OX+R*0.28,OY,0.02);scene.add(rimS);

  /* LAYER 2 — 8k point cloud (local coords) */
  var N=8000, ptO=new Float32Array(N*3), ptPos=new Float32Array(N*3);
  var ptPh=new Float32Array(N), ptSp=new Float32Array(N);
  var phi=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<N;i++){
    var y=1-(i/(N-1))*2, rr=Math.sqrt(Math.max(0,1-y*y)), th=phi*i;
    var jt=0.85+Math.random()*0.22;
    ptO[i*3]=Math.cos(th)*rr*R*jt; ptO[i*3+1]=y*R*jt; ptO[i*3+2]=Math.sin(th)*rr*R*jt;
    ptPh[i]=Math.random()*6.283; ptSp[i]=0.5+Math.random()*1.5;
  }
  ptPos.set(ptO);
  var ptGeo=new THREE.BufferGeometry();
  var ptA=new THREE.BufferAttribute(ptPos,3);ptA.setUsage(THREE.DynamicDrawUsage);
  ptGeo.setAttribute('position',ptA);
  var ptC=document.createElement('canvas');ptC.width=ptC.height=32;
  var px2=ptC.getContext('2d');
  var pg=px2.createRadialGradient(16,16,0,16,16,16);
  pg.addColorStop(0,'rgba(230,252,255,1)');pg.addColorStop(0.28,'rgba(95,215,255,0.85)');pg.addColorStop(0.65,'rgba(35,145,255,0.25)');pg.addColorStop(1,'rgba(0,0,0,0)');
  px2.fillStyle=pg;px2.fillRect(0,0,32,32);
  var ptMat=new THREE.PointsMaterial({map:new THREE.CanvasTexture(ptC),size:0.085,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.90});
  orbGroup.add(new THREE.Points(ptGeo,ptMat));

  /* LAYER 3 — Geodesic arcs (local) */
  var NV=120, verts=[];
  for(var i=0;i<NV;i++){var idx=Math.floor(i*(N/NV));verts.push(new THREE.Vector3(ptO[idx*3],ptO[idx*3+1],ptO[idx*3+2]));}
  for(var i=0;i<verts.length;i++)for(var j=i+1;j<verts.length;j++){
    if(verts[i].distanceTo(verts[j])<R*0.44&&Math.random()<0.18){
      var m2=verts[i].clone().add(verts[j]).multiplyScalar(0.5).normalize().multiplyScalar(R*1.03);
      var pts2=new THREE.QuadraticBezierCurve3(verts[i],m2,verts[j]).getPoints(12);
      var g2=new THREE.BufferGeometry().setFromPoints(pts2);
      var br=Math.random()<0.12;
      orbGroup.add(new THREE.Line(g2,new THREE.LineBasicMaterial({color:br?0x88f0ff:0x2278b8,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:br?0.62:0.14})));
    }
  }

  /* LAYER 4 — 7 wisps (local) */
  var wisps=[];
  [{tX:0.48,tZ:0.20,ph:0,sp:0.21,op:0.40,c:0x50d8ff},{tX:-0.68,tZ:0.58,ph:1.3,sp:0.15,op:0.34,c:0x40b8ff},{tX:0.82,tZ:-0.35,ph:2.6,sp:0.26,op:0.28,c:0x70e8ff},{tX:-0.30,tZ:-0.74,ph:3.9,sp:0.18,op:0.36,c:0x60d0ff},{tX:0.22,tZ:0.90,ph:5.1,sp:0.23,op:0.26,c:0x80daff},{tX:-0.92,tZ:0.12,ph:0.7,sp:0.20,op:0.23,c:0x48c8ff},{tX:0.58,tZ:-0.62,ph:4.4,sp:0.17,op:0.32,c:0x58d4ff}].forEach(function(d){
    var NW=80,op2=[];
    for(var i=0;i<=NW;i++){var a=(i/NW)*Math.PI*2,px3=Math.cos(a)*R,py3=Math.sin(a)*R*0.28,ry3=py3*Math.cos(d.tX),rz3=py3*Math.sin(d.tX),fx3=px3*Math.cos(d.tZ)-rz3*Math.sin(d.tZ),fz3=px3*Math.sin(d.tZ)+rz3*Math.cos(d.tZ);op2.push(new THREE.Vector3(fx3,ry3,fz3));}
    var gw=new THREE.BufferGeometry().setFromPoints(op2);gw.attributes.position.setUsage(THREE.DynamicDrawUsage);
    wisps.push({geo:gw,d:d,N:NW,o:op2.map(function(p){return p.clone();})});
    orbGroup.add(new THREE.Line(gw,new THREE.LineBasicMaterial({color:d.c,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:d.op})));
  });

  /* LAYER 5 — sparks (local) */
  var NS2=160,sP=new Float32Array(NS2*3),sV=[],sL=new Float32Array(NS2),sMx=new Float32Array(NS2);
  function rSp(i){var t2=Math.random()*Math.PI*2,p2=Math.acos(2*Math.random()-1),sx=Math.sin(p2)*Math.cos(t2),sy=Math.cos(p2),sz=Math.sin(p2)*Math.sin(t2);sP[i*3]=sx*R;sP[i*3+1]=sy*R;sP[i*3+2]=sz*R;sV[i]=new THREE.Vector3(sx,sy,sz).multiplyScalar(0.004+Math.random()*0.007);sL[i]=0;sMx[i]=30+Math.random()*70;}
  for(var i=0;i<NS2;i++){rSp(i);sL[i]=Math.random()*50;}
  var sC2=document.createElement('canvas');sC2.width=sC2.height=16;var sX2=sC2.getContext('2d');
  var sG2=sX2.createRadialGradient(8,8,0,8,8,8);sG2.addColorStop(0,'rgba(245,255,255,1)');sG2.addColorStop(0.4,'rgba(80,228,255,0.65)');sG2.addColorStop(1,'rgba(0,0,0,0)');
  sX2.fillStyle=sG2;sX2.fillRect(0,0,16,16);
  var sGeo=new THREE.BufferGeometry();
  var sAttr=new THREE.BufferAttribute(sP.slice(),3);sAttr.setUsage(THREE.DynamicDrawUsage);sGeo.setAttribute('position',sAttr);
  var sMat=new THREE.PointsMaterial({map:new THREE.CanvasTexture(sC2),size:0.062,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.88});
  orbGroup.add(new THREE.Points(sGeo,sMat));

  /* ANIMATION */
  var rotY=0,t=0;
  function anim(){
    requestAnimationFrame(anim);t+=0.016;rotY+=0.0028;
    /* Rotate entire orbGroup around its own center */
    orbGroup.rotation.y=rotY;
    /* Point flicker */
    var pA2=ptGeo.attributes.position.array;
    for(var i=0;i<N;i++){var fl=0.72+0.28*Math.sin(t*ptSp[i]+ptPh[i]);pA2[i*3]=ptO[i*3];pA2[i*3+1]=ptO[i*3+1]*fl;pA2[i*3+2]=ptO[i*3+2];}
    ptGeo.attributes.position.needsUpdate=true;
    /* Wisps */
    wisps.forEach(function(wb,ri){
      var wa=wb.geo.attributes.position.array;
      for(var i=0;i<=wb.N;i++){
        var a2=(i/wb.N)*Math.PI*2+t*wb.d.sp+wb.d.ph,na=R*0.10;
        var nx3=Math.sin(a2*3.1+t*0.75+ri)*na,ny3=Math.sin(a2*2.2+t*0.52+ri*1.3)*na*0.55,nz3=Math.cos(a2*2.6+t*0.60+ri*0.85)*na*0.38;
        wa[i*3]=wb.o[i].x+nx3;wa[i*3+1]=wb.o[i].y+ny3;wa[i*3+2]=wb.o[i].z+nz3;
      }
      wb.geo.attributes.position.needsUpdate=true;
    });
    /* Sparks */
    var sa=sGeo.attributes.position.array;
    for(var i=0;i<NS2;i++){sL[i]++;if(sL[i]>sMx[i]){rSp(i);continue;}sa[i*3]+=sV[i].x;sa[i*3+1]+=sV[i].y;sa[i*3+2]+=sV[i].z;}
    sGeo.attributes.position.needsUpdate=true;
    /* Pulse */
    var pu=0.78+0.22*Math.sin(t*0.55);
    outerH.material.opacity=0.70*pu;midV.material.opacity=0.72*pu;coreV.material.opacity=0.70*pu;hotC.material.opacity=0.85*pu;
    rimS.material.opacity=0.42+0.20*Math.sin(t*0.70+1.2);
    renderer.render(scene,camera);
  }
  anim();
  window.addEventListener('resize',function(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();camera.updateMatrixWorld();});
}
initOrb();
</script><script>
/* 3D WAVE FIELD */
(function(){
  var canvas=document.getElementById('wave-canvas');
  var W=innerWidth,H=innerHeight,dpr=Math.min(window.devicePixelRatio||1,2);
  var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true,premultipliedAlpha:false});
  renderer.setPixelRatio(dpr);renderer.setSize(W,H);renderer.setClearColor(0x000000,0);
  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(55,W/H,0.1,200);
  camera.position.set(0,0,12);camera.lookAt(0,0,0);
  var XS=-3.0,XE=9.0,NS=120,NW=28,wd=[];
  for(var wi=0;wi<NW;wi++){
    var zf=wi/(NW-1),zl=(zf-0.5)*7,dc=Math.abs(zl);
    wd.push({zl:zl,dc:dc,ab:0.60+(1-dc/3.5)*0.55,ad:0.10+Math.random()*0.14,
      w1:1.2+Math.random()*0.8,w2:2.8+Math.random()*1.2,w3:6+Math.random()*2,
      a1:1,a2:0.30+Math.random()*0.14,a3:0.11+Math.random()*0.08,
      p1:Math.random()*6.283,p2:Math.random()*6.283,p3:Math.random()*6.283,
      s1:0.35+Math.random()*0.25,s2:0.65+Math.random()*0.35,s3:1.05+Math.random()*0.5,
      zw:1+Math.random()*0.8,zp:Math.random()*6.283,zs:0.25+Math.random()*0.2,
      vf:(wi/(NW-1))*2-1,br:0.45+(1-dc/3.5)*0.55,fr:zl>0});
  }
