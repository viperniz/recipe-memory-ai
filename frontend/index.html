<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cortexle - Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
header{width:100%;padding:18px 40px;text-align:center}
.logo{font-size:26px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#4fc3f7,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero{text-align:center;padding:4px 20px 0}
.hero h1{font-size:clamp(26px,4vw,48px);font-weight:700;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,#4fc3f7 50%,#7c4dff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:clamp(12px,1.5vw,16px);color:rgba(255,255,255,0.5);max-width:440px;margin:0 auto 6px}
#bs{position:relative;width:100%;max-width:700px;height:500px;margin:0 auto}
#bc{display:block;width:100%;height:100%;cursor:grab}
#bc:active{cursor:grabbing}
.fl{position:absolute;left:50%;top:9%;transform:translate(-50%,-50%);background:rgba(0,0,20,0.92);border:1px solid rgba(79,195,247,0.7);border-radius:8px;padding:7px 18px;font-size:14px;font-weight:600;color:#4fc3f7;pointer-events:none;opacity:0;transition:opacity 0.35s;white-space:nowrap;letter-spacing:0.5px;box-shadow:0 0 18px rgba(79,195,247,0.3)}
.fl.on{opacity:1}
.hint{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;text-align:center}
.cd-s{text-align:center;padding:2px 20px 12px}
.cd-t{font-size:11px;color:rgba(255,255,255,0.32);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.cd-g{display:flex;gap:20px;justify-content:center}
.cd-i{text-align:center}
.cd-n{font-size:clamp(24px,3.5vw,40px);font-weight:700;color:#4fc3f7;line-height:1;display:block}
.cd-l{font-size:10px;color:rgba(255,255,255,0.32);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.es{padding:0 20px 12px;text-align:center}
.ef{display:flex;gap:10px;max-width:360px;margin:0 auto}
.ei{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(79,195,247,0.28);border-radius:8px;padding:10px 14px;color:#fff;font-size:13px;outline:none;transition:border-color 0.3s}
.ei::placeholder{color:rgba(255,255,255,0.26)}
.ei:focus{border-color:#4fc3f7}
.eb{background:linear-gradient(135deg,#4fc3f7,#7c4dff);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tgs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:0 20px 22px;max-width:600px}
.tg{background:rgba(79,195,247,0.07);border:1px solid rgba(79,195,247,0.2);border-radius:20px;padding:5px 13px;font-size:11px;color:rgba(255,255,255,0.58)}
</style>
</head>
<body>
<header><div class="logo">CORTEXLE</div></header>
<div class="hero">
  <h1>AI Video Intelligence</h1>
  <p>Transform any video into searchable, interactive knowledge</p>
</div>
<div id="bs"><canvas id="bc"></canvas><div class="fl" id="fl"></div></div>
<div class="hint">Click a node &bull; Drag to rotate</div>
<div class="cd-s">
  <div class="cd-t">Launching In</div>
  <div class="cd-g">
    <div class="cd-i"><span class="cd-n" id="cd-d">00</span><div class="cd-l">Days</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-h">00</span><div class="cd-l">Hours</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-m">00</span><div class="cd-l">Mins</div></div>
    <div class="cd-i"><span class="cd-n" id="cd-s">00</span><div class="cd-l">Secs</div></div>
  </div>
</div>
<div class="es">
  <form class="ef" onsubmit="return false">
    <input class="ei" type="email" placeholder="Enter your email" id="ei"/>
    <button class="eb" onclick="notifyMe()">Notify Me</button>
  </form>
</div>
<div class="tgs">
  <span class="tg">AI Q&amp;A</span><span class="tg">Video Processing</span><span class="tg">Transcription</span>
  <span class="tg">Semantic Search</span><span class="tg">Smart Notes</span><span class="tg">Chrome Extension</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
<script>
(function(){
  var tgt=new Date('2025-09-01T00:00:00Z');
  function upd(){var n=new Date(),d=Math.max(0,tgt-n),v=[Math.floor(d/864e5),Math.floor((d%864e5)/36e5),Math.floor((d%36e5)/6e4),Math.floor((d%6e4)/1e3)];['cd-d','cd-h','cd-m','cd-s'].forEach(function(id,i){document.getElementById(id).textContent=String(v[i]).padStart(2,'0');});}
  upd();setInterval(upd,1000);
  window.notifyMe=function(){var v=document.getElementById('ei').value;if(v&&v.includes('@'))alert('Thanks! We will notify you at '+v);};
})();
(function(){
  var sec=document.getElementById('bs'),cv=document.getElementById('bc'),fl=document.getElementById('fl');
  var W=sec.clientWidth,H=sec.clientHeight;
  var R=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  R.setPixelRatio(Math.min(devicePixelRatio,2));R.setSize(W,H);R.setClearColor(0x000000,1);
  var S=new THREE.Scene(),CAM=new THREE.PerspectiveCamera(38,W/H,0.1,100);
  CAM.position.set(0,0.05,5.5);

  // Brain shape: viewed from Z+ camera
  // SX=wide (left-right), SY=tall (up-down), SZ=shallow (depth = front-back)
  // Brain viewed from front: wide oval shape, which IS what a brain looks like from front
  // For SIDE view appearance: need SX to be the long axis
  // SX=1.32 means the brain is 1.32 units wide (left-right as camera sees it)
  // SY=1.02 means the brain is 1.02 units tall
  // SZ=0.72 means the brain is 0.72 units deep
  // This gives a tall-ish oval from the front = matches lateral brain silhouette!
  var SX=1.32,SY=1.02,SZ=0.72;

  function BD(nx,ny,nz){
    // Frontal lobe: toward camera (+Z), slight right (+X), upper-front
    var front=0.22*Math.max(0,nz)*Math.max(0,nx+0.15)*Math.max(0,ny+0.28);
    // Occipital: away from camera (-Z), slight left (-X), upper-back
    var occ=0.16*Math.max(0,-nz)*Math.max(0,-nx+0.20)*Math.max(0,ny+0.12);
    // Parietal: top
    var par=0.12*Math.max(0,ny-0.22)*Math.exp(-(nx*nx+nz*nz)*1.4);
    // Temporal: lower sides
    var tem=0.07*Math.max(0,Math.abs(nx)-0.18)*Math.max(0,-ny-0.05);
    // Cerebellum: back-bottom
    var cer=0.07*Math.max(0,-ny-0.35)*Math.max(0,-nz+0.12)*Math.exp(-nx*nx*3.5);
    // Brainstem neck
    var bst=-0.22*Math.max(0,-ny-0.62)*Math.exp(-(nx*nx+nz*nz)*10);
    return front+occ+par+tem+cer+bst-0.03*Math.max(0,ny-0.80);
  }

  function SP(nx,ny,nz,ob){var r=(1.0+BD(nx,ny,nz))*(1.0+(ob||0));return new THREE.Vector3(nx*r*SX,ny*r*SY,nz*r*SZ);}
  function rSP(){var u=Math.random()*2-1,t=Math.random()*Math.PI*2,sv=Math.sqrt(Math.max(0,1-u*u));return SP(sv*Math.cos(t),u,sv*Math.sin(t),0.010+Math.random()*0.018);}

  var bGeo=new THREE.SphereGeometry(1.0,128,80),pa=bGeo.attributes.position;
  for(var i=0;i<pa.count;i++){var x=pa.getX(i),y=pa.getY(i),z=pa.getZ(i),l=Math.sqrt(x*x+y*y+z*z);if(l<1e-4)continue;var nx=x/l,ny=y/l,nz=z/l,r=1+BD(nx,ny,nz);pa.setXYZ(i,nx*r*SX,ny*r*SY,nz*r*SZ);}
  bGeo.computeVertexNormals();

  // OPAQUE BLACK fills depth buffer
  var blk=new THREE.Mesh(bGeo,new THREE.MeshBasicMaterial({color:0x000000,side:THREE.FrontSide,depthWrite:true}));
  blk.renderOrder=0;S.add(blk);
  S.add(new THREE.Mesh(bGeo,new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide,depthWrite:true})));

  // Rim glow rendered on top (additive, very bright)
  var rimMat=new THREE.ShaderMaterial({
    uniforms:{rC:{value:new THREE.Color(0.28,0.60,1.0)},rC2:{value:new THREE.Color(0.12,0.32,0.85)}},
    vertexShader:'varying vec3 vN,vE;void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.0);vE=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}',
    fragmentShader:'uniform vec3 rC,rC2;varying vec3 vN,vE;void main(){float d=abs(dot(normalize(vN),normalize(vE)));float rim=1.0-d;if(rim<0.15)discard;float t1=smoothstep(0.15,1.0,rim);float t2=pow(t1,1.2);float t3=pow(t1,2.2);vec3 col=rC2*t2*0.55+rC*(t3*2.5);gl_FragColor=vec4(col,t2*0.92);}',
    transparent:true,side:THREE.FrontSide,depthWrite:false,depthTest:true,blending:THREE.AdditiveBlending
  });
  var rimMesh=new THREE.Mesh(bGeo,rimMat);rimMesh.renderOrder=10;S.add(rimMesh);

  // Outer glow atmosphere
  S.add(new THREE.Mesh(new THREE.SphereGeometry(1.58,32,24),new THREE.ShaderMaterial({
    uniforms:{gc:{value:new THREE.Color(0.06,0.22,0.90)}},
    vertexShader:'varying vec3 vN,vE;void main(){vN=normalize(normalMatrix*normal);vE=normalize(-(modelViewMatrix*vec4(position,1.0)).xyz);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'uniform vec3 gc;varying vec3 vN,vE;void main(){float r=1.0-abs(dot(vN,vE));gl_FragColor=vec4(gc,pow(r,2.8)*0.38);}',
    transparent:true,side:THREE.BackSide,depthWrite:false,blending:THREE.AdditiveBlending
  })));

  // NODES on the brain surface
  var ON=[],BN=[];
  for(var i=0;i<130;i++) ON.push(rSP());
  for(var i=0;i<150;i++) BN.push(rSP());

  function mkSpr(isO){
    var c=document.createElement('canvas');c.width=64;c.height=64;
    var x=c.getContext('2d'),g=x.createRadialGradient(32,32,0,32,32,30);
    if(isO){g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.05,'rgba(255,248,200,1)');g.addColorStop(0.15,'rgba(255,160,42,0.98)');g.addColorStop(0.32,'rgba(255,88,8,0.70)');g.addColorStop(0.58,'rgba(248,38,0,0.24)');g.addColorStop(1,'rgba(198,8,0,0)');}
    else{g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.05,'rgba(235,250,255,1)');g.addColorStop(0.15,'rgba(148,218,255,0.95)');g.addColorStop(0.32,'rgba(72,158,255,0.52)');g.addColorStop(0.58,'rgba(30,92,250,0.14)');g.addColorStop(1,'rgba(12,55,210,0)');}
    x.fillStyle=g;x.beginPath();x.arc(32,32,30,0,Math.PI*2);x.fill();
    return new THREE.CanvasTexture(c);
  }
  var OT=mkSpr(true),BT=mkSpr(false);

  function mkPts(nd,tx,sz,ro){
    var arr=[];nd.forEach(function(p){arr.push(p.x,p.y,p.z);});
    var g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    var m=new THREE.PointsMaterial({size:sz,map:tx,transparent:true,depthTest:true,depthWrite:false,sizeAttenuation:true,alphaTest:0.012,blending:THREE.AdditiveBlending});
    var pt=new THREE.Points(g,m);pt.renderOrder=ro;return pt;
  }
  S.add(mkPts(ON,OT,0.105,5));
  S.add(mkPts(BN,BT,0.075,5));

  // SHORT CONNECTIONS (maxDist = 0.45, keeps lines local)
  function mkLn(nd,col,maxD,prob,op,ro){
    var arr=[];
    for(var i=0;i<nd.length;i++) for(var j=i+1;j<nd.length;j++){
      var dx=nd[i].x-nd[j].x,dy=nd[i].y-nd[j].y,dz=nd[i].z-nd[j].z;
      if(Math.sqrt(dx*dx+dy*dy+dz*dz)<maxD&&Math.random()<prob)
        arr.push(nd[i].x,nd[i].y,nd[i].z,nd[j].x,nd[j].y,nd[j].z);
    }
    var g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    var m=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op,depthTest:true,depthWrite:false,blending:THREE.AdditiveBlending});
    var ls=new THREE.LineSegments(g,m);ls.renderOrder=ro;return ls;
  }
  S.add(mkLn(ON,0xddcc00,0.45,0.55,0.75,4));
  S.add(mkLn(BN,0x2277ff,0.40,0.30,0.35,4));

  // Fibrous web
  (function(){
    var arr=[];
    for(var f=0;f<1000;f++){
      var p1=rSP();
      var u=Math.random()*2-1,t=Math.random()*Math.PI*2,sv=Math.sqrt(Math.max(0,1-u*u));
      var ang=Math.random()*Math.PI*2,sp=0.018+Math.random()*0.10;
      var nx2=sv*Math.cos(t)+Math.cos(ang)*sp,ny2=u+Math.random()*0.02-0.01,nz2=sv*Math.sin(t)+Math.sin(ang)*sp;
      var ln=Math.sqrt(nx2*nx2+ny2*ny2+nz2*nz2);if(ln<0.01)continue;
      var p2=SP(nx2/ln,ny2/ln,nz2/ln,0.002+Math.random()*0.012);
      arr.push(p1.x,p1.y,p1.z,p2.x,p2.y,p2.z);
    }
    var g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    var m=new THREE.LineBasicMaterial({color:0x1144cc,transparent:true,opacity:0.28,depthTest:true,depthWrite:false,blending:THREE.AdditiveBlending});
    var ls=new THREE.LineSegments(g,m);ls.renderOrder=3;S.add(ls);
  })();

  // Feature hotspots
  var feats=[
    {name:'AI Q&A',          nd:new THREE.Vector3( 0.55, 0.35, 0.88)}, // Frontal (+Z, upper-right)
    {name:'Video Processing',nd:new THREE.Vector3( 0.08, 0.96, 0.26)}, // Parietal (top)
    {name:'Transcription',   nd:new THREE.Vector3( 0.90,-0.20, 0.42)}, // Temporal (side +X)
    {name:'Semantic Search', nd:new THREE.Vector3( 0.10, 0.35,-0.92)}, // Occipital (-Z)
    {name:'Smart Notes',     nd:new THREE.Vector3( 0.10,-0.68,-0.60)}, // Cerebellum (-Z bottom)
    {name:'Chrome Extension',nd:new THREE.Vector3( 0.05,-0.98, 0.08)}  // Brainstem
  ];
  feats.forEach(function(f){
    var d=f.nd.normalize();f.pos=SP(d.x,d.y,d.z,0.12);
    // Target rotation to bring this feature toward Z+ (facing camera)
    f.tY=-Math.atan2(f.pos.x,f.pos.z)*0.6;
    f.tX=-Math.atan2(f.pos.y,Math.sqrt(f.pos.x*f.pos.x+f.pos.z*f.pos.z))*0.40;
  });

  function mkHot(){
    var c=document.createElement('canvas');c.width=80;c.height=80;var ctx=c.getContext('2d');
    var g=ctx.createRadialGradient(40,40,0,40,40,36);
    g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.10,'rgba(255,210,115,1)');
    g.addColorStop(0.28,'rgba(255,118,22,0.92)');g.addColorStop(0.55,'rgba(238,55,0,0.44)');g.addColorStop(1,'rgba(188,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(40,40,36,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,218,80,0.92)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(40,40,26,0,Math.PI*2);ctx.stroke();
    return new THREE.CanvasTexture(c);
  }
  var HT=mkHot(),HO=[];
  feats.forEach(function(f,i){
    var g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute([f.pos.x,f.pos.y,f.pos.z],3));
    var m=new THREE.PointsMaterial({size:0.24,map:HT,transparent:true,depthTest:false,sizeAttenuation:true,alphaTest:0.01});
    var pt=new THREE.Points(g,m);pt.renderOrder=9;pt.userData={i:i};S.add(pt);HO.push(pt);
  });

  var RNG=[];
  feats.forEach(function(f,i){
    var pts=[];for(var s=0;s<=32;s++){var a=s/32*Math.PI*2;pts.push(Math.cos(a)*0.11,Math.sin(a)*0.11,0);}
    var g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    var m=new THREE.LineBasicMaterial({color:0xff9933,transparent:true,opacity:0.55,depthTest:false});
    var r=new THREE.LineLoop(g,m);r.position.copy(f.pos);r.renderOrder=8;r.userData={ph:i*1.1};S.add(r);RNG.push(r);
  });

  var GRP=new THREE.Group();S.children.slice().forEach(function(o){S.remove(o);GRP.add(o);});S.add(GRP);

  var rY=0,rX=-0.10,tY=0,tX=-0.10,drag=false,lx=0,ly=0,spin=true,lblT=null;
  cv.addEventListener('mousedown',function(e){drag=true;spin=false;lx=e.clientX;ly=e.clientY;ck(e.clientX,e.clientY);});
  document.addEventListener('mousemove',function(e){if(!drag)return;tY+=(e.clientX-lx)*0.007;tX=Math.max(-0.85,Math.min(0.85,tX+(e.clientY-ly)*0.005));lx=e.clientX;ly=e.clientY;});
  document.addEventListener('mouseup',function(){drag=false;});
  cv.addEventListener('touchstart',function(e){e.preventDefault();drag=true;spin=false;lx=e.touches[0].clientX;ly=e.touches[0].clientY;ck(lx,ly);},{passive:false});
  document.addEventListener('touchmove',function(e){if(!drag)return;tY+=(e.touches[0].clientX-lx)*0.007;tX=Math.max(-0.85,Math.min(0.85,tX+(e.touches[0].clientY-ly)*0.005));lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:false});
  document.addEventListener('touchend',function(){drag=false;});

  var rc=new THREE.Raycaster();rc.params.Points={threshold:0.22};var mv=new THREE.Vector2();
  function ck(cx,cy){var rect=cv.getBoundingClientRect();mv.x=((cx-rect.left)/rect.width)*2-1;mv.y=-((cy-rect.top)/rect.height)*2+1;rc.setFromCamera(mv,CAM);var hits=rc.intersectObjects(HO,false);if(hits.length){var fi=hits[0].object.userData.i,f=feats[fi];tY=f.tY;tX=f.tX;showL(f.name);}else hideL();}
  function showL(n){if(lblT)clearTimeout(lblT);fl.textContent=n;fl.classList.add('on');lblT=setTimeout(hideL,3500);}
  function hideL(){fl.classList.remove('on');}

  var clk=new THREE.Clock();
  function animate(){requestAnimationFrame(animate);var t=clk.getElapsedTime();if(spin)tY+=0.0018;rY+=(tY-rY)*0.055;rX+=(tX-rX)*0.055;GRP.rotation.y=rY;GRP.rotation.x=rX;RNG.forEach(function(r){r.lookAt(CAM.position);var ph=(t*1.5+r.userData.ph)%(Math.PI*2);var sc=0.8+Math.sin(ph)*0.5;r.scale.set(sc,sc,sc);r.material.opacity=0.2+Math.sin(ph)*0.40;});R.render(S,CAM);}
  animate();
  window.addEventListener('resize',function(){W=sec.clientWidth;H=sec.clientHeight;CAM.aspect=W/H;CAM.updateProjectionMatrix();R.setSize(W,H);});
})();
<\/script>
</body>
</html>
