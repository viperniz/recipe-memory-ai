<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cortexle - Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;background:#000}
body{color:#fff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
#hdr{text-align:center;padding:22px 20px 0;flex-shrink:0}
.logo{font-size:2.4rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tl{font-size:0.82rem;color:#3a5070;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
#brainWrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;width:100%;min-height:300px;perspective:800px}
#brainCanvas{display:block;cursor:grab;transform-style:preserve-3d;transition:none}
#brainCanvas:active{cursor:grabbing}
#lbl{position:absolute;top:8%;left:50%;transform:translateX(-50%);background:rgba(0,4,18,0.93);border:1px solid rgba(74,240,252,0.75);border-radius:10px;padding:10px 24px;font-size:0.95rem;font-weight:700;color:#4af0fc;letter-spacing:2px;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity 0.35s;box-shadow:0 0 28px rgba(74,240,252,0.35);white-space:nowrap;z-index:10}
#lbl.show{opacity:1}
#dtip{color:rgba(255,255,255,0.18);font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:4px 0 2px;flex-shrink:0}
#bot{text-align:center;padding:10px 20px 20px;width:100%;max-width:540px;flex-shrink:0}
.cd{display:flex;justify-content:center;gap:14px;margin-bottom:12px;align-items:center}

.cdl{font-size:0.52rem;color:#2a3a4a;text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.sp{color:#162030;font-size:1.6rem;padding-bottom:12px}
.er{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.er input{padding:10px 14px;border-radius:8px;border:1px solid rgba(74,240,252,0.2);background:rgba(255,255,255,0.04);color:#fff;font-size:0.83rem;width:215px;outline:none}
.er input:focus{border-color:rgba(74,240,252,0.6)}
.er button{padding:10px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,#4f46e5,#0ea5e9);color:#fff;font-weight:700;font-size:0.83rem;cursor:pointer}
.tgs{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.tg{padding:3px 9px;border-radius:20px;border:1px solid rgba(74,240,252,0.15);color:#253040;font-size:0.63rem}
</style>
</head>
<body>
<div id="hdr"><div class="logo">CORTEXLE</div><div class="tl">AI-Powered Video Intelligence — Coming Soon</div></div>

  <canvas id="brainCanvas"></canvas>

</div>

  <div class="cd">
    <div class="cdu"><span class="cdn" id="cd-d">91</span><div class="cdl">Days</div></div><div class="sp">:</div>

</div>
<script>
(function(){
'use strict';

var C=document.getElementById('brainCanvas');
var ctx=C.getContext('2d');
// Lateral brain size
var BW=580,BH=420;
C.width=BW;C.height=BH;
C.style.width=BW+'px';C.style.height=BH+'px';

// ── Rotation state ─────────────────────────────────────────────
// We simulate 3D by applying CSS rotateY transform to the canvas
// and mirroring/scaling node positions accordingly
var rotY=0; // degrees, 0=side view (left-facing)
var targetRotY=0;
var isDrag=false,dragStartX=0,rotStartY=0;
var autoSpin=true;
var activeFeature=null;
var lbl=document.getElementById('lbl');
var clickStartX=0,clickStartY=0;

// ── Lateral brain silhouette ───────────────────────────────────
// Precise anatomical points for LEFT-facing lateral brain
// Origin: top-left of canvas
// Frontal pole is LEFT side, occipital is RIGHT side
// This traces the exact shape from the reference photo

// Main cerebrum outline (counter-clockwise from frontal base)
var cerebrum=[
  // Frontal inferior/base
  [142,310],
  // Frontal pole curves
  [110,290],[90,268],[82,242],[80,215],[84,188],
  // Frontal superior
  [95,162],[112,140],[132,122],
  // Frontoparietal junction (slight S-curve)
  [158,108],[185,95],[215,82],
  // Parietal - vertex (top)
  [248,72],[285,62],[322,58],
  // Parieto-occipital
  [358,62],[392,70],[420,82],
  // Occipital superior
  [445,98],[462,118],[472,140],
  // Occipital pole
  [478,162],[480,188],[476,212],
  // Post-temporal / occipito-temporal
  [468,234],[452,252],[430,265],
  // Temporal-occipital junction
  [405,272],[380,272],[358,270],
  // Temporal superior posterior
  [338,268],[318,272],[300,278],
  // Superior temporal sulcus area - slight concavity  
  [282,285],[265,292],[248,294],
  // Temporal anterior superior
  [228,290],[210,285],
  // Sylvian fissure tip area
  [196,278],[180,270],
  // Frontal inferior back to base
  [165,290],[152,302],[142,310]
];

// Temporal lobe separate (protrudes below Sylvian fissure)
// This is the distinctive lower protrusion in the reference photo
var temporal=[
  [200,278],// Sylvian fissure point
  [185,272],[168,268],[152,272],
  [138,280],[128,292],[122,308],
  [120,325],[122,342],[128,356],
  [138,368],[152,376],[168,378],
  [185,376],[200,370],[215,358],
  [226,344],[232,328],[230,312],
  [224,298],[214,286],[200,278]
];

// Cerebellum (lower right - smaller rounded lobe)
var cerebellum=[
  [390,276],[412,272],[432,270],
  [450,272],[464,280],[472,294],
  [474,310],[472,326],[466,340],
  [454,350],[438,356],[420,356],
  [402,352],[388,342],[380,328],
  [376,312],[378,296],[390,276]
];

// Brainstem
var brainstem=[
  [230,318],[248,312],[262,316],
  [272,324],[278,338],[278,355],
  [276,372],[270,386],[260,396],
  [248,402],[236,400],[226,394],
  [218,382],[216,366],[218,350],
  [222,336],[230,318]
];

// ── Neural nodes on brain surface ─────────────────────────────
// Manually placed inside the brain region, distributed like reference
var nodes=[];
function buildNodes(){
  nodes=[];
  // Orange hot nodes (like reference - brighter, bigger)
  var orangePts=[
    [148,180],[175,155],[210,142],[238,168],[268,148],[298,160],[328,155],[358,168],
    [388,178],[415,195],[442,218],[198,205],[228,225],[260,210],[295,200],[325,212],
    [355,205],[385,215],[418,232],[158,242],[192,260],[225,248],[258,258],[290,240],
    [322,248],[355,242],[385,255],[408,262],[168,285],[200,295],[232,272],[260,280],
    [288,270],[320,278],[350,268],[375,272],[402,270],[422,278]
  ];
  // Blue/white nodes (smaller, many more)
  var bluePts=[
    [132,195],[145,222],[155,255],[128,268],[140,290],[162,175],[188,188],
    [215,175],[245,188],[272,178],[302,182],[332,172],[362,182],[392,192],
    [418,208],[445,225],[462,242],[468,258],[462,270],[178,220],[208,235],
    [238,242],[265,228],[295,218],[322,228],[350,222],[378,228],[405,238],
    [432,248],[448,258],[175,265],[205,275],[235,265],[262,268],[290,258],
    [318,264],[345,258],[372,262],[398,268],[420,270],[440,265],[155,305],
    [178,298],[205,310],[232,302],[258,295],[285,298],[312,292],[340,296],
    [368,290],[392,285],[415,282],[440,280],[460,285],[142,235],[168,248]
  ];
  orangePts.forEach(function(p){nodes.push({x:p[0],y:p[1],o:true,r:2.8+Math.random()*1.5,ph:Math.random()*Math.PI*2});});
  bluePts.forEach(function(p){nodes.push({x:p[0],y:p[1],o:false,r:1.5+Math.random()*1.2,ph:Math.random()*Math.PI*2});});
}
buildNodes();

// Connections (built from node pairs within range)
var conns=[];
function buildConns(){
  conns=[];
  for(var i=0;i<nodes.length;i++){
    for(var j=i+1;j<nodes.length;j++){
      var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
      var d=Math.sqrt(dx*dx+dy*dy);
      var limit=nodes[i].o&&nodes[j].o?120:80;
      if(d<limit&&Math.random()<(nodes[i].o&&nodes[j].o?0.7:0.3)){
        conns.push({i:i,j:j,orange:nodes[i].o&&nodes[j].o,mixed:nodes[i].o||nodes[j].o});
      }
    }
  }
}
buildConns();

// ── Feature hotspots (anatomically placed on brain regions) ───
var features=[
  {id:'aiq', name:'AI Q&A',          x:185,y:175, desc:'Frontal Lobe', tY:-25},
  {id:'vid', name:'Video Processing', x:310,y:120, desc:'Parietal Lobe', tY:0},
  {id:'tran',name:'Transcription',    x:195,y:295, desc:'Temporal Lobe', tY:-15},
  {id:'sem', name:'Semantic Search',  x:440,y:185, desc:'Occipital Lobe',tY:15},
  {id:'note',name:'Smart Notes',      x:428,y:320, desc:'Cerebellum',    tY:12},
  {id:'ext', name:'Chrome Extension', x:252,y:380, desc:'Brainstem',     tY:0}
];

// ── Draw functions ──────────────────────────────────────────────

function drawPath(pts,close){
  if(!pts||pts.length<2)return;
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<pts.length-2;i++){
    var mx=(pts[i][0]+pts[i+1][0])/2;
    var my=(pts[i][1]+pts[i+1][1])/2;
    ctx.quadraticCurveTo(pts[i][0],pts[i][1],mx,my);
  }
  ctx.quadraticCurveTo(pts[pts.length-2][0],pts[pts.length-2][1],pts[pts.length-1][0],pts[pts.length-1][1]);
  if(close)ctx.closePath();
}

// Fibrous texture lines on brain surface - like the blue web in reference
var fibers=[];
function buildFibers(){
  fibers=[];
  // Create many short curved strokes that follow the brain surface
  for(var i=0;i<300;i++){
    // Random point inside brain region
    var x=85+Math.random()*395;
    var y=60+Math.random()*250;
    var len=15+Math.random()*45;
    var angle=Math.random()*Math.PI*2;
    var curve=(-0.5+Math.random())*0.8;
    fibers.push({x:x,y:y,len:len,angle:angle,curve:curve,op:0.04+Math.random()*0.12});
  }
}
buildFibers();

function applyRotTransform(x,y){
  // Apply perspective-like X compression for rotY
  var rad=rotY*Math.PI/180;
  var cosR=Math.cos(rad);
  var cx=BW*0.5,cy=BH*0.45;
  var dx=x-cx;
  // Compress X based on rotation
  var nx=cx+dx*cosR;
  return[nx,y];
}

function draw(){
  ctx.clearRect(0,0,BW,BH);
  ctx.save();

  var rad=rotY*Math.PI/180;
  var cosR=Math.cos(rad);
  var absCos=Math.abs(cosR);
  var flip=cosR<0;

  // Transform function: apply rotation to x coordinate
  function tx(x,y){
    var cx=BW*0.5,cy=BH*0.45;
    var dx=(x-cx)*cosR;
    return cx+dx;
  }
  function ty(x,y){return y;}

  // Transform path
  function tpts(pts){
    return pts.map(function(p){return[tx(p[0],p[1]),ty(p[0],p[1])];});
  }

  // ── 1. Draw back-side cerebellum (behind temporal if flipped) ──

  // ── 2. Draw temporal lobe ──
  var tpts_temp=tpts(temporal);
  drawPath(tpts_temp,true);
  var tg1=ctx.createRadialGradient(tx(175,330),340,5,tx(175,330),340,90);
  tg1.addColorStop(0,'rgba(8,16,50,0.95)');
  tg1.addColorStop(1,'rgba(4,8,30,0.95)');
  ctx.fillStyle=tg1;
  ctx.fill();
  // Rim for temporal
  drawPath(tpts_temp,true);
  ctx.strokeStyle='rgba(120,170,255,0.7)';
  ctx.lineWidth=2;
  ctx.shadowColor='rgba(100,160,255,0.8)';ctx.shadowBlur=12;
  ctx.stroke();ctx.shadowBlur=0;

  // ── 3. Cerebellum ──
  var tpts_cb=tpts(cerebellum);
  drawPath(tpts_cb,true);
  var cbg=ctx.createRadialGradient(tx(425,312),312,5,tx(425,312),312,70);
  cbg.addColorStop(0,'rgba(8,16,50,0.95)');cbg.addColorStop(1,'rgba(4,8,30,0.95)');
  ctx.fillStyle=cbg;ctx.fill();
  drawPath(tpts_cb,true);
  ctx.strokeStyle='rgba(110,160,255,0.65)';ctx.lineWidth=2;
  ctx.shadowColor='rgba(100,160,255,0.8)';ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
  // Cerebellum fold lines
  for(var cf=0;cf<3;cf++){
    var cy2=285+cf*24;
    ctx.beginPath();
    ctx.moveTo(tx(392,cy2),cy2);
    ctx.bezierCurveTo(tx(412,cy2-4),cy2-4,tx(450,cy2+4),cy2+4,tx(468,cy2),cy2);
    ctx.strokeStyle='rgba(80,130,220,0.3)';ctx.lineWidth=1;ctx.stroke();
  }

  // ── 4. Brainstem ──
  var tpts_bs=tpts(brainstem);
  drawPath(tpts_bs,true);
  var bsg=ctx.createLinearGradient(tx(248,312),312,tx(248,400),400);
  bsg.addColorStop(0,'rgba(8,16,50,0.9)');bsg.addColorStop(1,'rgba(4,8,30,0.9)');
  ctx.fillStyle=bsg;ctx.fill();
  drawPath(tpts_bs,true);
  ctx.strokeStyle='rgba(100,155,235,0.65)';ctx.lineWidth=1.8;
  ctx.shadowColor='rgba(100,160,255,0.7)';ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;

  // ── 5. Main cerebrum ──
  var tpts_cb2=tpts(cerebrum);
  // Clip to cerebrum for internal features
  ctx.save();
  drawPath(tpts_cb2,true);
  ctx.clip();

  // Dark interior
  var ig=ctx.createRadialGradient(tx(300,200),200,20,tx(300,200),200,260);
  ig.addColorStop(0,'rgba(6,12,40,0.98)');
  ig.addColorStop(0.5,'rgba(4,8,28,0.98)');
  ig.addColorStop(1,'rgba(2,5,18,0.98)');
  ctx.fillStyle=ig;
  ctx.fillRect(0,0,BW,BH);

  // Fibrous blue web texture on surface
  fibers.forEach(function(f){
    var cx2=tx(f.x,f.y);
    var endX=cx2+Math.cos(f.angle)*f.len*absCos;
    var endY=f.y+Math.sin(f.angle)*f.len;
    var cpx=cx2+(endX-cx2)*0.5-Math.sin(f.angle)*f.len*f.curve*absCos;
    var cpy=f.y+(endY-f.y)*0.5+Math.cos(f.angle)*f.len*f.curve;
    ctx.beginPath();
    ctx.moveTo(cx2,f.y);
    ctx.quadraticCurveTo(cpx,cpy,endX,endY);
    ctx.strokeStyle='rgba(80,140,255,'+f.op+')';
    ctx.lineWidth=0.5;
    ctx.stroke();
  });

  // Neural connections
  conns.forEach(function(c){
    var ni=nodes[c.i],nj=nodes[c.j];
    var nix=tx(ni.x,ni.y),njx=tx(nj.x,nj.y);
    ctx.beginPath();
    ctx.moveTo(nix,ni.y);
    ctx.lineTo(njx,nj.y);
    if(c.orange){
      ctx.strokeStyle='rgba(255,210,30,0.55)';
      ctx.lineWidth=1.0;
    } else if(c.mixed){
      ctx.strokeStyle='rgba(200,140,30,0.35)';
      ctx.lineWidth=0.7;
    } else {
      ctx.strokeStyle='rgba(60,120,220,0.28)';
      ctx.lineWidth=0.5;
    }
    ctx.stroke();
  });

  // Neural nodes
  var t=Date.now()/1000;
  nodes.forEach(function(n,i){
    var nx=tx(n.x,n.y);
    var pulse=0.7+Math.sin(t*3+n.ph)*0.3;
    var r=n.r*pulse;
    if(n.o){
      // Orange glow node
      var grd=ctx.createRadialGradient(nx,n.y,0,nx,n.y,r*3.5);
      grd.addColorStop(0,'rgba(255,220,120,0.9)');
      grd.addColorStop(0.3,'rgba(255,140,30,0.7)');
      grd.addColorStop(0.7,'rgba(220,80,10,0.35)');
      grd.addColorStop(1,'rgba(180,50,0,0)');
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.arc(nx,n.y,r*3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,230,150,0.95)';
      ctx.beginPath();ctx.arc(nx,n.y,r*0.7,0,Math.PI*2);ctx.fill();
    } else {
      // Blue/white glow node
      var grd2=ctx.createRadialGradient(nx,n.y,0,nx,n.y,r*3);
      grd2.addColorStop(0,'rgba(200,220,255,0.85)');
      grd2.addColorStop(0.35,'rgba(120,170,255,0.5)');
      grd2.addColorStop(0.7,'rgba(60,120,220,0.2)');
      grd2.addColorStop(1,'rgba(40,80,200,0)');
      ctx.fillStyle=grd2;
      ctx.beginPath();ctx.arc(nx,n.y,r*3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(220,235,255,0.9)';
      ctx.beginPath();ctx.arc(nx,n.y,r*0.6,0,Math.PI*2);ctx.fill();
    }
  });

  ctx.restore();// end clip

  // ── 6. Cerebrum outline (bright glowing rim) ──
  // Multiple passes for thick glow effect like reference
  [
    {w:16,c:'rgba(60,100,220,0.08)'},
    {w:10,c:'rgba(80,130,240,0.14)'},
    {w:6, c:'rgba(100,160,255,0.22)'},
    {w:3, c:'rgba(140,190,255,0.45)'},
    {w:1.5,c:'rgba(200,220,255,0.85)'}
  ].forEach(function(g){
    drawPath(tpts_cb2,true);
    ctx.strokeStyle=g.c;
    ctx.lineWidth=g.w;
    ctx.shadowColor='rgba(120,180,255,0.9)';
    ctx.shadowBlur=g.w>5?15:8;
    ctx.stroke();
    ctx.shadowBlur=0;
  });

  // ── 7. Hotspot dots ──
  features.forEach(function(f,i){
    var isA=activeFeature&&activeFeature.id===f.id;
    var fx=tx(f.x,f.y);
    var pulse2=0.75+Math.sin(t*3.5+i*1.1)*0.25;

    // Outer pulse ring
    ctx.beginPath();ctx.arc(fx,f.y,12*pulse2,0,Math.PI*2);
    ctx.fillStyle=isA?'rgba(255,80,20,0.12)':'rgba(74,240,252,0.08)';
    ctx.fill();

    // Ring border
    ctx.beginPath();ctx.arc(fx,f.y,7,0,Math.PI*2);
    ctx.strokeStyle=isA?'rgba(255,130,60,0.85)':'rgba(74,240,252,0.8)';
    ctx.lineWidth=1.5;
    ctx.fillStyle=isA?'rgba(255,80,20,0.2)':'rgba(74,240,252,0.12)';
    ctx.fill();ctx.stroke();

    // Center dot
    ctx.beginPath();ctx.arc(fx,f.y,3.5,0,Math.PI*2);
    ctx.fillStyle=isA?'#ff6b35':'#4af0fc';
    ctx.shadowColor=isA?'rgba(255,100,50,1)':'rgba(74,240,252,1)';
    ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
  });

  ctx.restore();
  requestAnimationFrame(draw);
}

// ── Drag rotation ──────────────────────────────────────────────
C.addEventListener('mousedown',function(e){
  isDrag=true;dragStartX=e.clientX;rotStartY=targetRotY;
  clickStartX=e.clientX;clickStartY=e.clientY;
  autoSpin=false;C.style.cursor='grabbing';
},{passive:true});
document.addEventListener('mousemove',function(e){
  if(!isDrag)return;
  targetRotY=rotStartY+(e.clientX-dragStartX)*0.4;
  targetRotY=Math.max(-85,Math.min(85,targetRotY));
});
document.addEventListener('mouseup',function(){isDrag=false;C.style.cursor='grab';});
C.addEventListener('touchstart',function(e){
  isDrag=true;dragStartX=e.touches[0].clientX;rotStartY=targetRotY;
  clickStartX=e.touches[0].clientX;clickStartY=e.touches[0].clientY;
  autoSpin=false;e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',function(e){
  if(!isDrag)return;
  targetRotY=rotStartY+(e.touches[0].clientX-dragStartX)*0.4;
  targetRotY=Math.max(-85,Math.min(85,targetRotY));
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',function(){isDrag=false;});

// ── Click handler ─────────────────────────────────────────────
C.addEventListener('click',function(e){
  if(Math.abs(e.clientX-clickStartX)>6||Math.abs(e.clientY-clickStartY)>6)return;
  var rect=C.getBoundingClientRect();
  var mx=(e.clientX-rect.left)*(BW/rect.width);
  var my=(e.clientY-rect.top)*(BH/rect.height);
  var cosR=Math.cos(rotY*Math.PI/180);
  var cx2=BW*0.5;

  var hit=null,minD=9999;
  features.forEach(function(f){
    // Inverse transform to find screen position
    var dx=f.x-cx2;
    var fx2=cx2+dx*cosR;
    var d=Math.sqrt((mx-fx2)*(mx-fx2)+(my-f.y)*(my-f.y));
    if(d<22&&d<minD){minD=d;hit=f;}
  });

  if(hit){
    if(activeFeature&&activeFeature.id===hit.id){
      activeFeature=null;lbl.classList.remove('show');autoSpin=true;
    } else {
      activeFeature=hit;
      lbl.textContent=hit.name;
      lbl.classList.add('show');
      targetRotY=hit.tY;
    }
  } else {
    activeFeature=null;lbl.classList.remove('show');
  }
});

// ── Animation loop ─────────────────────────────────────────────
function tick2(){
  if(autoSpin&&!isDrag)targetRotY+=0.15;
  rotY+=(targetRotY-rotY)*0.08;
  draw();
}
setInterval(tick2,16);

// ── Countdown ─────────────────────────────────────────────────
var tgt=new Date();tgt.setDate(tgt.getDate()+91);
function tick(){var d=Math.max(0,tgt-new Date());document.getElementById('cd-d').textContent=String(Math.floor(d/86400000)).padStart(2,'0');document.getElementById('cd-h').textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');document.getElementById('cd-m').textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');document.getElementById('cd-s').textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');}
tick();setInterval(tick,1000);
window.notify=function(){var e=document.getElementById('ei').value;if(e&&e.includes('@')){alert('Thanks! We will notify you at '+e);document.getElementById('ei').value='';}};
})();
</script>
